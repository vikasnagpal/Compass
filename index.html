    /* Active state: a dark contrasty ring instead of the mustard ring
       (which disappeared against the yellow In-Progress pill). */
    .status-pill.active {
      border-color: var(--text);
      box-shadow: 0 0 0 1px var(--text);
    }
    /* T3.3 — Pop animation when moving to Completed, with a green ring beat. */
    @keyframes pillPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); box-shadow: 0 0 0 6px rgba(34,197,94,.20); }
      100% { transform: scale(1); box-shadow: 0 0 0 1px var(--text); }
    }
    .status-pill.just-completed {
      animation: pillPop .42s cubic-bezier(.2,.8,.3,1);
    }
    @media (prefers-reduced-motion: reduce) {
      .status-pill.just-completed { animation: none; }
    }
    /* T3.3 — Comment box gets a friendly green tint when the staged status
       is 'completed' to invite a "what did you ship?" note. */
    .comment-box.is-completing textarea {
      border-color: var(--green);
      background: rgba(34,197,94,.06);
    }
    @media (max-width: 520px) {
      /* On phone widths, lay pills out as a uniform 3-column grid so they
         don't end up at three different widths across three ragged rows. */
      .status-pills { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .status-pill { padding: 0 6px; min-height: 32px; font-size: 12px; }
    }
    .status-pending-hint {
      margin-top: 10px; padding: 8px 12px;
      background: var(--primary-light); border: 1px dashed var(--primary);
      border-radius: var(--radius-sm);
      font-size: 12.5px; color: var(--text);
      line-height: 1.45;
    }
    .status-pending-hint strong { font-weight: 600; }

    .comment-box {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden;
    }
    .comment-box textarea {
      width: 100%; padding: 12px 14px; border: none; outline: none;
      font-family: 'Inter', sans-serif; font-size: 15px;
      resize: none; background: transparent; color: var(--text);
      min-height: 78px; line-height: 1.5;
    }
    .comment-box textarea::placeholder { color: var(--neutral); }
    .comment-box-foot {
      padding: 8px 10px; display: flex; align-items: center;
      justify-content: space-between; border-top: 1px solid var(--border);
    }
    .comment-hint { font-size: 12.5px; color: var(--text-muted); }

    /* ── TIMELINE ── */
    .timeline-label {
      font-size: 14px; font-weight: 600; color: var(--text);
      margin-bottom: 14px;
    }
    .timeline { position: relative; }
    .timeline::before {
      content: ''; position: absolute;
      left: 16px; top: 34px; bottom: 6px;
      width: 2px; background: var(--border);
    }
    .tl-item { display: flex; gap: 12px; margin-bottom: 18px; }
    .tl-icon {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border: 2px solid var(--border);
      background: var(--surface); z-index: 1;
    }
    .tl-icon.comment-ic  { background: var(--primary-light); border-color: var(--primary); }
    .tl-icon.status-ic   { background: var(--green-light); border-color: var(--green); }
    .tl-icon.edited-ic   { background: #F3EEDD; border-color: var(--primary-dark); color: var(--primary-dark); }
    .tl-icon.created-ic  { background: #F0EFED; border-color: var(--neutral); }
    .tl-body {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
    }
    .tl-date { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
    .tl-text { font-size: 14px; line-height: 1.6; }

    /* ── MODAL ── */
    .modal-wrap {
      position: fixed; inset: 0; z-index: 400;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,.32); }
    .modal-box {
      position: relative; background: var(--surface);
      border-radius: var(--radius); padding: 26px 28px;
      width: 100%; max-width: 460px; box-shadow: var(--shadow-lg);
      animation: popIn .22s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.95) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-title {
      font-size: 19px; font-weight: 700; margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .modal-title .icon { color: var(--primary-dark); }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: 15px;
      background: var(--bg); color: var(--text); outline: none;
      transition: border-color .18s;
    }
    .form-input:focus { border-color: var(--primary); }
    textarea.form-input { resize: vertical; min-height: 62px; }
    select.form-input { cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .form-actions { display: flex; gap: 9px; align-items: center; justify-content: flex-end; margin-top: 20px; }

    /* ── INITIATIVE TEMPLATE CHIPS (T2.4) ── */
    .init-template-row {
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
      padding: 8px 10px; margin-bottom: 16px;
      background: var(--bg); border-radius: 10px;
      border: 1px dashed var(--border);
    }
    .init-template-label {
      font: 600 11px/1 'Inter', sans-serif; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted); margin-right: 4px;
    }
    .init-template-chip {
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); border-radius: 999px; padding: 5px 11px;
      font: 500 12px/1 'Inter', sans-serif; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .init-template-chip:hover { border-color: var(--primary); background: var(--bg); }

    /* ── EMPTY STATES ── */
    /* ── SIGN-IN SCREEN ── */
    .signin-shell {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse at top left, #FFF3D4 0%, transparent 55%),
        radial-gradient(ellipse at bottom right, #FFEAB6 0%, transparent 55%),
        var(--bg);
    }
    .signin-card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 38px 32px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .signin-logo {
      width: 60px; height: 60px;
      border-radius: 16px;
      background: var(--primary);
      display: inline-flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
    }
    .signin-title {
      font-family: 'Poppins', sans-serif; font-weight: 700;
      font-size: 26px; margin-bottom: 8px; color: var(--text);
    }
    .signin-title em { color: var(--primary); font-style: normal; }
    .signin-sub {
      font-size: 15px; color: var(--text-muted);
      line-height: 1.55; margin-bottom: 22px;
    }
    .signin-error {
      background: var(--danger-light); color: var(--danger);
      border: 1px solid var(--danger);
      border-radius: var(--radius-sm);
      padding: 12px 16px; font-size: 14px; font-weight: 500;
      line-height: 1.55;
      margin-bottom: 16px;
      text-align: left;
    }
    .signin-google {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; min-height: 46px;
      padding: 0 18px;
      background: var(--surface); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      line-height: 1;
    }
    .signin-google:hover { border-color: var(--neutral); background: var(--bg); }
    .signin-google:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .signin-foot {
      font-size: 12.5px; color: var(--text-muted);
      margin-top: 18px;
    }

    /* ── APP TOAST (data-layer errors + acks) ── */
    /* ── UNDO TOAST ── */
    .undo-toast {
      position: fixed; left: 50%; bottom: 28px;
      transform: translateX(-50%) translateY(16px);
      background: var(--text); color: #fff;
      padding: 8px 8px 8px 18px; border-radius: 100px;
      display: inline-flex; align-items: center; gap: 12px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease, transform .25s cubic-bezier(.2,.8,.3,1);
      z-index: 9999; max-width: 92vw;
    }
    .undo-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .undo-toast-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .undo-toast-btn {
      display: inline-flex; align-items: center;
      background: var(--primary); color: var(--text-on-primary);
      border: none; border-radius: 100px;
      padding: 0 14px; min-height: 30px;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background .15s;
      flex-shrink: 0;
    }
    .undo-toast-btn:hover { background: var(--primary-dark); }
    .undo-toast-progress {
      position: absolute; left: 0; bottom: 0; height: 2px;
      background: var(--primary); border-radius: 0 0 100px 100px;
      transform-origin: left;
      animation: undo-countdown linear forwards;
      pointer-events: none;
    }
    @keyframes undo-countdown { from { transform: scaleX(1); } to { transform: scaleX(0); } }

    /* ── BUTTON BUSY STATE ── */
    .btn.is-busy, .btn-busy {
      cursor: wait; opacity: .85; pointer-events: none;
    }
    .btn-spinner {
      display: inline-block;
      width: 1em; height: 1em;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%;
      animation: btn-spin .7s linear infinite;
      vertical-align: -0.18em; flex-shrink: 0;
    }
    @keyframes btn-spin { to { transform: rotate(360deg); } }

    .app-toast {
      position: fixed; left: 50%; bottom: 28px;
      transform: translateX(-50%) translateY(16px);
      background: var(--text); color: #fff;
      padding: 11px 18px; border-radius: 100px;
      font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 500;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease, transform .25s cubic-bezier(.2,.8,.3,1);
      z-index: 9999; max-width: 92vw; text-align: center;
    }
    .app-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .app-toast.err { background: var(--danger); }
    .app-toast.with-action {
      display: inline-flex; align-items: center; gap: 14px;
      padding: 10px 10px 10px 18px; pointer-events: auto;
    }
    .app-toast .app-toast-btn {
      background: var(--primary); color: var(--text-on-primary, #1F1F1F);
      border: 0; border-radius: 100px; padding: 6px 12px;
      font: 600 12.5px/1 'Inter', sans-serif; cursor: pointer;
    }

    .empty {
      text-align: center; padding: 40px 20px; color: var(--text-muted);
    }
    .empty-icon { font-size: 44px; margin-bottom: 10px; }
    .empty h3 { font-size: 17px; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; margin-bottom: 16px; }

    /* ── FIRST-RUN CHECKLIST (T3.1) ── */
    .first-run {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 30px 28px;
      max-width: 600px; margin: 24px auto;
    }
    .first-run-head { display: flex; align-items: center; gap: 18px; margin-bottom: 22px; }
    .first-run-emoji { font-size: 42px; line-height: 1; }
    .first-run-head h3 { font: 600 19px/1.3 'Poppins', sans-serif; color: var(--text); margin-bottom: 4px; }
    .first-run-head p  { font: 400 14px/1.5 'Inter', sans-serif; color: var(--text-muted); }
    .first-run-list { list-style: none; padding: 0; margin: 0; }
    .first-run-list li {
      display: grid; grid-template-columns: 32px 1fr auto;
      gap: 14px; align-items: center;
      padding: 14px 0;
      border-top: 1px solid var(--border);
    }
    .first-run-list li:first-child { border-top: 0; }
    .first-run-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary-light); color: var(--primary-dark);
      font: 700 13px/1 'Inter', sans-serif;
    }
    .first-run-step-title { font: 600 14px/1.3 'Inter', sans-serif; color: var(--text); margin-bottom: 2px; }
    .first-run-step-desc  { font: 400 13px/1.45 'Inter', sans-serif; color: var(--text-muted); }
    .first-run-foot { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center; }
    .first-run-help { color: var(--text-muted); font: 500 13px/1.4 'Inter', sans-serif; cursor: pointer; }
    .first-run-help:hover { color: var(--primary-dark); }

    /* ── ONBOARDING TOUR (T3.10) ── */
    .onboard { text-align: left; }
    .onboard-emoji { font-size: 38px; text-align: center; margin-bottom: 6px; }
    .onboard h2 {
      font: 700 22px/1.25 'Poppins', sans-serif; color: var(--text);
      text-align: center; margin-bottom: 8px;
    }
    .onboard-sub {
      font: 400 14px/1.5 'Inter', sans-serif; color: var(--text-muted);
      text-align: center; margin-bottom: 18px;
    }
    .onboard-list {
      list-style: decimal inside; padding: 0; margin: 0 4px 16px;
      font: 400 14px/1.6 'Inter', sans-serif; color: var(--text);
    }
    .onboard-list li { margin-bottom: 4px; }
    .onboard-list strong { color: var(--primary-dark); font-weight: 600; }
    .onboard-tip {
      font: 400 13px/1.5 'Inter', sans-serif; color: var(--text-muted);
      background: var(--bg); border-radius: var(--radius-sm);
      padding: 10px 14px; margin-bottom: 4px;
    }

    /* ── CLOSE-GOAL CELEBRATION (T3.2) ── */
    .goal-celebrate {
      position: fixed; inset: 0; z-index: 9998;
      pointer-events: none; opacity: 0; transition: opacity .28s ease;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, rgba(244,180,0,.16) 0%, rgba(0,0,0,0) 60%);
      overflow: hidden;
    }
    .goal-celebrate.show { opacity: 1; }
    .gc-card {
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,.22);
      border-radius: 16px; padding: 28px 36px;
      text-align: center; max-width: 92vw;
      transform: scale(.94);
      animation: gcCardIn .35s cubic-bezier(.2,.8,.3,1) forwards;
    }
    @keyframes gcCardIn { to { transform: scale(1); } }
    .gc-emoji { font-size: 44px; line-height: 1; margin-bottom: 4px; }
    .gc-headline { font: 700 22px/1.2 'Poppins', sans-serif; color: var(--text); margin-bottom: 4px; }
    .gc-score {
      font: 700 32px/1 'Poppins', sans-serif; color: var(--primary-dark);
      margin: 8px 0 6px;
    }
    .gc-title { font: 500 14px/1.4 'Inter', sans-serif; color: var(--text); margin-bottom: 4px; max-width: 380px; }
    .gc-sub   { font: 400 13px/1.45 'Inter', sans-serif; color: var(--text-muted); margin-top: 4px; }
    .gc-bit {
      position: absolute; top: -10px;
      width: 9px; height: 13px; border-radius: 2px;
      opacity: 0;
      animation-name: gcFall;
      animation-timing-function: cubic-bezier(.55,.15,.6,.85);
      animation-fill-mode: forwards;
    }
    @keyframes gcFall {
      0%   { transform: translateY(-10px) rotate(0); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: .9; }
    }
    @media (prefers-reduced-motion: reduce) {
      .goal-celebrate, .gc-card, .gc-bit { animation: none; transition: none; }
    }

    /* ── ARCHIVE RADIAL SCORE BADGE (T3.9) ── */
    .score-badge {
      position: relative; width: 44px; height: 44px;
      display: inline-flex; align-items: center; justify-content: center;
      margin: 0 auto;
    }
    .score-badge svg { position: absolute; inset: 0; }
    .score-badge-val {
      position: relative; font: 700 13px/1 'IBM Plex Sans', sans-serif;
      color: var(--text);
    }
    .score-badge-val small { font-size: 9px; font-weight: 500; margin-left: 1px; }
    .score-badge.band-good { color: var(--green); }
    .score-badge.band-mid  { color: #F59E0B; }
    .score-badge.band-low  { color: var(--danger); }
    .score-badge.no-score  { color: var(--text-muted); font: 600 13px/1 'IBM Plex Sans', sans-serif; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .24s ease; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--neutral); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

const STATUSES = [
  { v:'not_started', label:'Not Started', emoji:'○' },
  { v:'in_progress', label:'In Progress', emoji:'◔' },
  { v:'on_track',    label:'On Track',    emoji:'●' },
  { v:'at_risk',     label:'At Risk',     emoji:'⚠' },
  { v:'blocked',     label:'Blocked',     emoji:'✕' },
  { v:'on_hold',     label:'On Hold',     emoji:'⏸' },
  { v:'completed',   label:'Completed',   emoji:'✓' },
];
const slabel = v => STATUSES.find(s=>s.v===v)?.label || v;

// "Not Started" is only honest if the initiative has never been touched.
// Once any status change, comment, or edit lands in the trail, the picker
// hides it — users must pick On Hold instead of regressing.
function hasActivity(init) {
  if (!init || !init.history) return false;
  return init.history.some(h => h.type !== 'created');
}
function pickableStatuses(init) {
  const all = STATUSES;
  if (hasActivity(init)) return all.filter(s => s.v !== 'not_started');
  return all;
}

// ═══════════════════════════════════════════
//  DATA LAYER (Supabase)
// ═══════════════════════════════════════════
// All persistence goes through `db`. `S` is the in-memory mirror —
// every mutation function writes through `db.x()` then updates `S`
// and re-renders. Sort + shape transforms live in dbXxxToState().

const db = {
  // Load everything in three parallel queries
  async loadAll() {
    // The team is now derived from `profiles` — i.e. anyone who has
    // signed into the app. The standalone `members` table is no longer
    // used as a UI source (kept in DB for now, harmless).
    //
    // T2.5 pulls measure_history for sparklines. That table only exists
    // once migration-004 is run — so the join is OPTIONAL. If it's missing
    // the whole goals query would otherwise fail and brick boot. Try the
    // rich query first; on a measure_history-shaped error, retry without it
    // and disable the sparkline feature for this session.
    const richSelect = '*, key_results(*, initiatives(*, initiative_history(*)), measure_history(*))';
    const leanSelect = '*, key_results(*, initiatives(*, initiative_history(*)))';
    let goalsRes = await sb.from('goals').select(richSelect).order('position');
    if (goalsRes.error && /measure_history/i.test(goalsRes.error.message || '')) {
      console.warn('[Compass] measure_history not found — run migration-004 to enable trend sparklines. Loading without it.');
      window._hasMeasureHistory = false;
      goalsRes = await sb.from('goals').select(leanSelect).order('position');
    } else if (!goalsRes.error) {
      window._hasMeasureHistory = true;
    }
    const [profilesRes, ideasRes] = await Promise.all([
      sb.from('profiles').select('*').order('display_name'),
      sb.from('ideas').select('*').order('created_at', { ascending: false }),
    ]);
    if (goalsRes.error)    throw goalsRes.error;
    if (profilesRes.error) throw profilesRes.error;
    if (ideasRes.error)    throw ideasRes.error;
    S.goals   = (goalsRes.data || []).map(dbGoalToState);
    S.members = (profilesRes.data || []).map(p => ({
      id: p.id,
      name: p.display_name || p.email || 'Teammate',
      email: p.email || '',
      avatar_url: p.avatar_url || '',
    }));
    S.ideas   = (ideasRes.data || []).map(dbIdeaToState);
  },

  async loadProfile() {
    if (!S.session) return null;
    const { data, error } = await sb.from('profiles').select('*').eq('id', S.session.user.id).single();
    if (error) { console.warn('Profile load failed:', error); return null; }
    S.profile = data;
    return data;
  },

  // ─── Catch-up markers (Catch-up digest) ───
  // Both write the user's own profile row (allowed by the profiles_update
  // RLS policy) and mirror into S.profile. Fire-and-forget — a failed write
  // just means the marker doesn't advance this session; no user-facing error.
  async markSeen() {
    const uid = S.session?.user?.id; if (!uid) return;
    const now = new Date().toISOString();
    if (S.profile) S.profile.last_seen_at = now;
    const { error } = await sb.from('profiles').update({ last_seen_at: now }).eq('id', uid);
    if (error) console.warn('markSeen failed:', error);
  },
  async markCaughtUp() {
    const uid = S.session?.user?.id; if (!uid) return;
    const now = new Date().toISOString();
    if (S.profile) { S.profile.last_caught_up_at = now; S.profile.last_seen_at = now; }
    const { error } = await sb.from('profiles').update({ last_caught_up_at: now, last_seen_at: now }).eq('id', uid);
    if (error) console.warn('markCaughtUp failed:', error);
  },

  // ─── Goals ───
  async createGoal(f) {
    const insertRow = {
      title: f.title, description: f.desc || '',
      quarter: f.quarter, position: f.position ?? 0,
      owner_name: f.owner || '',
    };
    const { data, error } = await sb.from('goals').insert(insertRow).select().single();
    if (error) { showDBError(error); return null; }
    return dbGoalToState({ ...data, key_results: [] });
  },
  async updateGoal(id, f) {
    const patch = {};
    if (f.title       !== undefined) patch.title       = f.title;
    if (f.desc        !== undefined) patch.description = f.desc;
    if (f.quarter     !== undefined) patch.quarter     = f.quarter;
    if (f.owner       !== undefined) patch.owner_name  = f.owner;
    if (f.status      !== undefined) patch.status      = f.status;
    if (f.closed_at   !== undefined) patch.closed_at   = f.closed_at;
    if (f.score       !== undefined) patch.score       = f.score;
    if (f.reflection  !== undefined) patch.reflection  = f.reflection;
    const { error } = await sb.from('goals').update(patch).eq('id', id);
    if (error) { showDBError(error); return false; }
    return true;
  },
  async deleteGoal(id) {
    const { error } = await sb.from('goals').delete().eq('id', id);
    if (error) { showDBError(error); return false; }
    return true;
  },

  // ─── Key Results ───
  async createKR(goalId, f) {
    const { data, error } = await sb.from('key_results').insert({
      goal_id: goalId, title: f.title,
      target_value: f.target, current_value: f.current,
      unit: f.unit, position: f.position ?? 0,
    }).select().single();
    if (error) { showDBError(error); return null; }
    return dbKRToState({ ...data, initiatives: [] });
  },
  async updateKR(id, f) {
    const patch = {
      title: f.title, target_value: f.target,
      current_value: f.current, unit: f.unit,
    };
    if (f.goalId !== undefined) patch.goal_id = f.goalId;
    const { error } = await sb.from('key_results').update(patch).eq('id', id);
    if (error) { showDBError(error); return false; }
    return true;
  },
  async deleteKR(id) {
    const { error } = await sb.from('key_results').delete().eq('id', id);
    if (error) { showDBError(error); return false; }
    return true;
  },

  // ─── Initiatives ───
  async createInitiative(krId, f) {
    const { data, error } = await sb.from('initiatives').insert({
      key_result_id: krId, title: f.title, description: f.desc || '',
      status: f.status || 'not_started',
      owner_name: f.owner || '',
      due_date: f.dueDate || null,
      position: f.position ?? 0,
    }).select().single();
    if (error) { showDBError(error); return null; }
    return dbInitToState({ ...data, initiative_history: [] });
  },
  async updateInitiative(id, f) {
    const patch = {};
    if (f.title    !== undefined) patch.title         = f.title;
    if (f.desc     !== undefined) patch.description   = f.desc;
    if (f.status   !== undefined) patch.status        = f.status;
    if (f.owner    !== undefined) patch.owner_name    = f.owner;
    if (f.dueDate  !== undefined) patch.due_date      = f.dueDate || null;
    if (f.krId     !== undefined) patch.key_result_id = f.krId;
    if (f.position !== undefined) patch.position      = f.position;
    const { error } = await sb.from('initiatives').update(patch).eq('id', id);
    if (error) { showDBError(error); return false; }
    return true;
  },
  async deleteInitiative(id) {
    const { error } = await sb.from('initiatives').delete().eq('id', id);
    if (error) { showDBError(error); return false; }
    return true;
  },

  // ─── History ───
  async addHistory(initId, entry) {
    const author_id   = S.session?.user?.id || null;
    const author_name = S.profile?.display_name || S.session?.user?.email || '';
    const { data, error } = await sb.from('initiative_history').insert({
      initiative_id: initId,
      type:          entry.type,
      event_date:    entry.date || new Date().toISOString().slice(0,10),
      note:          entry.note || null,
      text:          entry.text || null,
      from_status:   entry.from || null,
      to_status:     entry.to   || null,
      author_id, author_name,
    }).select().single();
    if (error) { showDBError(error); return null; }
    return dbHistoryToState(data);
  },

  // ─── Ideas ───
  async createIdea(f) {
    const { data, error } = await sb.from('ideas').insert({
      goal_id:       f.goalId || null,
      key_result_id: f.krId   || null,
      text:          f.text,
      created_by:    S.session?.user?.id || null,
    }).select().single();
    if (error) { showDBError(error); return null; }
    return dbIdeaToState(data);
  },
  async deleteIdea(id) {
    const { error } = await sb.from('ideas').delete().eq('id', id);
    if (error) { showDBError(error); return false; }
    return true;
  },
  async updateIdea(id, f) {
    const patch = {};
    if (f.text                 !== undefined) patch.text                   = f.text;
    if (f.status               !== undefined) patch.status                 = f.status;
    if (f.statusNote           !== undefined) patch.status_note            = f.statusNote;
    if (f.promotedInitiativeId !== undefined) patch.promoted_initiative_id = f.promotedInitiativeId;
    if (f.goalId               !== undefined) patch.goal_id                = f.goalId || null;
    if (f.krId                 !== undefined) patch.key_result_id          = f.krId   || null;
    const { error } = await sb.from('ideas').update(patch).eq('id', id);
    if (error) { showDBError(error); return false; }
    return true;
  },

  // Team is derived from `profiles` — no add/remove API; users join
  // by signing in. (Removing access happens via Supabase auth.users.)
};

// ─── DB row → state shape transforms ──────────────────────────
function dbGoalToState(g) {
  return {
    id: g.id, title: g.title, desc: g.description || '',
    quarter: g.quarter, createdAt: (g.created_at || '').slice(0, 10),
    owner: g.owner_name || '',
    status: g.status || 'active',
    closedAt: g.closed_at || null,
    score: (g.score === null || g.score === undefined) ? null : Number(g.score),
    reflection: g.reflection || '',
    keyResults: (g.key_results || []).sort(byPos).map(dbKRToState),
  };
}
function dbKRToState(kr) {
  return {
    id: kr.id, title: kr.title,
    target: Number(kr.target_value) || 0,
    current: Number(kr.current_value) || 0,
    unit: kr.unit || '',
    initiatives: (kr.initiatives || []).sort(byPos).map(dbInitToState),
    // T2.5 — chronological measure_history snapshots for the trend sparkline.
    history: (kr.measure_history || [])
      .slice() // don't mutate source
      .sort((a,b) => (a.created_at||'').localeCompare(b.created_at||''))
      .map(h => ({
        current: Number(h.current_value) || 0,
        target:  h.target_value == null ? null : Number(h.target_value),
        at:      h.created_at || '',
      })),
  };
}
function dbInitToState(i) {
  return {
    id: i.id, title: i.title, desc: i.description || '',
    status: i.status, owner: i.owner_name || '', dueDate: i.due_date || '',
    history: (i.initiative_history || []).sort(byCreated).map(dbHistoryToState),
  };
}
function dbHistoryToState(h) {
  return {
    id: h.id, type: h.type, date: h.event_date,
    // Full insert timestamp (not just the day) so the Catch-up digest can
    // filter activity by a precise "since last visit" boundary. event_date
    // alone is day-granular and would re-surface a whole day's events.
    createdAt: h.created_at || undefined,
    note: h.note || undefined, text: h.text || undefined,
    from: h.from_status || undefined, to: h.to_status || undefined,
    author_id: h.author_id || undefined,
    author_name: h.author_name || undefined,
  };
}
function dbIdeaToState(i) {
  return {
    id: i.id, text: i.text,
    goalId: i.goal_id || null, krId: i.key_result_id || null,
    createdAt: (i.created_at || '').slice(0, 10),
    status: i.status || 'captured',
    statusNote: i.status_note || '',
    promotedInitiativeId: i.promoted_initiative_id || null,
  };
}
const byPos     = (a, b) => (a.position || 0) - (b.position || 0);
const byCreated = (a, b) => {
  // Guard against missing / invalid created_at — Invalid Date coerced via
  // the subtraction operator yields NaN, which makes the sort order
  // indeterminate (different rows can swap on re-render). Fall back to 0.
  const ta = new Date(a.created_at).getTime() || 0;
  const tb = new Date(b.created_at).getTime() || 0;
  return ta - tb;
};

// ─── Error UI ───
function showDBError(error) {
  console.error('[Compass] Supabase error:', error);
  showToast(error?.message || 'Something went wrong saving your change.', true);
}
// ═══════════════════════════════════════════
//  REALTIME (live multi-user sync)
// ═══════════════════════════════════════════
// Supabase streams INSERT / UPDATE / DELETE events from each table we
// subscribe to. We mirror those changes into the in-memory `S` so the
// UI updates without anyone needing to refresh. Echo of our own writes
// is detected by checking whether the row is already in S.

let _rerenderRAF = null;
function scheduleRerender() {
  if (_rerenderRAF) return;
  _rerenderRAF = requestAnimationFrame(() => {
    _rerenderRAF = null;
    render();
  });
}

function findKRById(id) {
  for (const g of S.goals) {
    const kr = g.keyResults.find(k => k.id === id);
    if (kr) return { goal: g, kr };
  }
  return null;
}
function findInitById(id) {
  for (const g of S.goals) {
    for (const kr of g.keyResults) {
      const init = kr.initiatives.find(i => i.id === id);
      if (init) return { goal: g, kr, init };
    }
  }
  return null;
}

function onGoalChange({ eventType, new: row, old: oldRow }) {
  if (eventType === 'INSERT') {
    if (S.goals.find(g => g.id === row.id)) return;
    S.goals.push(dbGoalToState({ ...row, key_results: [] }));
    scheduleRerender();
  } else if (eventType === 'UPDATE') {
    const g = S.goals.find(g => g.id === row.id);
    if (!g) return;
    g.title = row.title;
    g.desc = row.description || '';
    g.quarter = row.quarter;
    g.owner = row.owner_name || '';
    g.status = row.status || 'active';
    g.closedAt = row.closed_at || null;
    g.score = (row.score === null || row.score === undefined) ? null : Number(row.score);
    g.reflection = row.reflection || '';
    scheduleRerender();
  } else if (eventType === 'DELETE') {
    const id = oldRow?.id; if (!id) return;
    const wasActive = S.activeGoalId === id;
    // If a drawer is open on an initiative inside this goal, close it.
    // (The cascade should also fire individual init DELETEs, but the order
    // of those events isn't guaranteed — guard explicitly.)
    if (DX && DX.gid === id) {
      closeDrawer();
    }
    S.goals = S.goals.filter(g => g.id !== id);
    // T1.3 — DB has `on delete set null` for ideas.goal_id/key_result_id; mirror
    // that in local state so the ideas wall doesn't render orphaned references
    // that crash when clicked.
    for (const idea of S.ideas) {
      if (idea.goalId === id) { idea.goalId = null; idea.krId = null; }
    }
    if (wasActive) {
      S.activeGoalId = null;
      showToast('A goal you were viewing was deleted.');
    }
    scheduleRerender();
  }
}

function onKRChange({ eventType, new: row, old: oldRow }) {
  if (eventType === 'INSERT') {
    const g = S.goals.find(g => g.id === row.goal_id); if (!g) return;
    if (g.keyResults.find(k => k.id === row.id)) return;
    g.keyResults.push(dbKRToState({ ...row, initiatives: [] }));
    scheduleRerender();
  } else if (eventType === 'UPDATE') {
    const found = findKRById(row.id); if (!found) return;
    const { goal: oldGoal, kr } = found;
    kr.title = row.title;
    kr.target = Number(row.target_value) || 0;
    kr.current = Number(row.current_value) || 0;
    kr.unit = row.unit || '';
    // Handle move between goals
    if (row.goal_id && row.goal_id !== oldGoal.id) {
      const destG = findGoal(row.goal_id);
      if (destG) {
        oldGoal.keyResults = oldGoal.keyResults.filter(k => k.id !== row.id);
        if (!destG.keyResults.find(k => k.id === row.id)) destG.keyResults.push(kr);
      }
    }
    scheduleRerender();
  } else if (eventType === 'DELETE') {
    const id = oldRow?.id; if (!id) return;
    // Close the drawer if it's open on an initiative inside this measure.
    // Toast for symmetry with onInitChange DELETE — silent close was disorienting.
    if (DX && DX.krid === id) {
      closeDrawer();
      showToast('The measure you were viewing was deleted.');
    }
    for (const g of S.goals) {
      const idx = g.keyResults.findIndex(k => k.id === id);
      if (idx >= 0) { g.keyResults.splice(idx, 1); break; }
    }
    // Mirror the DB's `on delete set null` cascade on ideas.key_result_id so
    // we don't render dangling references to a deleted measure.
    for (const idea of S.ideas) {
      if (idea.krId === id) idea.krId = null;
    }
    S.openKRs.delete(id);
    scheduleRerender();
  }
}

function onInitChange({ eventType, new: row, old: oldRow }) {
  if (eventType === 'INSERT') {
    const found = findKRById(row.key_result_id); if (!found) return;
    if (found.kr.initiatives.find(i => i.id === row.id)) return;
    found.kr.initiatives.push(dbInitToState({ ...row, initiative_history: [] }));
    scheduleRerender();
  } else if (eventType === 'UPDATE') {
    const found = findInitById(row.id); if (!found) return;
    const { kr: oldKR, init } = found;
    init.title = row.title;
    init.desc = row.description || '';
    init.status = row.status;
    init.owner = row.owner_name || '';
    init.dueDate = row.due_date || '';
    // Handle move between measures
    if (row.key_result_id && row.key_result_id !== oldKR.id) {
      const dest = findKRById(row.key_result_id);
      if (dest) {
        oldKR.initiatives = oldKR.initiatives.filter(i => i.id !== row.id);
        if (!dest.kr.initiatives.find(i => i.id === row.id)) {
          dest.kr.initiatives.push(init);
        }
        // If user has this initiative open in drawer, update crumb context
        if (DX && DX.iid === row.id) {
          DX.gid = dest.goal.id; DX.krid = dest.kr.id;
          const cr = document.getElementById('dCrumb');
          if (cr) cr.textContent = `${dest.goal.title}  ›  ${dest.kr.title}`;
        }
      }
    }
    if (DX && DX.iid === row.id) {
      refreshDrawerMeta(init);
      renderDrawerBody(init);
    }
    scheduleRerender();
  } else if (eventType === 'DELETE') {
    const id = oldRow?.id; if (!id) return;
    for (const g of S.goals) for (const kr of g.keyResults) {
      const idx = kr.initiatives.findIndex(i => i.id === id);
      if (idx >= 0) {
        kr.initiatives.splice(idx, 1);
        if (DX && DX.iid === id) {
          closeDrawer();
          showToast('This initiative was deleted by someone.');
        }
        scheduleRerender();
        return;
      }
    }
  }
}

function onHistoryChange({ eventType, new: row }) {
  // Only INSERT — history rows aren't edited/deleted in our app.
  if (eventType !== 'INSERT') return;
  const found = findInitById(row.initiative_id); if (!found) return;
  if (found.init.history.find(h => h.id === row.id)) return;
  found.init.history.push(dbHistoryToState(row));
  if (DX && DX.iid === row.initiative_id) {
    renderDrawerBody(found.init);
  }
  scheduleRerender();
}

// T2.5 — append a measure-history snapshot to its measure when one arrives
// from the DB trigger. Only INSERT is fired (the trigger never edits or
// deletes; cascade handles removal when the measure itself is deleted).
function onMeasureHistoryChange({ eventType, new: row }) {
  if (eventType !== 'INSERT') return;
  const found = findKRById(row.key_result_id); if (!found) return;
  const { kr } = found;
  if (!kr.history) kr.history = [];
  // The trigger fires after our own optimistic update too, so de-dupe by id.
  if (kr.history.find(h => h.id === row.id)) return;
  kr.history.push({
    id: row.id,
    current: Number(row.current_value) || 0,
    target:  row.target_value == null ? null : Number(row.target_value),
    at:      row.created_at || '',
  });
  scheduleRerender();
}

function onIdeaChange({ eventType, new: row, old: oldRow }) {
  if (eventType === 'INSERT') {
    if (S.ideas.find(i => i.id === row.id)) return;
    S.ideas.unshift(dbIdeaToState(row));
    scheduleRerender();
  } else if (eventType === 'UPDATE') {
    const idx = S.ideas.findIndex(i => i.id === row.id);
    if (idx >= 0) {
      S.ideas[idx] = dbIdeaToState(row);
      scheduleRerender();
    }
  } else if (eventType === 'DELETE') {
    const id = oldRow?.id; if (!id) return;
    S.ideas = S.ideas.filter(i => i.id !== id);
    scheduleRerender();
  }
}

function onProfileChange({ eventType, new: row, old: oldRow }) {
  if (eventType === 'INSERT') {
    if (S.members.find(m => m.id === row.id)) return;
    S.members.push({
      id: row.id,
      name: row.display_name || row.email || 'Teammate',
      email: row.email || '',
      avatar_url: row.avatar_url || '',
    });
    scheduleRerender();
  } else if (eventType === 'UPDATE') {
    let m = S.members.find(m => m.id === row.id);
    // T1.10 — if this is a first-time UPDATE before the INSERT echo landed,
    // make sure the member row exists *before* we touch S.profile, so any
    // render reading both observes a consistent state.
    if (!m) {
      m = {
        id: row.id,
        name: row.display_name || row.email || 'Teammate',
        email: row.email || '',
        avatar_url: row.avatar_url || '',
      };
      S.members.push(m);
    } else {
      m.name = row.display_name || row.email || 'Teammate';
      m.email = row.email || '';
      m.avatar_url = row.avatar_url || '';
    }
    if (row.id === S.session?.user?.id) S.profile = row;
    scheduleRerender();
  } else if (eventType === 'DELETE') {
    const id = oldRow?.id; if (!id) return;
    S.members = S.members.filter(m => m.id !== id);
    scheduleRerender();
  }
}

let _rtReconnectTimer = null;
function setupRealtime() {
  if (window._rtChannel) {
    try { sb.removeChannel(window._rtChannel); } catch (e) {}
  }
  if (_rtReconnectTimer) { clearTimeout(_rtReconnectTimer); _rtReconnectTimer = null; }
  let channel = sb.channel('compass-room')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'goals' },              onGoalChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'key_results' },        onKRChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'initiatives' },        onInitChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'initiative_history' }, onHistoryChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ideas' },              onIdeaChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' },           onProfileChange);
  // Only subscribe to measure_history if migration-004 has been applied —
  // otherwise a missing table can churn the channel into a reconnect loop.
  if (window._hasMeasureHistory !== false) {
    channel = channel.on('postgres_changes', { event: '*', schema: 'public', table: 'measure_history' }, onMeasureHistoryChange);
  }
  channel = channel
    .subscribe(status => {
      console.log('[Compass] Realtime channel status:', status);
      // Without explicit reconnect handling, a brief network blip leaves the
      // app silently un-synced — UI keeps working, but nothing new shows up
      // from other clients until reload. Re-subscribe with a 3s delay on
      // hard errors. SUBSCRIBED / CLOSED are normal lifecycle, not errors.
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        if (_rtReconnectTimer) return; // already scheduled
        _rtReconnectTimer = setTimeout(() => {
          _rtReconnectTimer = null;
          console.log('[Compass] Realtime: attempting reconnect…');
          setupRealtime();
        }, 3000);
      }
    });
  window._rtChannel = channel;
}

// ─── Undo-on-delete toast manager ───
// Pattern: on delete, hide from UI immediately, show a 5s toast with
// an "Undo" button. The actual DB delete only fires when the timer
// expires. Clicking Undo cancels the timer and restores the UI.
// Reloading the page during the window will commit the delete via the
// beforeunload handler (best effort).
let _pendingUndo = null; // { hideToast, commit, undo, timer }

function flushPendingUndo() {
  if (!_pendingUndo) return;
  const p = _pendingUndo;
  _pendingUndo = null;
  clearTimeout(p.timer);
  p.hideToast();
  // Commit synchronously-ish; can't await before unload reliably
  try { p.commit(); } catch (e) { console.error('[Compass] Flush commit failed:', e); }
}

function ensureUndoHost() {
  let host = document.getElementById('undoToast');
  if (!host) {
    host = document.createElement('div');
    host.id = 'undoToast';
    host.className = 'undo-toast';
    host.setAttribute('role', 'status');
    host.setAttribute('aria-live', 'polite');
    document.body.appendChild(host);
  }
  return host;
}

function showUndoToast(message, undo, commit, durationMs = 5000) {
  // If a previous pending delete exists, commit it first.
  if (_pendingUndo) {
    const prev = _pendingUndo; _pendingUndo = null;
    clearTimeout(prev.timer);
    prev.hideToast();
    try { prev.commit(); } catch (e) { console.error('[Compass] Prev commit failed:', e); }
  }

  const host = ensureUndoHost();
  host.innerHTML = `
    <span class="undo-toast-text"></span>
    <button type="button" class="undo-toast-btn">Undo</button>
    <span class="undo-toast-progress" style="animation-duration:${durationMs}ms"></span>
  `;
  host.querySelector('.undo-toast-text').textContent = message;

  const hide = () => host.classList.remove('show');
  // trigger show via rAF so the entrance transition runs
  requestAnimationFrame(() => host.classList.add('show'));

  const timer = setTimeout(async () => {
    if (_pendingUndo?.timer !== timer) return;
    _pendingUndo = null;
    hide();
    try { await commit(); }
    catch (e) {
      console.error('[Compass] Delete commit failed:', e);
      // commit failed — try to undo so UI matches DB
      try { undo(); } catch (e2) {}
      showToast('Could not delete — restored.', true);
    }
  }, durationMs);

  host.querySelector('.undo-toast-btn').addEventListener('click', () => {
    if (_pendingUndo?.timer !== timer) return;
    clearTimeout(timer);
    _pendingUndo = null;
    hide();
    try { undo(); } catch (e) { console.error('[Compass] Undo failed:', e); }
  });

  _pendingUndo = { hideToast: hide, commit, undo, timer };
}

// Make sure pending deletes commit if user navigates away
window.addEventListener('beforeunload', flushPendingUndo);

// ─── Button busy / double-submit guard ───
// Wraps an async mutation so the triggering button shows a spinner
// and ignores subsequent clicks until the await resolves.
async function withButtonBusy(button, fn) {
  if (!button || button.disabled || button._busy) {
    return fn ? (button?._busy ? undefined : fn()) : undefined;
  }
  button._busy = true;
  const origHTML = button.innerHTML;
  const origDisabled = button.disabled;
  // Extract the human label (strip tags from origHTML) for the spinner state
  const tmp = document.createElement('div');
  tmp.innerHTML = origHTML;
  const label = (tmp.textContent || '').trim() || 'Saving…';
  button.disabled = true;
  button.classList.add('is-busy');
  button.innerHTML = `<span class="btn-spinner" aria-hidden="true"></span><span>${esc(label)}</span>`;
  try {
    return await fn();
  } catch (e) {
    console.error('[Compass] Mutation threw:', e);
    showToast(e?.message || 'Something went wrong.', true);
  } finally {
    button._busy = false;
    if (button.isConnected) {
      button.innerHTML = origHTML;
      button.disabled = origDisabled;
      button.classList.remove('is-busy');
    }
  }
}
function flashError(inputId, msg) {
  const el = document.getElementById(inputId);
  if (!el) return;
  el.style.borderColor = 'var(--danger)';
  el.focus();
  let warn = document.getElementById(inputId+'-warn');
  if (!warn) {
    warn = document.createElement('div');
    warn.id = inputId+'-warn';
    warn.style.cssText = 'color:var(--danger);font-size:13px;margin-top:5px;font-weight:500';
    el.parentNode.appendChild(warn);
  }
  warn.textContent = msg;
  setTimeout(()=>{ el.style.borderColor=''; warn?.remove(); }, 3200);
}

// ── Quarter helpers ──
// Compass uses calendar quarters. Update these helpers if Zostel ever
// switches to a fiscal year that doesn't start in January.
function quarterOf(date = new Date()) {
  return Math.floor(date.getMonth() / 3) + 1;
}
function currentQuarterLabel(date = new Date()) {
  return `Q${quarterOf(date)} ${date.getFullYear()}`;
}
function shiftQuarter(label, deltaQuarters) {
  const m = /^Q([1-4]) (\d{4})$/.exec(label || '');
  if (!m) return currentQuarterLabel();
  let q = Number(m[1]) - 1 + deltaQuarters;
  let y = Number(m[2]);
  while (q < 0)  { q += 4; y -= 1; }
  while (q > 3)  { q -= 4; y += 1; }
  return `Q${q + 1} ${y}`;
}
// Returns the quarter options to show in the goal modal: the previous
// quarter, the current quarter, and the next three. Always includes a
// goal's own quarter (e.g. an old closed goal whose quarter is in the
// past, so editors can still see + keep it).
function quarterOptions(includeQuarter) {
  const cur = currentQuarterLabel();
  const opts = [
    shiftQuarter(cur, -1),
    cur,
    shiftQuarter(cur, 1),
    shiftQuarter(cur, 2),
    shiftQuarter(cur, 3),
  ];
  if (includeQuarter && !opts.includes(includeQuarter)) opts.unshift(includeQuarter);
  return opts;
}
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function fmtDate(s) {
  if(!s) return '';
  try { return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}); } catch(_){return s;}
}
function fmtDateLong(s) {
  if(!s) return '';
  try { return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); } catch(_){return s;}
}
function fmtNum(n) {
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(0)+'K';
  return n;
}
function goalProgress(g) {
  // On-hold initiatives are paused work — they shouldn't drag the
  // percentage down. Exclude them from the denominator entirely so
  // the bar reflects only the work the team is actively pursuing.
  let tot=0,good=0;
  g.keyResults.forEach(kr=>kr.initiatives.forEach(i=>{
    if (i.status === 'on_hold') return;
    tot++;
    if (i.status === 'completed' || i.status === 'on_track') good++;
  }));
  return tot?Math.round(good/tot*100):0;
}
function krProgress(kr) {
  if(!kr.target) return 0;
  return Math.min(100,Math.round(kr.current/kr.target*100));
}
function progColor(p) { return p>=70?'g':p>=40?'y':'r'; }

function findGoal(gid) { return S.goals.find(g=>g.id===gid); }
function findKR(g,krid) { return g?.keyResults.find(k=>k.id===krid); }
function findInit(kr,iid) { return kr?.initiatives.find(i=>i.id===iid); }

// ═══════════════════════════════════════════
//  CATCH-UP DIGEST  (since-last-visit view)
// ═══════════════════════════════════════════

// Compact relative time: "just now", "3h ago", "2d ago", else a date.
function fmtRelative(iso) {
  if (!iso) return '';
  const t = new Date(iso).getTime();
  if (!t) return '';
  const mins = Math.floor((Date.now() - t) / 60000);
  if (mins < 1)   return 'just now';
  if (mins < 60)  return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)   return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7)   return `${days}d ago`;
  return fmtDate(iso.slice(0, 10));
}

const MS_DAY = 86400000;

// Pure: assemble the team-wide activity pile + forward agenda from S.
// `prevSeenISO`    — the "new vs already-glanced" line (ISO string or null).
// `caughtUpISO`    — floor of the visible pile (ISO string or null).
// First-ever use (null caughtUp) falls back to a 7-day window.
function buildDigest(prevSeenISO, caughtUpISO) {
  const nowMs    = Date.now();
  const floorMs  = caughtUpISO ? new Date(caughtUpISO).getTime() : (nowMs - 7 * MS_DAY);
  const seenMs   = prevSeenISO ? new Date(prevSeenISO).getTime() : floorMs;
  const todayStr = new Date().toISOString().slice(0, 10);

  const events = [];
  const push = (ts, ev) => {
    const ms = new Date(ts).getTime();
    if (!ms || ms <= floorMs) return;
    events.push({ ...ev, ts, ms, isNew: ms > seenMs });
  };

  const counts = { completed: 0, status: 0, comments: 0, measures: 0, goalsClosed: 0, ideas: 0, created: 0 };

  for (const g of S.goals) {
    // Goal close-outs
    if (g.status === 'closed' && g.closedAt) {
      push(g.closedAt, {
        kind: 'goal_closed', icon: '🏁',
        title: `Goal closed — ${g.title}`,
        detail: (g.score != null ? `Scored ${Math.round(g.score * 100)}%` : 'Wrapped up'),
        goalTitle: g.title,
      });
      const ms = new Date(g.closedAt).getTime();
      if (ms && ms > floorMs) counts.goalsClosed++;
    }
    for (const kr of g.keyResults) {
      // Measure movements (skip the very first baseline snapshot)
      const hist = kr.history || [];
      for (let i = 1; i < hist.length; i++) {
        const prev = hist[i - 1], cur = hist[i];
        if (cur.current === prev.current) continue;
        push(cur.at, {
          kind: 'measure', icon: '📈',
          title: `${kr.title}`,
          detail: `${fmtNum(prev.current)} → ${fmtNum(cur.current)}${kr.unit === '%' ? '%' : (kr.unit ? ' ' + kr.unit : '')}`,
          goalTitle: g.title, krTitle: kr.title,
        });
        const ms = new Date(cur.at).getTime();
        if (ms && ms > floorMs) counts.measures++;
      }
      // Initiative history
      for (const init of kr.initiatives) {
        for (const h of (init.history || [])) {
          const ts = h.createdAt || (h.date ? h.date + 'T12:00:00' : null);
          if (!ts) continue;
          const ms = new Date(ts).getTime();
          if (!ms || ms <= floorMs) continue;

          let kind = h.type, ic = '•', title = init.title, detail = '';
          if (h.type === 'created') {
            ic = '✨'; detail = 'New initiative'; counts.created++;
          } else if (h.type === 'status_change') {
            ic = h.to === 'completed' ? '✅' : (h.to === 'at_risk' || h.to === 'blocked' ? '⚠️' : '🔄');
            detail = `${h.from ? slabel(h.from) + ' → ' : ''}${slabel(h.to)}`;
            if (h.note) detail += ` · "${h.note}"`;
            if (h.to === 'completed') counts.completed++; else counts.status++;
          } else if (h.type === 'comment') {
            ic = '💬'; detail = h.text || ''; counts.comments++;
          } else if (h.type === 'edited') {
            ic = '✏️'; detail = h.note || 'Edited';
          }
          push(ts, {
            kind: 'init_' + h.type, icon: ic, title, detail,
            who: h.author_name || '', goalTitle: g.title, krTitle: kr.title,
            gid: g.id, krid: kr.id, iid: init.id,
          });
        }
      }
    }
  }

  // Ideas captured (day-granular)
  for (const idea of S.ideas) {
    if ((idea.status || 'captured') !== 'captured') continue;
    const ts = idea.createdAt ? idea.createdAt + 'T12:00:00' : null;
    if (!ts) continue;
    const ms = new Date(ts).getTime();
    if (!ms || ms <= floorMs) continue;
    counts.ideas++;
    push(ts, {
      kind: 'idea', icon: '💡', title: 'New idea captured',
      detail: idea.text,
    });
  }

  events.sort((a, b) => b.ms - a.ms);

  // ── Forward agenda (independent of markers) ──
  const dueSoon = [], overdue = [], needsAttention = [], stalled = [];
  const soonCutoff = new Date(nowMs + 7 * MS_DAY).toISOString().slice(0, 10);
  for (const g of S.goals) {
    if (g.status === 'closed') continue;
    for (const kr of g.keyResults) {
      for (const init of kr.initiatives) {
        if (init.status === 'completed' || init.status === 'on_hold') continue;
        const ref = { gid: g.id, krid: kr.id, iid: init.id, title: init.title, owner: init.owner, status: init.status, dueDate: init.dueDate, goalTitle: g.title, krTitle: kr.title };
        const isOverdue = init.dueDate && init.dueDate < todayStr;
        if (isOverdue) overdue.push(ref);
        else if (init.dueDate && init.dueDate <= soonCutoff) dueSoon.push(ref);
        if (init.status === 'at_risk' || init.status === 'blocked') needsAttention.push(ref);
        const sd = daysSinceLastActivity(init);
        if (!isOverdue && sd != null && sd >= 14) stalled.push({ ...ref, staleDays: sd });
      }
    }
  }

  return { events, counts, floorMs, seenMs, dueSoon, overdue, needsAttention, stalled };
}

function renderDigestPage(el) {
  // Snapshot the "previously seen" line for THIS render, then advance it so
  // these items read as "earlier" next visit. Same suppress-then-write trick
  // as the deep-link router.
  const prevSeen = _digestPrevSeen;
  const caughtUp = S.profile?.last_caught_up_at || null;
  const d = buildDigest(prevSeen, caughtUp);

  const newEvents  = d.events.filter(e => e.isNew);
  const seenEvents = d.events.filter(e => !e.isNew);
  const CAP = 60;
  const capped = d.events.length > CAP;

  const c = d.counts;
  const summaryBits = [
    c.completed   ? `<span class="dg-stat"><b>${c.completed}</b> completed</span>` : '',
    c.created     ? `<span class="dg-stat"><b>${c.created}</b> new</span>` : '',
    c.status      ? `<span class="dg-stat"><b>${c.status}</b> status change${c.status>1?'s':''}</span>` : '',
    c.comments    ? `<span class="dg-stat"><b>${c.comments}</b> update${c.comments>1?'s':''}</span>` : '',
    c.measures    ? `<span class="dg-stat"><b>${c.measures}</b> measure move${c.measures>1?'s':''}</span>` : '',
    c.goalsClosed ? `<span class="dg-stat"><b>${c.goalsClosed}</b> goal${c.goalsClosed>1?'s':''} closed</span>` : '',
    c.ideas       ? `<span class="dg-stat"><b>${c.ideas}</b> idea${c.ideas>1?'s':''}</span>` : '',
  ].filter(Boolean).join('');

  const eventRow = (e) => {
    const ctx = e.krTitle ? `${esc(e.goalTitle)} › ${esc(e.krTitle)}` : (e.goalTitle ? esc(e.goalTitle) : '');
    const who = e.who ? `${esc(e.who)} · ` : '';
    const clickable = e.iid ? ` onclick="openDrawer('${e.gid}','${e.krid}','${e.iid}')" role="button" tabindex="0"` : '';
    return `<div class="dg-item${e.isNew?' is-new':''}${e.iid?' is-clickable':''}"${clickable}>
      <div class="dg-ico">${e.icon}</div>
      <div class="dg-body">
        <div class="dg-title">${esc(e.title)}</div>
        ${e.detail ? `<div class="dg-detail">${esc(e.detail)}</div>` : ''}
        <div class="dg-meta">${who}${fmtRelative(e.ts)}${ctx?` · ${ctx}`:''}</div>
      </div>
    </div>`;
  };

  const horizonRow = (r, extra = '') => `<div class="dg-item is-clickable" onclick="openDrawer('${r.gid}','${r.krid}','${r.iid}')" role="button" tabindex="0">
    <div class="init-dot dot-${r.status}"></div>
    <div class="dg-body">
      <div class="dg-title">${esc(r.title)}</div>
      <div class="dg-meta">${esc(r.goalTitle)} › ${esc(r.krTitle)}${r.owner?` · ${esc(r.owner)}`:''}${extra}</div>
    </div>
    <div class="dg-side"><span class="badge badge-${r.status}">${slabel(r.status)}</span></div>
  </div>`;

  const horizonSection = (title, list, icon, rowFn) => list.length ? `
    <div class="dg-horizon-group">
      <div class="dg-horizon-title">${icon} ${title} <span class="dg-count">${list.length}</span></div>
      ${list.map(rowFn).join('')}
    </div>` : '';

  const pileEmpty = d.events.length === 0;

  el.innerHTML = `<div class="fade-up">
    <div class="banner" style="--banner-icon: '🧭'">
      <h2>Since you were last here</h2>
      <p>Everything the team moved since you last caught up — plus what's coming up next.</p>
      ${!pileEmpty ? `<button class="btn btn-primary banner-cta" type="button" onclick="markCaughtUp()">✓ Mark all caught up</button>` : ''}
    </div>

    ${pileEmpty
      ? `<div class="empty"><div class="empty-icon">🎉</div><h3>You're all caught up</h3><p>No new team activity since your last check-in. Scroll down for what's on the horizon.</p></div>`
      : `<div class="dg-summary">${summaryBits || '<span class="dg-stat">Activity since your last catch-up</span>'}</div>
         ${newEvents.length ? `<div class="dg-section">
            <div class="dg-section-head">New since your last visit <span class="dg-count dg-count-new">${newEvents.length}</span></div>
            ${newEvents.slice(0, CAP).map(eventRow).join('')}
          </div>` : ''}
         ${seenEvents.length ? `<div class="dg-section">
            <div class="dg-section-head dg-section-muted">Earlier — seen, not yet cleared <span class="dg-count">${seenEvents.length}</span></div>
            ${seenEvents.slice(0, Math.max(0, CAP - newEvents.length)).map(eventRow).join('')}
          </div>` : ''}
         ${capped ? `<div class="dg-more">+ ${d.events.length - CAP} earlier change${d.events.length - CAP > 1?'s':''} not shown · clear the pile to reset</div>` : ''}`
    }

    ${(d.overdue.length || d.dueSoon.length || d.needsAttention.length || d.stalled.length) ? `
      <div class="dg-horizon">
        <div class="dg-horizon-head">🔭 On the horizon</div>
        ${horizonSection('Overdue', d.overdue, '🔴', r => horizonRow(r, r.dueDate?` · due ${fmtDate(r.dueDate)}`:''))}
        ${horizonSection('Due this week', d.dueSoon, '🟡', r => horizonRow(r, r.dueDate?` · due ${fmtDate(r.dueDate)}`:''))}
        ${horizonSection('Needs a hand', d.needsAttention, '⚠️', r => horizonRow(r))}
        ${horizonSection('Gone quiet (14d+)', d.stalled, '🌙', r => horizonRow(r, ` · quiet ${r.staleDays}d`))}
      </div>` : ''}
  </div>`;

  // Advance the seen marker exactly ONCE per visit — not on every render.
  // Re-renders happen while viewing (e.g. realtime activity arriving, or the
  // markSeen write echoing back through onProfileChange); calling markSeen on
  // each would (a) loop writes and (b) destabilise the new/earlier split. The
  // guard resets in goToDigest / the deep-link branch on each fresh open.
  if (!_digestSeenMarked) {
    _digestSeenMarked = true;
    db.markSeen();
    const dc = document.getElementById('navDigestCount');
    if (dc) dc.style.display = 'none';
  }
}

// Module-level snapshot of last_seen_at captured at navigation time, before
// markSeen() advances it — so renderDigestPage can still tell new from seen.
// _digestSeenMarked ensures the seen marker advances once per visit, not on
// every re-render (which would loop writes via the realtime echo).
let _digestPrevSeen = null;
let _digestSeenMarked = false;

function goToDigest() {
  _digestPrevSeen = S.profile?.last_seen_at || null;
  _digestSeenMarked = false;
  S.view = 'digest';
  S.activeGoalId = null;
  render();
  closeSidebar();
  document.getElementById('mainContent')?.scrollTo({ top: 0, behavior: 'instant' });
  writeHashFromState();
}

async function markCaughtUp() {
  await db.markCaughtUp();
  _digestPrevSeen = S.profile?.last_seen_at || null;
  render();
  showToast('All caught up — pile cleared. 🧭');
}

// Count of activity newer than the user's last_seen_at — drives the sidebar
// "new" badge. Cheap reuse of buildDigest against the seen line as the floor.
function countNewSinceSeen() {
  const seen = S.profile?.last_seen_at || null;
  if (!seen) {
    // Never visited: surface the 7-day pile size as the nudge.
    return buildDigest(null, null).events.length;
  }
  return buildDigest(seen, seen).events.length;
}

// T3.9 — radial ring around the score percentage. Three colour bands match
// the OKR rule of thumb (0.7+ green, 0.4–0.6 amber, <0.4 red). Returns a
// muted placeholder if no score was set at close-out.
function renderScoreBadge(score) {
  if (score == null) {
    return `<div class="score-badge no-score" title="No score set">—</div>`;
  }
  const pct = Math.max(0, Math.min(100, Math.round(score * 100)));
  const band = pct >= 70 ? 'good' : pct >= 40 ? 'mid' : 'low';
  // SVG ring: r=18 → C=2πr≈113.1. dasharray fills proportional to pct.
  const C = 113.1;
  const offset = (C * (1 - pct / 100)).toFixed(1);
  return `<div class="score-badge band-${band}" title="Scored ${pct}%">
    <svg viewBox="0 0 44 44" width="44" height="44" aria-hidden="true">
      <circle cx="22" cy="22" r="18" fill="none" stroke="currentColor" stroke-width="3.5" opacity=".18" />
      <circle cx="22" cy="22" r="18" fill="none" stroke="currentColor" stroke-width="3.5"
        stroke-dasharray="${C}" stroke-dashoffset="${offset}" stroke-linecap="round"
        transform="rotate(-90 22 22)" />
    </svg>
    <span class="score-badge-val">${pct}<small>%</small></span>
  </div>`;
}

function renderArchivePage(el) {
  const closed = S.goals.filter(g => g.status === 'closed')
    .sort((a,b) => (b.closedAt||'').localeCompare(a.closedAt||''));

  // Group by quarter for easier scanning
  const groups = {};
  for (const g of closed) {
    const q = g.quarter || 'Unscheduled';
    if (!groups[q]) groups[q] = [];
    groups[q].push(g);
  }
  const quarterKeys = Object.keys(groups).sort((a,b) => {
    // Sort newest quarter first by parsing "Q# YYYY"
    const ma = /^Q([1-4]) (\d{4})$/.exec(a);
    const mb = /^Q([1-4]) (\d{4})$/.exec(b);
    if (!ma || !mb) return a.localeCompare(b);
    const va = Number(mb[2]) * 4 + Number(mb[1]);
    const vb = Number(ma[2]) * 4 + Number(ma[1]);
    return va - vb;
  });

  const goalRow = (g) => {
    const iC = g.keyResults.reduce((a,k)=>a+k.initiatives.length,0);
    const done = g.keyResults.reduce((a,k)=>a+k.initiatives.filter(i=>i.status==='completed').length,0);
    const scoreBadge = renderScoreBadge(g.score);
    return `<div class="arch-row" onclick="selectGoal('${g.id}')">
      <div class="arch-main">
        <div class="arch-title">${esc(g.title)}</div>
        <div class="arch-meta">

// T2.5 — sparkline of the measure's recent current_value snapshots. Returns
// an empty string when there's only one data point (nothing to draw a trend
// from yet — the bar already tells you the level). Last 12 points, 64×16.
function renderKRSparkline(kr) {
  const pts = (kr.history || []).slice(-12);
  if (pts.length < 2) return '';
  const W = 64, H = 16, PAD = 1;
  const vals = pts.map(p => p.current);
  const lo = Math.min(...vals), hi = Math.max(...vals);
  const span = (hi - lo) || 1;
  const x = i => PAD + (i * (W - PAD * 2)) / (pts.length - 1);
  const y = v => H - PAD - ((v - lo) / span) * (H - PAD * 2);
  const path = pts.map((p, i) => `${i ? 'L' : 'M'}${x(i).toFixed(1)},${y(p.current).toFixed(1)}`).join(' ');
  // Up or down vs first point determines the colour mood. We use --green for
  // upward, --text-muted for flat, --danger only if the *latest* is below
  // the first by more than ~5% of span (avoid flapping on noisy data).
  const first = pts[0].current, last = pts[pts.length - 1].current;
  let stroke = 'var(--text-muted)';
  if (last > first + span * 0.05) stroke = 'var(--green)';
  else if (last < first - span * 0.05) stroke = 'var(--danger)';
  const title = `Trend: ${pts.length} snapshots, ${fmtNum(first)} → ${fmtNum(last)}`;
  return `<svg class="kr-sparkline" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" aria-label="${title}">
    <title>${title}</title>
    <path d="${path}" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </svg>`;
}

// Days since last activity on this initiative (status change or comment). null if none.
function daysSinceLastActivity(init) {
  if (!init.history || !init.history.length) return null;
  let latest = 0;
  for (const h of init.history) {
    if (!h.date) continue;
    const t = new Date(h.date).getTime();
    if (t > latest) latest = t;
  }
  if (!latest) return null;
  return Math.floor((Date.now() - latest) / 86400000);
}

function initRow(g, kr, init) {
  const coms=init.history.filter(h=>h.type==='comment').length;
  const today = new Date().toISOString().slice(0,10);
  // On-hold is a deliberate pause — the clock stops. Don't shame paused
  // work with overdue or stale chips; the team chose to park it.
  const isLive = init.status !== 'completed' && init.status !== 'on_hold';
  const overdueFlag = isLive && init.dueDate && init.dueDate < today;
  const staleDays   = isLive ? daysSinceLastActivity(init) : null;
  const isStale     = staleDays != null && staleDays >= 14 && !overdueFlag;
  const dueText = init.dueDate
    ? `${icon('calendar')} ${overdueFlag?'Overdue · ':''}${fmtDate(init.dueDate)}`
    : '';
  const dueClass = overdueFlag ? 'ir-due overdue' : 'ir-due';
  const flagChip = overdueFlag
    ? `<span class="flag-chip flag-overdue" title="Past its due date">!</span>`
    : (isStale ? `<span class="flag-chip flag-stale" title="This initiative's been quiet for ${staleDays} days — might need a check-in 🧭">~</span>` : '');
  return `<div class="init-row${overdueFlag?' is-overdue':''}${isStale?' is-stale':''}" onclick="openDrawer('${g.id}','${kr.id}','${init.id}')">
    <div class="init-dot dot-${init.status}"></div>
    <div class="init-name">${flagChip}${esc(init.title)}</div>
    <div class="ir-status"><span class="badge badge-${init.status}">${slabel(init.status)}</span></div>
    <div class="ir-owner">${init.owner?`${icon('user')} ${esc(init.owner)}`:''}</div>
    <div class="${dueClass}">${dueText}</div>
    <div class="ir-comments">${icon('message')} ${coms}</div>
    <button class="del-btn" onclick="event.stopPropagation();deleteInit('${g.id}','${kr.id}','${init.id}')" title="Delete">✕</button>
  </div>`;
}

function sparkleBurstFromRect(rect) {
  if (!rect || !rect.width) return;
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const N = 14;
  for (let i = 0; i < N; i++) {
    const dot = document.createElement('span');
    dot.className = 'idea-spark';
    if (i % 3 === 0) dot.classList.add('s-sm');
    if (i % 5 === 0) dot.classList.add('s-green');
    document.body.appendChild(dot);
    const angle = (Math.PI * 2 * i) / N + (Math.random() * 0.4 - 0.2);
    const dist  = 38 + Math.random() * 80;
    const dx    = Math.cos(angle) * dist;
    const dy    = Math.sin(angle) * dist - 22; // slight upward bias
    dot.style.left = cx + 'px';
    dot.style.top  = cy + 'px';
    dot.style.setProperty('--dx', dx + 'px');
    dot.style.setProperty('--dy', dy + 'px');
    dot.style.animationDelay = (i * 6) + 'ms';
    setTimeout(() => dot.remove(), 1000);
  }
}

function renderIdeaFilters() {
  if (!S.ideas.length && !S.goals.length) return '';
  // Active = captured | parked (anything still actionable)
  const isActive = i => {
    const st = i.status || 'captured';
    return st === 'captured' || st === 'parked';
  };
  const counts = {
    active:   S.ideas.filter(isActive).length,
    parked:   S.ideas.filter(i => i.status === 'parked').length,
    promoted: S.ideas.filter(i => i.status === 'promoted').length,
    rejected: S.ideas.filter(i => i.status === 'rejected').length,
    all:      S.ideas.length,
    unlinked: S.ideas.filter(i => !i.goalId && isActive(i)).length,
  };
  S.goals.forEach(g => {
    counts[g.id] = S.ideas.filter(i => i.goalId === g.id && isActive(i)).length;
  });

  const chip = (key, label, n) => `<button class="idea-filter${ideaFilter===key?' active':''}" type="button" onclick="setIdeaFilter('${key}')"><span class="idea-filter-label">${label}</span><span class="idea-filter-count">${n}</span></button>`;

  const chips = [];
  chips.push(chip('active', 'Active', counts.active));
  if (counts.unlinked > 0) chips.push(chip('unlinked', 'Loose ideas', counts.unlinked));
  S.goals.forEach(g => {
    if (counts[g.id] > 0) chips.push(chip(g.id, esc(g.title), counts[g.id]));
  });
  if (counts.parked > 0)   chips.push(chip('parked',   'Parked',     counts.parked));
  if (counts.promoted > 0) chips.push(chip('promoted', 'Promoted',   counts.promoted));
  if (counts.rejected > 0) chips.push(chip('rejected', 'Rejected',   counts.rejected));
  chips.push(chip('all',    'All',       counts.all));
  return `<div class="idea-filters">${chips.join('')}</div>`;
}

function setIdeaFilter(f) { ideaFilter = f; renderMain(); }

function renderIdeasGrid() {
  let list = S.ideas;
  const isActive = i => {
    const st = i.status || 'captured';
    return st === 'captured' || st === 'parked';
  };
  if      (ideaFilter === 'active')   list = list.filter(isActive);
  else if (ideaFilter === 'unlinked') list = list.filter(i => !i.goalId && isActive(i));
  else if (ideaFilter === 'parked')   list = list.filter(i => i.status === 'parked');
  else if (ideaFilter === 'promoted') list = list.filter(i => i.status === 'promoted');
  else if (ideaFilter === 'rejected') list = list.filter(i => i.status === 'rejected');
  else if (ideaFilter === 'all')      { /* no-op */ }
  else                                list = list.filter(i => i.goalId === ideaFilter && isActive(i));

  list = [...list].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));

  if (!list.length) return `<div class="empty" style="padding:24px"><p>Nothing here yet — try a different filter or add an idea above.</p></div>`;

  return `<div class="ideas-grid">${list.map(renderIdeaCard).join('')}</div>`;
}
