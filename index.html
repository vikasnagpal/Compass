function renderIdeaCard(idea) {
  const g = idea.goalId ? findGoal(idea.goalId) : null;
  const kr = (g && idea.krId) ? findKR(g, idea.krId) : null;
  const fresh = idea.id === justAddedIdeaId ? ' fresh' : '';
  const st = idea.status || 'captured';
  const stChip = st !== 'captured' ? `<span class="idea-status-chip status-${st}">${ideaStatusLabel(st)}</span>` : '';
  let actions;
  if (st === 'promoted') {
    // Show link to the promoted initiative if we can find it
    let goLink = '';
    if (idea.promotedInitiativeId) {
      // Find the initiative
      outer: for (const gg of S.goals) {
        for (const k of gg.keyResults) {
          const found = k.initiatives.find(i => i.id === idea.promotedInitiativeId);
          if (found) {
            goLink = `<button class="btn btn-outline btn-sm" type="button" onclick="openDrawer('${gg.id}','${k.id}','${found.id}')">Open initiative →</button>`;
            break outer;
          }
        }
      }
    }
    actions = `${goLink}
      <button class="btn-link" type="button" onclick="setIdeaStatus('${idea.id}','captured')" title="Move back to active">Un-promote</button>`;
  } else if (st === 'parked') {
    actions = `<button class="btn btn-outline btn-sm" type="button" onclick="openPromoteModal('${idea.id}')">↗ Turn into initiative</button>
      <button class="btn-link" type="button" onclick="setIdeaStatus('${idea.id}','captured')">Un-park</button>
      <button class="btn-link" type="button" onclick="setIdeaStatus('${idea.id}','rejected')">Reject</button>`;
  } else if (st === 'rejected') {
    actions = `<button class="btn-link" type="button" onclick="setIdeaStatus('${idea.id}','captured')">Restore</button>
      <button class="btn-icon-only" type="button" onclick="deleteIdea('${idea.id}')" title="Delete idea" aria-label="Delete idea">✕</button>`;
  } else {
    // captured
    actions = `<button class="btn btn-outline btn-sm" type="button" onclick="openPromoteModal('${idea.id}')">↗ Turn into initiative</button>
      <button class="btn-link" type="button" onclick="setIdeaStatus('${idea.id}','parked')" title="Save for later">Park</button>
      <button class="btn-link" type="button" onclick="setIdeaStatus('${idea.id}','rejected')" title="Not pursuing">Reject</button>
      <button class="btn-icon-only" type="button" onclick="deleteIdea('${idea.id}')" title="Delete idea" aria-label="Delete idea">✕</button>`;
  }
  return `<div class="idea-card status-${st}${fresh}">
    <div class="idea-text">${esc(idea.text)}</div>
    <div class="idea-meta">
      ${stChip}
      ${g
        ? `<span class="idea-link-chip" title="${esc(g.title)}${kr?' › '+esc(kr.title):''}">${icon('goal')} ${esc(g.title)}${kr?` › ${esc(kr.title)}`:''}</span>`
        : `<span class="idea-loose-chip">💭 Loose idea</span>`
      }
      <span class="idea-date">${fmtDate(idea.createdAt)}</span>
    </div>
    <div class="idea-actions">${actions}</div>
  </div>`;
}

async function addIdeaFromForm() {
  const ta = document.getElementById('newIdeaText');
  const text = (ta?.value||'').trim();
  if (!text) { flashError('newIdeaText','What\'s the idea? Type it in to capture it.'); return; }
  const rect = ta?.getBoundingClientRect();
  const gid = document.getElementById('newIdeaGoal')?.value || null;
  const krid = document.getElementById('newIdeaKR')?.value || null;
  const newIdea = await db.createIdea({ text, goalId: gid, krId: krid });
  if (!newIdea) return;
  S.ideas.unshift(newIdea);
  justAddedIdeaId = newIdea.id;
  if (ta) ta.value = '';
  render();
  setTimeout(()=>document.getElementById('newIdeaText')?.focus(),50);
  celebrateIdea(rect);
  setTimeout(()=>{ justAddedIdeaId = null; }, 2000);
}

async function addQuickIdea(gid) {
  const input = document.getElementById('goalIdeaInput');
  if (!input) return;
  const text = (input.value||'').trim();
  if (!text) { flashError('goalIdeaInput', 'Type the idea first, then we’ll catch it.'); return; }
  const rect = input.getBoundingClientRect();
  const newIdea = await db.createIdea({ text, goalId: gid, krId: null });
  if (!newIdea) return;
  S.ideas.unshift(newIdea);
  justAddedIdeaId = newIdea.id;
  input.value = '';
  render();
  setTimeout(()=>document.getElementById('goalIdeaInput')?.focus(),50);
  celebrateIdea(rect);
  setTimeout(()=>{ justAddedIdeaId = null; }, 2000);
}

function deleteIdea(iid) {
  const idx = S.ideas.findIndex(i => i.id === iid);
  if (idx < 0) return;
  const snapshot = S.ideas[idx];
  // Optimistic hide
  S.ideas.splice(idx, 1);
  render();
  showUndoToast(
    'Idea deleted',
    () => { S.ideas.splice(idx, 0, snapshot); render(); },
    () => db.deleteIdea(iid),
  );
}

function openPromoteModal(iid) {
  const idea = S.ideas.find(i=>i.id===iid);
  if (!idea) return;
  if (!S.goals.length) { showToast('Add a goal first — initiatives need a measure to live under.', true); return; }

  showModal(`
    <div class="modal-title">${icon('arrowUpRight','icon-lg')} Turn into Initiative</div>
    <div class="form-group">
      <label class="form-label">The idea</label>
      <div style="background:var(--bg);padding:11px 13px;border-radius:var(--radius-sm);font-size:14px;line-height:1.5;border:1.5px solid var(--border)">${esc(idea.text)}</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Goal</label>
        <select class="form-input" id="pGoal"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Measure</label>
        <select class="form-input" id="pKR"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Who's leading it</label>
        <select class="form-input" id="pOwner">${ownerOptions('')}</select>
      </div>
      <div class="form-group">
        <label class="form-label">By when</label>
        <input class="form-input" id="pDue" type="date" />
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" id="pCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="pSave">Add as Initiative</button>
    </div>
  `);

  const goalSel = document.getElementById('pGoal');
  const krSel = document.getElementById('pKR');

  goalSel.innerHTML = S.goals.map(g=>`<option value="${g.id}"${g.id===idea.goalId?' selected':''}>${esc(g.title)}</option>`).join('');

  const fillKR = () => {
    const g = findGoal(goalSel.value);
    if (!g?.keyResults?.length) {
      krSel.innerHTML = '<option value="">No measures yet — add one to this goal first</option>';
      krSel.disabled = true; return;
    }
    krSel.disabled = false;
    krSel.innerHTML = g.keyResults.map(kr=>`<option value="${kr.id}"${kr.id===idea.krId?' selected':''}>${esc(kr.title)}</option>`).join('');
  };
  fillKR();
  goalSel.addEventListener('change', fillKR);

  document.getElementById('pCancel').addEventListener('click', closeModal);
  const pSaveBtn = document.getElementById('pSave');
  pSaveBtn?.addEventListener('click', () => withButtonBusy(pSaveBtn, () => promoteIdea(iid)));
}

async function promoteIdea(iid) {
  const idea = S.ideas.find(i=>i.id===iid);
  if (!idea) return;
  const gid = document.getElementById('pGoal')?.value;
  const krid = document.getElementById('pKR')?.value;
  if (!krid) { showToast('Pick a measure for this initiative to live under.', true); return; }
  const g = findGoal(gid), kr = findKR(g, krid);
  if (!kr) return;

  const owner = (document.getElementById('pOwner')?.value||'').trim();
  const dueDate = document.getElementById('pDue')?.value || '';

  const init = await db.createInitiative(krid, {
    title: idea.text, desc: '', status: 'not_started',
    owner, dueDate, position: kr.initiatives.length
  });
  if (!init) return;
  const entry = await db.addHistory(init.id, {
    type: 'created', date: today(), note: 'Promoted from an idea 💡'
  });
  if (entry) init.history.push(entry);
  // Mark idea as promoted and link to the new initiative (keep history)
  const ok = await db.updateIdea(iid, {
    status: 'promoted',
    promotedInitiativeId: init.id,
  });
  if (!ok) return;

  kr.initiatives.push(init);
  idea.status = 'promoted';
  idea.promotedInitiativeId = init.id;
  closeModal();
  S.view = 'goals';
  S.activeGoalId = gid;
  S.openKRs.add(krid);
  render();
  // T3.5 — richer celebration toast with a quick "View it" action that opens
  // the new initiative's drawer. Beats the previous silent disappearance.
  showActionToast(`💡 → 🚀  Promoted to “${esc(kr.title)}”`, 'View it', () => openDrawer(gid, krid, init.id));
}

async function setIdeaStatus(iid, status, note) {
  const idea = S.ideas.find(i=>i.id===iid);
  if (!idea) return;
  const patch = { status };
  if (note !== undefined) patch.statusNote = note;
  const ok = await db.updateIdea(iid, patch);
  if (!ok) return;
  idea.status = status;
  if (note !== undefined) idea.statusNote = note;
  // If un-promoting, clear the link
  if (status !== 'promoted') idea.promotedInitiativeId = null;
  render();
}

function renderGoalIdeasSection(g) {
  const list = S.ideas.filter(i => {
    if (i.goalId !== g.id) return false;
    const st = i.status || 'captured';
    return st === 'captured' || st === 'parked';
  });
  const sorted = [...list].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const visible = sorted.slice(0,5);
  return `<div class="goal-ideas-card">
    <div class="goal-ideas-header">
      <div>
        <div class="goal-ideas-title">${icon('idea')} Ideas for this goal</div>
        <div class="goal-ideas-sub">${list.length
          ? `${list.length} captured — ready when planning rolls around.`
          : `Nothing captured yet — drop loose thoughts here as they come.`}</div>
      </div>
    </div>
    <div class="goal-ideas-quick">
      <input type="text" id="goalIdeaInput" placeholder="${esc(pickPrompt(GOAL_CAPTURE_PROMPTS))}" onkeydown="if(event.key==='Enter'){event.preventDefault();addQuickIdea('${g.id}')}" />
      <button class="btn btn-primary btn-sm" type="button" onclick="withButtonBusy(this, ()=>addQuickIdea('${g.id}'))">Add</button>
    </div>
    ${list.length
      ? `<div class="goal-ideas-list">
          ${visible.map(i=>{
            const kr = i.krId ? findKR(g, i.krId) : null;
            const fresh = i.id === justAddedIdeaId ? ' fresh' : '';
            return `<div class="goal-idea-row${fresh}">
              <span class="gi-text">${esc(i.text)}</span>
              ${kr?`<span class="gi-kr" title="${esc(kr.title)}">${esc(kr.title)}</span>`:''}
              <span class="gi-acts">
                <button class="gi-mini-btn" type="button" title="Turn into initiative" onclick="openPromoteModal('${i.id}')">↗</button>
                <button class="gi-mini-btn gi-danger" type="button" title="Delete" onclick="deleteIdea('${i.id}')">✕</button>
              </span>
            </div>`;
          }).join('')}
        </div>
        ${list.length>5 ? `<button class="goal-ideas-more" type="button" onclick="setIdeaFilter('${g.id}');goToIdeas()">View all ${list.length} ideas →</button>` : ''}`
      : `<div class="goal-ideas-empty">No ideas yet — capture the first one above.</div>`
    }
  </div>`;
}

//  DRAWER
// ═══════════════════════════════════════════

let DX = null; // { goalId, krId, initId }
let pendingStatus = null; // staged status selection in the drawer

function openDrawer(gid, krid, iid) {
  const g=findGoal(gid), kr=findKR(g,krid), init=findInit(kr,iid);
  if(!init) return;
  DX = {gid,krid,iid};
  pendingStatus = init.status;
  document.getElementById('dCrumb').textContent = `${g.title}  ›  ${kr.title}`;
  document.getElementById('dTitle').textContent = init.title;
  refreshDrawerMeta(init);
  renderDrawerBody(init);
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');
  writeHashFromState();
}

function refreshDrawerMeta(init) {
  const dMeta = document.getElementById('dMeta');
  dMeta.innerHTML =
    `<span class="badge badge-${init.status}">${slabel(init.status)}</span>`+
    `<button type="button" class="chip${init.owner?'':' chip-empty'}" data-edit="owner" title="Click to edit who's leading">${icon('user')} ${init.owner?`Led by ${esc(init.owner)}`:`+ Add lead`}</button>`+
    `<button type="button" class="chip${init.dueDate?'':' chip-empty'}" data-edit="due" title="Click to edit the date">${icon('calendar')} ${init.dueDate?`By ${fmtDate(init.dueDate)}`:`+ Add date`}</button>`;
  dMeta.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => startEditMeta(btn.dataset.edit));
  });
}

function startEditMeta(field) {
  const ctx = getDrawerInit(); if (!ctx) return;
  const { init } = ctx;
  const btn = document.querySelector(`#dMeta [data-edit="${field}"]`);
  if (!btn) return;

  let input;
  if (field === 'owner') {
    input = document.createElement('select');
    input.className = 'chip-input';
    input.innerHTML = ownerOptions(init.owner || '');
    input.addEventListener('change', () => input.blur());
  } else if (field === 'due') {
    input = document.createElement('input');
    input.type = 'date';
    input.className = 'chip-input';
    input.value = init.dueDate || '';
  }

  let done = false;
  const commit = async () => {
    if (done) return;
    done = true;
    const v = (input.value || '').trim();
    const oldValue = field === 'owner' ? (init.owner || '') : (init.dueDate || '');
    if (v === oldValue) { refreshDrawerMeta(init); return; }
    const patch = field === 'owner' ? { owner: v } : { dueDate: v };
    const ok = await db.updateInitiative(init.id, patch);
    if (!ok) { refreshDrawerMeta(init); return; }
    if (field === 'owner') init.owner = v;
    else if (field === 'due') init.dueDate = v;
    // Log the edit to the Activity Trail
    const note = formatEditNote(field, oldValue, v);
    const entry = await db.addHistory(init.id, { type: 'edited', date: today(), note });
    if (entry) init.history.push(entry);
    refreshDrawerMeta(init);
    renderDrawerBody(init);
    renderMain();
  };
  const cancel = () => {
    if (done) return;
    done = true;
    refreshDrawerMeta(init);
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  input.addEventListener('blur', commit);

  btn.replaceWith(input);
  input.focus();
  if (field === 'owner' && input.tagName !== 'SELECT') input.select();
}

function renderInitDesc(init) {
  const desc = (init.desc || '').trim();
  const empty = desc === '';
  return `<div class="init-desc${empty?' is-empty':''}" id="initDesc"
    onclick="startEditDesc()"
    title="${empty?'Add a description':'Click to edit'}">${empty
      ? '+ Add a description for this initiative…'
      : esc(desc)}</div>`;
}

function startEditDesc() {
  const ctx = getDrawerInit(); if (!ctx) return;
  const { init } = ctx;
  const block = document.getElementById('initDesc');
  if (!block) return;

  const editor = document.createElement('div');
  editor.className = 'init-desc-editor';
  editor.innerHTML = `
    <textarea id="descInput" placeholder="What's this initiative about? Why does it matter?"></textarea>
    <div class="init-desc-actions">
      <span class="init-desc-hint">Esc to cancel · ⌘/Ctrl+Enter to save</span>
      <button type="button" class="btn btn-outline btn-sm" id="descCancel">Cancel</button>
      <button type="button" class="btn btn-primary btn-sm" id="descSave">Save</button>
    </div>`;
  block.replaceWith(editor);

  const ta = document.getElementById('descInput');
  ta.value = init.desc || '';
  // T1.9 — cap auto-resize at 40vh on mobile so a long description doesn't
  // push the rest of the drawer off-screen. Past the cap the textarea scrolls.
  ta.style.maxHeight = '40vh';
  ta.style.overflowY = 'auto';
  const autosize = () => {
    ta.style.height = 'auto';
    const desired = ta.scrollHeight + 2;
    const cap = Math.floor(window.innerHeight * 0.4);
    ta.style.height = Math.min(desired, cap) + 'px';
  };
  autosize();
  ta.addEventListener('input', autosize);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  const cancel = () => renderDrawerBody(init);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    else if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); commitDesc(); }
  });
  document.getElementById('descCancel').addEventListener('click', cancel);
  const descSaveBtn = document.getElementById('descSave');
  descSaveBtn?.addEventListener('click', () => withButtonBusy(descSaveBtn, commitDesc));
}

function formatEditNote(field, oldValue, newValue) {
  if (field === 'owner') {
    if (!oldValue && newValue) return `Set lead to ${newValue}`;
    if (oldValue && !newValue) return `Cleared lead (was ${oldValue})`;
    return `Changed lead from ${oldValue} to ${newValue}`;
  }
  if (field === 'due') {
    const fmt = d => d ? fmtDate(d) : '';
    if (!oldValue && newValue) return `Set due date to ${fmt(newValue)}`;
    if (oldValue && !newValue) return `Cleared due date (was ${fmt(oldValue)})`;
    return `Changed due date from ${fmt(oldValue)} to ${fmt(newValue)}`;
  }
  return 'Updated initiative';
}

async function commitDesc() {
  const ctx = getDrawerInit(); if (!ctx) return;
  const { init } = ctx;
  const newDesc = (document.getElementById('descInput')?.value || '').trim();
  const oldDesc = init.desc || '';
  if (newDesc === oldDesc) { renderDrawerBody(init); return; }
  const ok = await db.updateInitiative(init.id, { desc: newDesc });
  if (!ok) return;
  init.desc = newDesc;
  // Log to Activity Trail
  const note = oldDesc
    ? (newDesc ? 'Updated the description' : 'Cleared the description')
    : 'Added a description';
  const entry = await db.addHistory(init.id, { type: 'edited', date: today(), note });
  if (entry) init.history.push(entry);
  renderDrawerBody(init);
}

function renderDrawerBody(init) {
  if (pendingStatus == null) pendingStatus = init.status;
  document.getElementById('dBody').innerHTML = `
    ${renderInitDesc(init)}
    <div class="update-box">
      <div class="update-box-title">Share an Update</div>
      <div style="margin-bottom:10px">
        <div class="form-label" style="margin-bottom:8px">Status</div>
        <div class="status-pills" id="statusPills">
          ${pickableStatuses(init).map(s=>`<button type="button" class="status-pill badge-${s.v}${pendingStatus===s.v?' active':''}"
            data-status="${s.v}" onclick="stageStatus('${s.v}')">${s.emoji} ${s.label}</button>`).join('')}
        </div>
        <div class="status-pending-hint" id="statusPendingHint" style="${pendingStatus!==init.status?'':'display:none'}">
          ↗ Status change staged — hit <strong>Share Update</strong> to save it to the trail.
        </div>
      </div>
      <div class="form-label" style="margin-bottom:6px">Comment <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">(optional)</span></div>
      <div class="comment-box${pendingStatus==='completed' && init.status!=='completed' ? ' is-completing' : ''}" id="commentBox">
        <textarea id="commentInput" placeholder="${pendingStatus==='completed' && init.status!=='completed' ? 'What did you ship? 🎯' : 'How\'s it going? Share progress, roadblocks, or a little win to celebrate…'}" rows="3"
          onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter')shareUpdate()"></textarea>
        <div class="comment-box-foot">
          <span class="comment-hint">Ctrl+Enter to share</span>
          <button class="btn btn-primary btn-sm" type="button" onclick="withButtonBusy(this, shareUpdate)">Share Update</button>
        </div>
      </div>
    </div>
    <div class="timeline-label">Activity Trail</div>
    <div class="timeline" id="timeline">${renderTimeline(init)}</div>
  `;
}

function stageStatus(newStatus) {
  if (!DX) return;
  pendingStatus = newStatus;
  document.querySelectorAll('#statusPills .status-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.status === newStatus);
  });
  const init = findInit(findKR(findGoal(DX.gid), DX.krid), DX.iid);
  const hint = document.getElementById('statusPendingHint');
  if (hint && init) {
    hint.style.display = (newStatus !== init.status) ? '' : 'none';
  }
  // T3.3 — celebrate moving to Completed: pop the chosen pill, tint the
  // comment box, and swap in a "What did you ship?" placeholder. Restraint:
  // only fire when this is an actual *change* to completed, not a re-click.
  if (newStatus === 'completed' && init && init.status !== 'completed') {
    const pill = document.querySelector(`#statusPills .status-pill[data-status="completed"]`);
    if (pill) {
      pill.classList.remove('just-completed');
      // Restart the animation: force reflow before re-adding the class.
      void pill.offsetWidth;
      pill.classList.add('just-completed');
    }
    const box = document.getElementById('commentBox');
    const ta = document.getElementById('commentInput');
    if (box) box.classList.add('is-completing');
    if (ta && !ta.value) ta.placeholder = 'What did you ship? 🎯';
  } else {
    const box = document.getElementById('commentBox');
    if (box) box.classList.remove('is-completing');
  }
}

async function shareUpdate() {
  // getDrawerInit handles the "init was deleted while drawer was open" race:
  // closes the drawer and surfaces a toast instead of silently swallowing the
  // share, which previously made users think their update went through.
  const ctx = getDrawerInit(); if (!ctx) return;
  const { init } = ctx;
  const text=(document.getElementById('commentInput')?.value||'').trim();
  const statusChanged = pendingStatus && pendingStatus !== init.status;
  if (!statusChanged && !text) return; // nothing to share

  if (statusChanged) {
    const old = init.status;
    const ok = await db.updateInitiative(init.id, { status: pendingStatus });
    if (!ok) return;
    const entry = await db.addHistory(init.id, {
      type: 'status_change', date: today(),
      from: old, to: pendingStatus, note: text
    });
    init.status = pendingStatus;
    if (entry) init.history.push(entry);
  } else if (text) {
    const entry = await db.addHistory(init.id, {
      type: 'comment', date: today(), text
    });
    if (entry) init.history.push(entry);
  }
  if (document.getElementById('commentInput')) document.getElementById('commentInput').value = '';
  pendingStatus = init.status;
  refreshDrawerMeta(init);
  renderDrawerBody(init);
  renderMain();
  renderSidebar();
}

function renderTimeline(init) {
  if(!init.history.length) return '<p style="font-size:14px;color:var(--text-muted)">Quiet on the trail so far. Drop a comment or update the status!</p>';
  return [...init.history].reverse().map(item=>{
    let cls='created-ic', icon='✦', body='';
    if(item.type==='comment') {
      cls='comment-ic'; icon='💬';
      body=`<div class="tl-text">${esc(item.text)}</div>`;
    } else if(item.type==='status_change') {
      cls='status-ic'; icon='⟳';
      body=`<div class="tl-text" style="margin-bottom:5px">
        <span class="badge badge-${item.from}">${slabel(item.from)}</span>
        <span style="margin:0 7px;color:var(--text-muted)">→</span>
        <span class="badge badge-${item.to}">${slabel(item.to)}</span>
      </div>${item.note?`<div class="tl-text" style="color:var(--text-muted)">${esc(item.note)}</div>`:''}`;
    } else if(item.type==='edited') {
      cls='edited-ic'; icon='✎';
      body=`<div class="tl-text" style="color:var(--text-muted)">${esc(item.note||'Edited initiative')}</div>`;
    } else {
      body=`<div class="tl-text" style="color:var(--text-muted)">${esc(item.note||'Initiative created')}</div>`;
    }
    const meta = item.author_name
      ? `${esc(item.author_name)} · ${fmtDateLong(item.date)}`
      : fmtDateLong(item.date);
    return `<div class="tl-item">
      <div class="tl-icon ${cls}">${icon}</div>
      <div class="tl-body"><div class="tl-date">${meta}</div>${body}</div>
    </div>`;
  }).join('');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('open');
  // T1.8 — also collapse the kebab menu so it doesn't flash open next time.
  closeInitMenu();
  DX = null;
  pendingStatus = null;
  writeHashFromState();
}

// ─── URL deep-linking (T2.3) ──────────────────────────────────────
// Encode the current view + active goal + open drawer into the URL hash so
// browser back navigates between views, refresh keeps your place, and you
// can paste a link to a specific initiative into Slack. Format:
//   ''                          → dashboard
//   '#view=mywork'              → My Work / Ideas / Archive / Settings / Help
//   '#goal=<gid>'               → goal detail
//   '#goal=<gid>&init=<iid>'    → goal detail with drawer open
//   '#init=<iid>'               → resolve init → its goal, open drawer
let _suppressHashWrite = false;
function writeHashFromState() {
  if (_suppressHashWrite) return;
  const parts = [];
  const v = S.view || 'goals';
  if (v === 'goals' && S.activeGoalId) {
    parts.push(`goal=${S.activeGoalId}`);
    if (DX?.iid) parts.push(`init=${DX.iid}`);
  } else if (v !== 'goals') {
    parts.push(`view=${v}`);
  }
  const newHash = parts.length ? '#' + parts.join('&') : '';
  if (window.location.hash === newHash) return;
  try {
    const url = window.location.pathname + window.location.search + newHash;
    window.history.pushState(null, '', url);
  } catch (e) {}
}
function parseHashParams() {
  const raw = (window.location.hash || '').replace(/^#/, '');
  if (!raw) return {};
  const out = {};
  for (const part of raw.split('&')) {
    if (!part) continue;
    const eq = part.indexOf('=');
    if (eq < 0) { out[part] = ''; continue; }
    out[part.slice(0, eq)] = part.slice(eq + 1);
  }
  return out;
}
function applyHashState() {
  const p = parseHashParams();
  _suppressHashWrite = true;
  try {
    if (p.init && !p.goal) {
      const found = findInitById(p.init);
      if (found) {
        S.view = 'goals';
        S.activeGoalId = found.goal.id;
        if (found.kr) S.openKRs.add(found.kr.id);
        render();
        openDrawer(found.goal.id, found.kr.id, p.init);
        return;
      }
    }
    if (p.goal) {
      S.view = 'goals';
      S.activeGoalId = p.goal;
      const g = findGoal(p.goal);
      if (g?.keyResults.length) S.openKRs.add(g.keyResults[0].id);
      render();
      if (p.init) {
        const found = findInitById(p.init);
        if (found) openDrawer(found.goal.id, found.kr.id, p.init);
      } else if (DX) {
        closeDrawer();
      }
      return;
    }
    if (p.view && ['mywork','ideas','archive','settings','help','about','digest'].includes(p.view)) {
      // Capture the seen-line before the digest render advances it (deep-link
      // / refresh path bypasses goToDigest where this is normally snapshotted).
      if (p.view === 'digest') { _digestPrevSeen = S.profile?.last_seen_at || null; _digestSeenMarked = false; }
      S.view = p.view;
      S.activeGoalId = null;
      if (DX) closeDrawer();
      render();
      return;
    }
    // No recognisable hash → dashboard
    S.view = 'goals';
    S.activeGoalId = null;
    if (DX) closeDrawer();
    render();
  } finally {
    _suppressHashWrite = false;
  }
}
window.addEventListener('hashchange', applyHashState);
window.addEventListener('popstate', applyHashState);

// ─── Weekly check-in (T2.1) ───────────────────────────────────────
// Sequential card flow over every active initiative the current user owns,
// designed to be the fastest possible path through "where is each thing at?"
// — status pill + comment, then next. Esc / X exits anywhere.
let _checkinQueue = [];
let _checkinIdx = 0;
let _checkinAt = 0;       // ms timestamp for the summary "x seconds" stat
let _checkinSaved = 0;

function startCheckin() {
  const me = S.profile?.display_name || '';
  if (!me) { showToast('Sign in first to run a check-in.', true); return; }
  const queue = [];
  for (const g of S.goals) {
    if (g.status === 'closed') continue;
    for (const kr of g.keyResults) {
      for (const init of kr.initiatives) {
        if (init.owner !== me) continue;
        if (init.status === 'completed' || init.status === 'on_hold') continue;
        queue.push({ gid: g.id, krid: kr.id, iid: init.id });
      }
    }
  }
  if (!queue.length) { showToast('Nothing in flight to check in on — nicely cleared.'); return; }
  _checkinQueue = queue;
  _checkinIdx = 0;
  _checkinSaved = 0;
  _checkinAt = Date.now();
  document.getElementById('checkinScrim').hidden = false;
  renderCheckinCard();
}

function renderCheckinCard() {
  const shell = document.querySelector('#checkinScrim .checkin-shell');
  if (!shell) return;
  const total = _checkinQueue.length;
  if (_checkinIdx >= total) {
    const seconds = Math.max(1, Math.round((Date.now() - _checkinAt) / 1000));
    shell.innerHTML = `
      <div class="checkin-done">
        <div class="checkin-done-emoji">🧭</div>
        <h3>Check-in complete</h3>
        <p>You updated <strong>${_checkinSaved}</strong> of <strong>${total}</strong> initiatives in <strong>${seconds}s</strong>. Nice work.</p>
      </div>
      <div class="checkin-foot">
        <button class="btn btn-primary checkin-next" type="button" onclick="closeCheckin()">Close</button>
      </div>`;
    return;
  }
  const cur = _checkinQueue[_checkinIdx];
  const g = findGoal(cur.gid), kr = findKR(g, cur.krid), init = findInit(kr, cur.iid);
  if (!init) {
    // The init disappeared mid-flow (deleted by someone else). Skip it cleanly.
    _checkinIdx++;
    renderCheckinCard();
    return;
  }
  const isLast = _checkinIdx === total - 1;
  const progress = Array.from({ length: total }, (_, i) => {
    const cls = i < _checkinIdx ? 'is-done' : (i === _checkinIdx ? 'is-current' : '');
    return `<span class="${cls}"></span>`;
  }).join('');
  const pills = pickableStatuses(init).map(s =>
    `<button type="button" class="status-pill badge-${s.v}${init.status===s.v?' active':''}" data-status="${s.v}">${s.emoji} ${s.label}</button>`
  ).join('');

  shell.innerHTML = `
    <div class="checkin-head">
      <div class="checkin-progress">${progress}</div>
      <span style="font:500 12px/1 'Inter',sans-serif;color:var(--text-muted)">${_checkinIdx + 1} / ${total}</span>
      <button class="checkin-close" type="button" onclick="closeCheckin()" aria-label="Close">✕</button>
    </div>
    <div class="checkin-body">
      <div class="checkin-crumb">${esc(g.title)}  ›  ${esc(kr.title)}</div>
      <div class="checkin-title">${esc(init.title)}</div>

      <div class="checkin-section-label">Status</div>
      <div class="checkin-pills" id="checkinPills">${pills}</div>

      <div class="checkin-section-label">Comment <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">(optional)</span></div>
      <textarea id="checkinComment" class="checkin-comment" placeholder="Any blockers, wins, or context worth logging?"></textarea>

      ${init.dueDate
        ? `<div class="checkin-meta">${icon('calendar')} Due ${fmtDate(init.dueDate)}</div>`
        : ''}
    </div>
    <div class="checkin-foot">
      <button class="btn btn-ghost btn-sm checkin-skip" type="button" onclick="checkinSkip()">Skip</button>
      <button class="btn btn-primary checkin-next" type="button" id="checkinNextBtn">${isLast ? 'Save & finish' : 'Save & next'}</button>
    </div>`;

  // Wire status pills to in-card pending state.
  let pending = init.status;
  shell.querySelectorAll('#checkinPills .status-pill').forEach(p => {
    p.addEventListener('click', () => {
      pending = p.dataset.status;
      shell.querySelectorAll('#checkinPills .status-pill').forEach(q => q.classList.toggle('active', q === p));
    });
  });
  // Wire Save & next.
  shell.querySelector('#checkinNextBtn').addEventListener('click', () => {
    withButtonBusy(shell.querySelector('#checkinNextBtn'), () => checkinSaveCurrent(pending));
  });
  // Focus the textarea for fast typing.
  setTimeout(() => document.getElementById('checkinComment')?.focus(), 30);
}

async function checkinSaveCurrent(pending) {
  const cur = _checkinQueue[_checkinIdx];
  if (!cur) return;
  const g = findGoal(cur.gid), kr = findKR(g, cur.krid), init = findInit(kr, cur.iid);
  if (!init) { _checkinIdx++; renderCheckinCard(); return; }
  const text = (document.getElementById('checkinComment')?.value || '').trim();
  const statusChanged = pending && pending !== init.status;
  if (!statusChanged && !text) { _checkinIdx++; renderCheckinCard(); return; }
  try {
    if (statusChanged) {
      const old = init.status;
      const ok = await db.updateInitiative(init.id, { status: pending });
      if (ok) {
        const entry = await db.addHistory(init.id, { type: 'status_change', date: today(), from: old, to: pending, note: text });
        init.status = pending;
        if (entry) init.history.push(entry);
      }
    } else if (text) {
      const entry = await db.addHistory(init.id, { type: 'comment', date: today(), text });
      if (entry) init.history.push(entry);
    }
    _checkinSaved++;
  } catch (e) {
    console.error('[Compass] check-in save failed:', e);
    showToast('Save failed — staying on this card.', true);
    return;
  }
  _checkinIdx++;
  scheduleRerender();
  renderCheckinCard();
}

function checkinSkip() {
  _checkinIdx++;
  renderCheckinCard();
}

function closeCheckin() {
  const scrim = document.getElementById('checkinScrim'); if (!scrim) return;
  scrim.hidden = true;
  _checkinQueue = [];
  _checkinIdx = 0;
}

// Esc to exit the check-in if not in a text field.
document.addEventListener('keydown', e => {
  const scrim = document.getElementById('checkinScrim');
  if (!scrim || scrim.hidden) return;
  if (e.key === 'Escape' && document.activeElement?.id !== 'checkinComment') {
    e.preventDefault();
    closeCheckin();
  }
});

// ─── Global search (T2.2) ─────────────────────────────────────────
// Cmd-K / Ctrl-K opens a fuzzy search across goals, measures, initiatives,
// ideas, and owner names. Plain text contains-match — small enough corpus
// that we don't need an index.
let _searchActive = false;
let _searchActiveIdx = 0;
let _searchHits = [];

function openSearch() {
  const scrim = document.getElementById('searchScrim'); if (!scrim) return;
  _searchActive = true;
  _searchActiveIdx = 0;
  scrim.hidden = false;
  const input = document.getElementById('searchInput');
  if (input) { input.value = ''; setTimeout(() => input.focus(), 30); }
  runSearch('');
}
function closeSearch(e) {
  // Only close on direct scrim clicks (event.target === scrim) or no-event invocations.
  if (e && e.target && e.target.id !== 'searchScrim' && e.type === 'click') return;
  const scrim = document.getElementById('searchScrim'); if (!scrim) return;
  scrim.hidden = true;
  _searchActive = false;
  _searchHits = [];
}

function runSearch(q) {
  q = (q || '').trim().toLowerCase();
  const hits = [];
  const seenInit = new Set();
  // Goals
  for (const g of S.goals) {
    if (g.status === 'closed') continue;
    if (!q || (g.title||'').toLowerCase().includes(q) || (g.desc||'').toLowerCase().includes(q)) {
      hits.push({ type:'goal', icon:'🎯', title: g.title, crumb: g.quarter || '', go: () => { closeSearch(); selectGoal(g.id); } });
    }
  }
  // Measures
  for (const g of S.goals) {
    for (const kr of g.keyResults) {
      if (!q || (kr.title||'').toLowerCase().includes(q)) {
        hits.push({
          type:'measure', icon:'📏', title: kr.title,
          crumb: g.title,
          go: () => { closeSearch(); selectGoal(g.id); S.openKRs.add(kr.id); render(); },
        });
      }
    }
  }
  // Initiatives
  for (const g of S.goals) {
    for (const kr of g.keyResults) {
      for (const init of kr.initiatives) {
        if (seenInit.has(init.id)) continue;
        const t = (init.title||'').toLowerCase();
        const o = (init.owner||'').toLowerCase();
        const d = (init.desc||'').toLowerCase();
        if (!q || t.includes(q) || o.includes(q) || d.includes(q)) {
          hits.push({
            type:'initiative', icon:'🪧', title: init.title,
            crumb: `${g.title} › ${kr.title}${init.owner ? ' · ' + init.owner : ''}`,
            go: () => { closeSearch(); selectGoal(g.id); S.openKRs.add(kr.id); render(); openDrawer(g.id, kr.id, init.id); },
          });
          seenInit.add(init.id);
        }
      }
    }
  }
  // Ideas
  for (const idea of S.ideas) {
    const t = (idea.text||'').toLowerCase();
    if (!q || t.includes(q)) {
      const g = idea.goalId ? findGoal(idea.goalId) : null;
      hits.push({
        type:'idea', icon:'💡',
        title: idea.text.length > 90 ? idea.text.slice(0, 90) + '…' : idea.text,
        crumb: g ? `Idea · ${g.title}` : 'Idea',
        go: () => { closeSearch(); goToIdeas(); },
      });
    }
  }
  _searchHits = hits.slice(0, 40);
  _searchActiveIdx = 0;
  renderSearchHits(q);
}

function renderSearchHits(q) {
  const el = document.getElementById('searchResults');
  const hint = document.getElementById('searchHint');
  if (!el) return;
  if (hint) hint.style.display = q ? 'none' : '';
  if (!q) { el.innerHTML = ''; return; }
  if (!_searchHits.length) {
    el.innerHTML = `<div class="search-empty">No matches for "${esc(q)}". Try a shorter or different word.</div>`;
    return;
  }
  // Group by type
  const order = ['goal','measure','initiative','idea'];
  const labels = { goal:'Goals', measure:'Measures', initiative:'Initiatives', idea:'Ideas' };
  let html = '';
  let i = 0;
  for (const type of order) {
    const group = _searchHits.filter(h => h.type === type);
    if (!group.length) continue;
    html += `<div class="search-group-label">${labels[type]}</div>`;
    for (const h of group) {
      const idx = i++;
      html += `<div class="search-result${idx===_searchActiveIdx?' is-active':''}" data-idx="${idx}" role="option">
        <span class="search-result-icon">${h.icon}</span>
        <div>
          <div class="search-result-title">${esc(h.title)}</div>
          <div class="search-result-crumb">${esc(h.crumb)}</div>
        </div>
        <span class="search-result-kbd">↵</span>
      </div>`;
    }
  }
  el.innerHTML = html;
  // Rebuild a flat ordered hit list matching the rendered DOM order so
  // arrow keys + Enter line up with what the user sees.
  const flat = [];
  for (const type of order) for (const h of _searchHits) if (h.type === type) flat.push(h);
  _searchHits = flat;
  el.querySelectorAll('.search-result').forEach(node => {
    const i = +node.dataset.idx;
    node.addEventListener('click', () => _searchHits[i]?.go());
    node.addEventListener('mouseover', () => {
      _searchActiveIdx = i;
      el.querySelectorAll('.search-result').forEach(n => n.classList.toggle('is-active', +n.dataset.idx === i));
    });
  });
}

// Wire input + keyboard nav + Cmd-K shortcut
document.addEventListener('keydown', e => {
  // Cmd/Ctrl + K opens search from anywhere.
  if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
    e.preventDefault();
    _searchActive ? closeSearch() : openSearch();
    return;
  }
  // '/' opens search when nothing else is focused (Notion-style).
  if (!_searchActive && e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) {
    e.preventDefault();
    openSearch();
    return;
  }
  if (!_searchActive) return;
  if (e.key === 'Escape') { e.preventDefault(); closeSearch(); return; }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (_searchHits.length) {
      _searchActiveIdx = Math.min(_searchActiveIdx + 1, _searchHits.length - 1);
      document.querySelectorAll('#searchResults .search-result').forEach(n => n.classList.toggle('is-active', +n.dataset.idx === _searchActiveIdx));
      document.querySelector('#searchResults .search-result.is-active')?.scrollIntoView({ block: 'nearest' });
    }
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (_searchHits.length) {
      _searchActiveIdx = Math.max(_searchActiveIdx - 1, 0);
      document.querySelectorAll('#searchResults .search-result').forEach(n => n.classList.toggle('is-active', +n.dataset.idx === _searchActiveIdx));
      document.querySelector('#searchResults .search-result.is-active')?.scrollIntoView({ block: 'nearest' });
    }
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    const hit = _searchHits[_searchActiveIdx];
    if (hit) hit.go();
    return;
  }
});
document.addEventListener('input', e => {
  if (e.target?.id === 'searchInput') runSearch(e.target.value);
});

// Show Ctrl/Cmd hint based on platform.
(() => {
  const isMac = /Mac|iPhone|iPad/.test(navigator.platform || '');
  const kbd = document.getElementById('searchKbd');
  if (kbd && !isMac) kbd.textContent = 'Ctrl K';
})();

// Resolve the currently-open drawer init, or bail cleanly if state diverged
// (e.g. a realtime delete fired while the user was mid-edit). Returns null
// in the bail case so callers can early-return without crashing.
function getDrawerInit() {
  if (!DX) return null;
  const g = findGoal(DX.gid);
  const kr = findKR(g, DX.krid);
  const init = findInit(kr, DX.iid);
  if (!init) {
    closeDrawer();
    showToast('That initiative is no longer here.');
    return null;
  }
  return { g, kr, init };
}

// Remember which element launched the modal so we can return focus to it on
// close — without this, keyboard users land on document.body and lose context.
let _modalReturnFocus = null;
function showModal(html) {
  _modalReturnFocus = (document.activeElement && document.activeElement !== document.body)
    ? document.activeElement : null;
  document.getElementById('modalRoot').innerHTML =
    `<div class="modal-wrap">
       <div class="modal-bg" onclick="closeModal()"></div>
       <div class="modal-box">${html}</div>
     </div>`;
}
function closeModal() {
  document.getElementById('modalRoot').innerHTML='';
  // Restore focus to the launching control. Wrap in try/catch in case the
  // element was removed from the DOM in the interim.
  if (_modalReturnFocus) {
    try { _modalReturnFocus.focus(); } catch (e) {}
    _modalReturnFocus = null;
  }
}

function openCloseGoalModal(gid) {
  const g = findGoal(gid); if (!g) return;
  const suggestedScore = (goalProgress(g) / 100).toFixed(2);
  showModal(`
    <div class="modal-title">Close goal</div>

      <label class="form-label">Goal</label>

      <div style="font-size:13px;color:var(--text-muted);margin-top:3px">${esc(g.quarter)} · ${g.keyResults.length} measures · ${g.keyResults.reduce((a,k)=>a+k.initiatives.length,0)} initiatives</div>
    </div>
    <div class="form-group">
      <label class="form-label">Final score (0–1.0)</label>
      <input class="form-input" id="mCloseScore" type="number" step="0.05" min="0" max="1" value="${suggestedScore}" placeholder="0.7" />
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">OKR convention: 0.7+ is great, 0.4–0.6 is on the right track, &lt;0.4 missed the mark. Stretch goals at 0.6–0.7 often beat committed goals at 1.0.</div>
    </div>

async function closeGoal(gid) {
  const g = findGoal(gid); if (!g) return;
  const scoreStr = (document.getElementById('mCloseScore')?.value || '').trim();
  const score = scoreStr === '' ? null : Math.max(0, Math.min(1, parseFloat(scoreStr) || 0));
  const reflection = (document.getElementById('mCloseReflection')?.value || '').trim();
  const ok = await db.updateGoal(gid, {
    status: 'closed',
    closed_at: new Date().toISOString(),
    score,
    reflection,
  });
  if (!ok) return;
  g.status = 'closed';
  g.closedAt = new Date().toISOString();
  g.score = score;
  g.reflection = reflection;
  closeModal();
  // T3.2 — full-screen celebration before navigating to Archive. Beats the
  // silent close that the goal flow had before — a quarter ending deserves
  // a beat. The overlay self-dismisses after ~2s.
  celebrateGoalClose(g.title, score);
  S.activeGoalId = null;
  render();
}

// T3.2 — full-bleed overlay with confetti dots and a score callout. We
// generate ~26 little squares animated with random delays + start positions
// so the burst feels organic without needing a 3rd-party library.
function celebrateGoalClose(title, score) {
  // Respect motion preferences — fall back to a plain toast.
  const reduceMotion = matchMedia?.('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) {
    showToast(`🎉 Goal closed${score !== null ? ` at ${Math.round(score*100)}%` : ''} — see it in Archive.`);
    return;
  }
  let host = document.getElementById('goalCelebrate');
  if (!host) {
    host = document.createElement('div');
    host.id = 'goalCelebrate';
    host.className = 'goal-celebrate';
    document.body.appendChild(host);
  }
  const scoreLine = score !== null
    ? `<div class="gc-score">${Math.round(score*100)}%</div>`
    : '';
  const colors = ['#F4B400','#22c55e','#ec4899','#3b82f6','#a855f7'];
  const confetti = Array.from({ length: 26 }, (_, i) => {
    const left = Math.round(((i * 53) % 100));
    const delay = (i * 37) % 800;
    const dur = 1100 + ((i * 91) % 700);
    const rot = (i * 47) % 360;
    const color = colors[i % colors.length];
    return `<span class="gc-bit" style="left:${left}%;background:${color};animation-delay:${delay}ms;animation-duration:${dur}ms;transform:rotate(${rot}deg)"></span>`;
  }).join('');
  host.innerHTML = `
    ${confetti}
    <div class="gc-card">
      <div class="gc-emoji">🎉</div>
      <div class="gc-headline">Goal closed</div>
      ${scoreLine}
      <div class="gc-title">${esc(title)}</div>
      <div class="gc-sub">It'll live in Archive — onward to what's next.</div>
    </div>`;
  host.classList.add('show');
  clearTimeout(host._t);
  host._t = setTimeout(() => host.classList.remove('show'), 2200);
}

async function moveInitiative() {
  if (!DX) return;
  const sourceG  = findGoal(DX.gid);
  const sourceKR = findKR(sourceG, DX.krid);
  const init     = findInit(sourceKR, DX.iid);
  if (!init) return;
  const destGid  = document.getElementById('mMoveGoal')?.value;
  const destKRid = document.getElementById('mMoveKR')?.value;
  if (!destKRid) { showToast('Pick a measure to move this initiative under.', true); return; }
  if (destKRid === DX.krid) { closeModal(); return; } // no change
  const destG  = findGoal(destGid);
  const destKR = findKR(destG, destKRid);
  if (!destKR) return;

  const ok = await db.updateInitiative(init.id, {
    krId: destKRid,
    position: destKR.initiatives.length,
  });
  if (!ok) return;

  // Log to activity trail so the move is visible
  const noteText = `Moved from "${sourceG.title} › ${sourceKR.title}" to "${destG.title} › ${destKR.title}"`;
  const entry = await db.addHistory(init.id, {
    type: 'edited', date: today(), note: noteText
  });
  if (entry) init.history.push(entry);

  // Update local state mirror
  sourceKR.initiatives = sourceKR.initiatives.filter(i => i.id !== init.id);
  destKR.initiatives.push(init);

  // Update drawer context so subsequent edits target the new path
  DX.gid  = destGid;
  DX.krid = destKRid;
  document.getElementById('dCrumb').textContent = `${destG.title}  ›  ${destKR.title}`;

  closeModal();
  showToast('Initiative moved.');
  render();
}

async function carryForwardGoal(gid) {

  const cloned = await db.createGoal({
    title: g.title, desc: g.desc, quarter: newQuarter,
    owner: g.owner || '', position: S.goals.length,
  });
  if (!cloned) return;
  // Clone each measure (current_value reset to 0)
  for (const kr of g.keyResults) {
    const newKR = await db.createKR(cloned.id, {
      title: kr.title,
      target: kr.target,
      current: 0,
      unit: kr.unit || '',
      position: cloned.keyResults.length,
    });
    if (newKR) cloned.keyResults.push(newKR);
  }
  S.goals.push(cloned);
  S.activeGoalId = cloned.id;
  closeModal();
  showToast(`Cloned to ${newQuarter}. Set your starting numbers and add initiatives.`);
  render();
}

async function saveKR(gid, krid) {
  const g=findGoal(gid); if(!g) return;
  const title=(document.getElementById('mKRTitle')?.value||'').trim();
  if(!title){ flashError('mKRTitle','Tell us what this signpost marks!'); return; }
  // T1.6 — sanitize numeric inputs. parseFloat happily accepts negatives, NaN,
  // and Infinity; pre-validate and surface a friendly error instead of letting
  // bogus values reach the DB.
  const curRaw=parseFloat(document.getElementById('mKRCur')?.value);
  const targetRaw=parseFloat(document.getElementById('mKRTarget')?.value);
  const curIn=Number.isFinite(curRaw)?curRaw:0;
  const targetIn=Number.isFinite(targetRaw)?targetRaw:100;
  if (curIn < 0)    { flashError('mKRCur',    'Current value can’t be negative.'); return; }
  if (targetIn < 0) { flashError('mKRTarget', 'Target value can’t be negative.');  return; }
  if (curIn > 1e12 || targetIn > 1e12) { flashError('mKRTarget', 'Whoa — let’s keep this within reason.'); return; }
  const cur = curIn, target = targetIn;
  const unit=(document.getElementById('mKRUnit')?.value||'').trim()||'%';
  const destGid=document.getElementById('mKRGoal')?.value||gid;
  if(krid) {
    const kr=findKR(g,krid); if(!kr) return;
    const moving = destGid && destGid !== gid;
    const destG = moving ? findGoal(destGid) : g;
    if (moving && !destG) return;
    const patch = { title, current: cur, target, unit };
    if (moving) patch.goalId = destGid;
    const ok = await db.updateKR(krid, patch);
    if (!ok) return;
    kr.title=title; kr.current=cur; kr.target=target; kr.unit=unit;
    if (moving) {
      g.keyResults = g.keyResults.filter(k => k.id !== krid);
      destG.keyResults.push(kr);
    }
  } else {
    const destG = findGoal(destGid) || g;
    const kr = await db.createKR(destG.id, { title, current: cur, target, unit, position: destG.keyResults.length });
    if (!kr) return;
    destG.keyResults.push(kr);
    S.openKRs.add(kr.id);
  }
  closeModal(); render();
}

function deleteKR(gid, krid) {
  const g = findGoal(gid); if (!g) return;
  const idx = g.keyResults.findIndex(k => k.id === krid);
  if (idx < 0) return;
  const snapshot = g.keyResults[idx];
  const wasOpen = S.openKRs.has(krid);
  g.keyResults.splice(idx, 1);
  S.openKRs.delete(krid);
  render();
  showUndoToast(
    `Measure "${snapshot.title}" deleted`,
    () => {
      // T1.4 — resolve the goal fresh by id rather than relying on the closure-
      // captured `g`. If the goal itself was deleted in the 5s undo window we'd
      // otherwise splice into a detached array and end up with an orphan measure.
      const goal = findGoal(gid);
      if (!goal) { showToast('That goal is gone too — can’t restore the measure.', true); return; }
      goal.keyResults.splice(Math.min(idx, goal.keyResults.length), 0, snapshot);
      if (wasOpen) S.openKRs.add(krid);
      render();
    },
    () => db.deleteKR(krid),
  );
}

// T2.4 — clone the open drawer initiative into the same measure. New row gets
// "(copy)" suffix and a fresh 'not_started' status; description, owner, due
// date all carry forward so it's a real starting point, not a blank.
async function duplicateCurrentInit() {
  if (!DX) return;
  const ctx = getDrawerInit(); if (!ctx) return;
  const { g, kr, init } = ctx;
  const newTitle = init.title.endsWith('(copy)') ? init.title : `${init.title} (copy)`;
  const created = await db.createInitiative(kr.id, {
    title: newTitle,
    desc: init.desc || '',
    status: 'not_started',
    owner: init.owner || '',
    dueDate: '',
    position: kr.initiatives.length,
  });
  if (!created) return;
  const entry = await db.addHistory(created.id, { type: 'created', date: today(), note: `Cloned from "${init.title}"` });
  if (entry) created.history.push(entry);
  kr.initiatives.push(created);
  render();
  openDrawer(g.id, kr.id, created.id);
  showToast('Initiative duplicated. Tweak the title before you ship.');
}

async function saveInit(gid, krid) {
  const g=findGoal(gid), kr=findKR(g,krid); if(!kr) return;
  const title=(document.getElementById('mInitTitle')?.value||'').trim();
  if(!title){ flashError('mInitTitle','Give this step a name so the crew knows what to chase!'); return; }
  const desc=(document.getElementById('mInitDesc')?.value||'').trim();
  const status=document.getElementById('mInitStatus')?.value||'not_started';
  const owner=(document.getElementById('mInitOwner')?.value||'').trim();
  const dueDate=document.getElementById('mInitDue')?.value||'';
  const note=(document.getElementById('mInitNote')?.value||'').trim();

  const init = await db.createInitiative(krid, {
    title, desc, status, owner, dueDate, position: kr.initiatives.length
  });
  if (!init) return;

  // History: 'created' first, then optional status_change if starting status != not_started
  const createdEntry = await db.addHistory(init.id, {
    type: 'created', date: today(), note: note || 'Initiative created'
  });
  if (createdEntry) init.history.push(createdEntry);

  if (status !== 'not_started') {
    const sc = await db.addHistory(init.id, {
      type: 'status_change', date: today(),
      from: 'not_started', to: status, note
    });
    if (sc) init.history.push(sc);
  }

  kr.initiatives.push(init);
  closeModal(); render();
}

function deleteInit(gid, krid, iid) {
  const g = findGoal(gid), kr = findKR(g, krid); if (!kr) return;
  const idx = kr.initiatives.findIndex(i => i.id === iid);

  const snapshot = kr.initiatives[idx];
  const wasInDrawer = DX && DX.iid === iid;
  kr.initiatives.splice(idx, 1);
  if (wasInDrawer) closeDrawer();
  render();
  showUndoToast(
    `Initiative "${snapshot.title}" deleted`,
    () => { kr.initiatives.splice(idx, 0, snapshot); render(); },
    () => db.deleteInitiative(iid),
  );
}

function exportWorkspace() {
  const data = {
    exported_at: new Date().toISOString(),
    workspace: 'Compass',
    exported_by: { id: S.session?.user?.id, email: S.session?.user?.email, name: S.profile?.display_name },
    counts: {
      goals: S.goals.length,
      measures: S.goals.reduce((a,g) => a + g.keyResults.length, 0),
      initiatives: S.goals.reduce((a,g) => a + g.keyResults.reduce((b,kr) => b + kr.initiatives.length, 0), 0),
      ideas: S.ideas.length,
      team: S.members.length,
    },
    goals: S.goals,
    ideas: S.ideas,
    team: S.members,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `compass-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast(`Exported ${data.counts.goals} goals, ${data.counts.initiatives} initiatives.`);
}

function toggleKR(krid) {
  const willOpen = !S.openKRs.has(krid);
  if (willOpen) S.openKRs.add(krid); else S.openKRs.delete(krid);
  // Imperative toggle on just this card — avoids a full re-render so the
  // page doesn't jump back to wherever the previous render started, and the
  // CSS grid-template-rows transition gets to play.
  const card = document.getElementById(`kr-${krid}`);
  if (!card) { render(); return; }
  card.querySelector('.kr-collapsible')?.classList.toggle('open', willOpen);
  card.querySelector('.kr-chevron')?.classList.toggle('open', willOpen);
}

async function signInWithGoogle() {
  console.log('[Compass] Sign-in initiated. Current URL:', window.location.href);
  const { data, error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + window.location.pathname,
      // Always show Google's account picker so a returning user (especially
      // after sign-out) consciously chooses which account — and can switch
      // accounts without juggling cookies in another tab.
      queryParams: { prompt: 'select_account' },
    }
  });
  if (error) {
    console.error('[Compass] signInWithOAuth error:', error);
    renderSignInScreen({ error: error.message });
  } else {
    console.log('[Compass] OAuth redirect URL:', data?.url);
  }
}

  console.log('[Compass] Signing out…');
  await sb.auth.signOut();

async function bootApp() {
  // Called once we have a valid session.
  try {
    await Promise.all([db.loadProfile(), db.loadAll()]);
  } catch (e) {
    console.error('[Compass] Data load failed:', e);
    showDBError(e);
    return;
  }
  render();
  // T2.3 — restore state from URL hash if present (deep-link / refresh).
  // Safe to call when hash is empty: it just lands on the dashboard.
  if (window.location.hash) applyHashState();
  setupRealtime();
  // T3.10 — show the onboarding tour once for true first-run users. Gate is
  // "no goals visible AND haven't seen it" — existing teammates joining an
  // already-populated workspace shouldn't get the tour either.
  try {
    const seen = localStorage.getItem('compassSeenTour');
    if (!seen && !S.goals.length) {
      // Delay so the dashboard paints first.
      setTimeout(showOnboardingTour, 350);
    }
  } catch (e) { /* localStorage blocked — fine, no tour */ }
}

        <li><strong>Goals</strong> — the destinations you're chasing this quarter.</li>
        <li><strong>Measures</strong> — the signposts that tell you you're winning.</li>
        <li><strong>Initiatives</strong> — the concrete work each crew member owns.</li>
        <li><strong>Ideas</strong> — sparks captured loose, before they're work.</li>
      </ol>
      <p class="onboard-tip">Once a quarter you plan. Every week you check in. Whenever a spark hits, you drop it on the Ideas wall.</p>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" id="tourSkip">Skip the tour</button>
        <button type="button" class="btn btn-primary" id="tourStart">Set my first goal</button>
      </div>
    </div>
  `);
  const markSeen = () => { try { localStorage.setItem('compassSeenTour', '1'); } catch (e) {} };
  document.getElementById('tourSkip')?.addEventListener('click', () => { markSeen(); closeModal(); });
  document.getElementById('tourStart')?.addEventListener('click', () => { markSeen(); closeModal(); openGoalModal(); });
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════

// Parse the URL hash / query using raw string operations only.
// Some browsers (notably Orion) block URLSearchParams / URL.searchParams
// access for URLs that contain token-like patterns. Raw .split() works.
function parseAuthCallbackFromUrl() {
  const href = window.location.href;
  const hashStart = href.indexOf('#');
  const hashStr = hashStart >= 0 ? href.slice(hashStart + 1) : '';
  // Strip any query within the hash too (rare)
  const cleanHash = hashStr.split('?')[0];
  const queryStart = href.indexOf('?');
  const queryStr = (queryStart >= 0 && (hashStart < 0 || queryStart < hashStart))
    ? href.slice(queryStart + 1, hashStart >= 0 ? hashStart : href.length)
    : '';

  const parseKV = s => {
    const o = {};
    if (!s) return o;
    // OAuth providers use form-urlencoded (+ for space) — convert
    // before decoding so "Database+error" becomes "Database error".
    const decode = x => {
      try { return decodeURIComponent((x || '').replace(/\+/g, ' ')); }
      catch { return x; }
    };
    for (const pair of s.split('&')) {
      const eq = pair.indexOf('=');
      const k = eq < 0 ? pair : pair.slice(0, eq);
      const v = eq < 0 ? '' : pair.slice(eq + 1);
      o[decode(k)] = decode(v);
    }
    return o;
  };
  return { hash: parseKV(cleanHash), query: parseKV(queryStr) };
}

// Map technical auth errors to messages a teammate can act on.
function friendlyAuthError(code, desc) {
  const d = (desc || '').toLowerCase();
  // The domain-restriction trigger raises an exception during signup,
  // and Supabase wraps it as "Database error saving new user". Treat
  // anything that looks like a signup-domain rejection as such.
  if (
    d.includes('database error saving new user') ||
    d.includes('sign-up restricted') ||
    d.includes('signup is disabled') ||
    d.includes('not an allowed domain') ||
    d.includes('email domain') ||
    d.includes('not allowed')
  ) {
    return 'Compass is only open to the Zostel team. Please sign in with your @zostel.com or @zo.xyz Google account.';
  }
  if (code === 'access_denied') {
    return 'Sign-in was cancelled. Click "Continue with Google" to try again.';
  }
  if (d.includes('popup') || d.includes('window closed')) {
    return 'Sign-in window closed before finishing. Please try again.';
  }
  return desc || 'Sign-in failed. Please try again.';
}

function cleanUrl() {
  // Remove query + hash so the URL stops looking suspicious to content blockers.
  const cleaned = window.location.origin + window.location.pathname;
  try { window.history.replaceState(null, '', cleaned); } catch {}
}

// Promise.race helper — surfaces a hang as a real error so we don't sit
// indefinitely on a single API call.
function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(
      () => reject(new Error(`${label} timed out after ${ms}ms`)),
      ms
    )),
  ]);
}

async function handleOAuthCallbackManually() {
  let hash, query;
  try {
    ({ hash, query } = parseAuthCallbackFromUrl());
  } catch (e) {
    console.error('[Compass] URL parse failed:', e);
    return { error: { message: 'Could not parse OAuth callback URL.' } };
  }

  // ── Implicit flow: tokens in URL fragment ──
  if (hash.access_token && hash.refresh_token) {
    console.log('[Compass] OAuth callback: implicit flow detected, extracting tokens');
    cleanUrl();
    console.log('[Compass] URL cleaned. Calling sb.auth.setSession…');
    try {
      const result = await withTimeout(
        sb.auth.setSession({
          access_token: hash.access_token,
          refresh_token: hash.refresh_token,
        }),
        6000,
        'setSession'
      );
      console.log('[Compass] setSession returned');
      const { data, error } = result;
      if (error) {
        console.error('[Compass] setSession returned error:', error);
        return { error };
      }
      console.log('[Compass] Session established for', data?.session?.user?.email);
      return { session: data.session };
    } catch (e) {
      console.error('[Compass] setSession threw / hung:', e);
      return { error: { message: e?.message || 'Sign-in stalled — likely blocked by browser privacy settings.' } };
    }
  }

  // ── PKCE flow: code in query ──
  if (query.code) {
    console.log('[Compass] OAuth callback: PKCE flow detected, exchanging code');
    cleanUrl();
    try {
      const result = await withTimeout(
        sb.auth.exchangeCodeForSession(query.code),
        6000,
        'exchangeCodeForSession'
      );
      const { data, error } = result;
      if (error) { console.error('[Compass] exchangeCodeForSession error:', error); return { error }; }
      console.log('[Compass] Session established for', data?.session?.user?.email);
      return { session: data.session };
    } catch (e) {
      console.error('[Compass] exchangeCodeForSession threw / hung:', e);
      return { error: { message: e?.message || 'Sign-in stalled.' } };
    }
  }

  // ── Provider error in callback ──
  if (hash.error || query.error) {
    const code = hash.error || query.error;
    const desc = hash.error_description || query.error_description || '';
    console.error('[Compass] OAuth provider error:', { code, desc });
    cleanUrl();
    return { error: { message: friendlyAuthError(code, desc), code } };
  }

  return {}; // no callback
}

(async () => {
  console.log('[Compass] Boot · URL has OAuth callback?',
    window.location.search.includes('code=') || window.location.hash.includes('access_token'));
  console.log('[Compass] Boot · localStorage available?', (() => {
    try { localStorage.setItem('_t', '_t'); localStorage.removeItem('_t'); return true; }
    catch { return false; }
  })());

  // ─── Listener only for SIGNED_OUT after boot ─────────────────────
  // We deliberately don't depend on INITIAL_SESSION / SIGNED_IN events
  // for the initial boot — they fire async and can race with our manual
  // setSession call. Instead the boot below is a straight-line sequence.
  let booted = false;
  sb.auth.onAuthStateChange((event, session) => {
    console.log('[Compass] Auth event:', event, session ? `(${session.user?.email})` : '(no session)');
    if (booted && event === 'SIGNED_OUT') window.location.reload();
  });

  // ─── Step 1: Manual OAuth callback (Orion-safe) ──────────────────
  const callback = await handleOAuthCallbackManually();
  if (callback.error) {
    renderSignInScreen({ error: callback.error.message || 'Sign-in failed. Please try again.' });
    return;
  }

  // ─── Step 2: Resolve current session ─────────────────────────────
  // After the manual callback, the session should be set in sb (and in
  // localStorage). Either use what the callback returned directly, or
  // ask sb for what it knows.
  let session = callback.session || null;
  if (!session) {
    console.log('[Compass] No session from callback, asking sb.auth.getSession()…');
    try {
      const { data, error } = await withTimeout(sb.auth.getSession(), 5000, 'getSession');
      if (error) console.warn('[Compass] getSession error:', error);
      session = data?.session || null;
      console.log('[Compass] getSession returned:', session ? `session for ${session.user.email}` : 'no session');
    } catch (e) {
      console.error('[Compass] getSession threw / hung:', e);
    }
  }

  // ─── Step 3: Boot or show sign-in ────────────────────────────────
  if (session) {
    S.session = session;
    booted = true;
    await bootApp();
  } else {
    renderSignInScreen();
  }
})();
</script>
