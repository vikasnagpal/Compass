// ─── Team members (owner dropdown source) ───
function ownerOptions(currentValue = '') {
  const members = [...S.members].sort((a,b) => a.name.localeCompare(b.name));
  let opts = `<option value="">— Unassigned —</option>`;
  const inList = members.some(m => m.name === currentValue);
  if (currentValue && !inList) {
    opts += `<option value="${esc(currentValue)}" selected>${esc(currentValue)} — not on team</option>`;
  }
  opts += members.map(m => `<option value="${esc(m.name)}"${m.name===currentValue?' selected':''}>${esc(m.name)}</option>`).join('');
  return opts;
}

function renderSettingsPage(el) {
  el.innerHTML = `<div class="fade-up">
    <div class="settings-hero">
      <h2>Settings</h2>
      <p>Manage who can lead initiatives in Zostel Compass. Add your teammates here once — they'll show up everywhere "Led by" lives.</p>
    </div>

    <div class="settings-section">
      <div class="settings-section-header">
        <div class="settings-section-title">Team Members</div>
        <div class="settings-section-sub">Add the people you work with. Removing someone here will unassign them from any initiative they're currently leading.</div>
      </div>

      <div class="member-add">
        <input id="memberInput" type="text" placeholder="Add a teammate — e.g. Priya Sharma" autocomplete="off" onkeydown="if(event.key==='Enter'){event.preventDefault();addMember()}" />
        <button class="btn btn-primary btn-sm" type="button" onclick="addMember()">+ Add Member</button>
      </div>

      ${S.members.length
        ? `<div class="member-list">
            ${[...S.members].sort((a,b)=>a.name.localeCompare(b.name)).map(m => `<div class="member-row">
              <span class="member-avatar" aria-hidden="true">${esc(m.name.charAt(0).toUpperCase())}</span>
              <span class="member-name">${esc(m.name)}</span>
              <button class="mr-remove" type="button" onclick="removeMember('${m.id}')" title="Remove ${esc(m.name)}" aria-label="Remove ${esc(m.name)}">✕</button>
            </div>`).join('')}
          </div>`
        : `<div class="member-empty">No teammates yet — add the first one above to start assigning leads.</div>`
      }
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('memberInput')?.focus(),50);
}

function addMember() {
  const input = document.getElementById('memberInput');
  const name = (input?.value || '').trim();
  if (!name) { flashError('memberInput','Type a name to add a teammate.'); return; }
  if (S.members.some(m => m.name.toLowerCase() === name.toLowerCase())) {
    flashError('memberInput', `${name} is already on the team.`);
    return;
  }
  S.members.push({ id: id(), name });
  if (input) input.value = '';
  save(); render();
  setTimeout(()=>document.getElementById('memberInput')?.focus(),50);
}

function removeMember(mid) {
  const m = S.members.find(x => x.id === mid);
  if (!m) return;
  let leadingCount = 0;
  S.goals.forEach(g => g.keyResults.forEach(kr => kr.initiatives.forEach(i => {
    if (i.owner === m.name) leadingCount++;
  })));
  let msg = `Remove ${m.name} from the team?`;
  if (leadingCount > 0) {
    msg += `\n\n${m.name} is currently leading ${leadingCount} initiative${leadingCount!==1?'s':''} — they'll be set to unassigned.`;
  }
  if (!confirm(msg)) return;
  S.goals.forEach(g => g.keyResults.forEach(kr => kr.initiatives.forEach(i => {
    if (i.owner === m.name) i.owner = '';
  })));
  S.members = S.members.filter(x => x.id !== mid);
  save(); render();
}

function toggleKR(krid) {
  S.openKRs.has(krid)?S.openKRs.delete(krid):S.openKRs.add(krid);
  render();
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobOverlay').classList.remove('show');
  const mb = document.getElementById('menuBtn');
  mb.classList.remove('is-open');
  mb.setAttribute('aria-expanded','false');
}

document.getElementById('menuBtn').addEventListener('click',()=>{
  const sb=document.getElementById('sidebar');
  const open=sb.classList.toggle('open');
  document.getElementById('mobOverlay').classList.toggle('show',open);
  const mb=document.getElementById('menuBtn');
  mb.classList.toggle('is-open', open);
  mb.setAttribute('aria-expanded', open?'true':'false');
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeDrawer();closeModal();}
});
