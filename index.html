<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zostel Compass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #F4B400;
      --primary-light:  #FFF8E1;
      --primary-dark:   #D9A000;
      --text:           #1F1F1F;
      --text-muted:     #5C5B56;
      --bg:             #FAF8F3;
      --neutral:        #D9D2C3;
      --green:          #4C6A3D;
      --green-light:    #EBF2E6;
      --surface:        #FFFFFF;
      --border:         #E8E3D8;
      --danger:         #A82A1F;
      --danger-light:   #FDECEA;
      --warning:        #9C5400;
      --warning-light:  #FFF3E0;
      --radius:         18px;
      --radius-sm:      10px;
      --shadow-sm:      0 1px 4px rgba(0,0,0,0.07);
      --shadow-md:      0 4px 14px rgba(0,0,0,0.10);
      --shadow-lg:      0 10px 40px rgba(0,0,0,0.14);
      --sidebar-w:      272px;
      --header-h:       58px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    h1,h2,h3,h4,h5 { font-family: 'Poppins', sans-serif; }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      box-shadow: var(--shadow-sm);
    }
    .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .header-logo { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .logo-mark {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--primary); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 14px; color: #fff;
    }
    .logo-name {
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 17px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .logo-name em { color: var(--primary); font-style: normal; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .menu-btn {
      display: none;
      width: 40px; height: 40px; padding: 0;
      align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: var(--text); border-radius: 10px;
      transition: background .18s, color .18s;
    }
    .menu-btn:hover { background: var(--bg); }
    .menu-btn:active { background: var(--neutral); }
    .menu-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .menu-btn svg line {
      transition: transform .25s ease, opacity .2s ease;
      transform-origin: center;
    }
    .menu-btn.is-open .mi-l1 { transform: translateY(6px) rotate(45deg); }
    .menu-btn.is-open .mi-l2 { opacity: 0; }
    .menu-btn.is-open .mi-l3 { transform: translateY(-6px) rotate(-45deg); }

    /* ── ICONS ──
       Lucide-style inline SVGs. .icon sizes to 1em so they scale with text.
       Stroke uses currentColor so any text colour cascades through. */
    .icon {
      width: 1em; height: 1em;
      display: inline-block;
      vertical-align: -0.18em;
      stroke: currentColor; stroke-width: 1.85;
      fill: none;
      stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }
    .icon-lg { width: 1.3em; height: 1.3em; vertical-align: -0.25em; }
    .icon-tile {
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    }
    .icon-tile .icon { width: 20px; height: 20px; }

    @media (max-width: 768px) {
      .menu-btn { display: inline-flex; }
      .header { padding: 0 12px 0 6px; }
      .logo-name { font-size: 16px; }
    }

    /* ── LAYOUT ── */
    .app-shell { display: flex; height: calc(100vh - var(--header-h)); overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto; overflow-x: hidden;
      padding: 18px 14px 24px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-muted);
      padding: 2px 8px 8px; margin-top: 4px;
    }
    .goal-nav-item {
      padding: 11px 12px; border-radius: var(--radius-sm);
      cursor: pointer; border: 1.5px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .goal-nav-item:hover { background: var(--bg); }
    .goal-nav-item.active { background: var(--primary-light); border-color: var(--primary); }
    .goal-nav-title {
      font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px;
      line-height: 1.4; margin-bottom: 5px;
    }
    .goal-nav-chips { display: flex; gap: 8px; font-size: 12px; color: var(--text-muted); }
    .mini-bar { height: 3px; background: var(--neutral); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .mini-bar-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width .4s; }
    .sidebar-add-btn {
      margin-top: 10px; padding: 10px; border-radius: var(--radius-sm);
      border: 1.5px dashed var(--neutral); background: transparent;
      color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: all .2s;
      width: 100%; text-align: center;
    }
    .sidebar-add-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    /* ── IDEAS NAV ── */
    .sidebar-divider {
      border-top: 1px solid var(--border);
      margin: 14px 4px 10px;
    }
    .nav-ideas-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      border: 1.5px solid transparent; background: transparent;
      cursor: pointer; transition: background .15s, border-color .15s;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      color: var(--text); width: 100%; text-align: left;
    }
    .nav-ideas-btn:hover { background: var(--bg); }
    .nav-ideas-btn.active { background: var(--primary-light); border-color: var(--primary); }
    .nav-ideas-icon { font-size: 17px; line-height: 1; }
    .nav-ideas-count {
      margin-left: auto;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--neutral); color: var(--text);
      padding: 0 9px; min-height: 22px;
      border-radius: 12px;
      font-size: 12px; font-weight: 700;
      font-family: 'IBM Plex Sans', sans-serif;
      line-height: 1;
    }
    .nav-ideas-btn.active .nav-ideas-count { background: var(--primary); color: var(--text); }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 4px;
    }

    /* ── HELP PAGE ── */
    .help-hero {
      border-radius: var(--radius);
      background: linear-gradient(130deg, #FFF8E1 0%, #FFE6B0 100%);
      padding: 26px 30px; margin-bottom: 22px;
      position: relative; overflow: hidden;
    }
    .help-hero::after {
      content: '🧭'; position: absolute;
      right: 26px; top: 50%; transform: translateY(-50%);
      font-size: 86px; opacity: .18; pointer-events: none;
    }
    .help-hero h2 { font-size: 24px; margin-bottom: 6px; color: var(--text); }
    .help-hero p {
      font-size: 15px; color: var(--text); opacity: .82;
      line-height: 1.65; max-width: 620px;
    }

    .help-section {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 22px 24px;
      margin-bottom: 16px; box-shadow: var(--shadow-sm);
    }
    .help-section-title {
      font-family: 'Poppins', sans-serif; font-weight: 600;
      font-size: 17px; color: var(--text); margin-bottom: 6px;
    }
    .help-section-sub {
      font-size: 13.5px; color: var(--text-muted); margin-bottom: 16px;
      line-height: 1.55;
    }

    .help-pillars {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .help-pillar {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px;
    }
    .help-pillar-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 11px;
      background: var(--primary-light); color: var(--primary-dark);
      margin-bottom: 12px;
    }
    .help-pillar-icon .icon { width: 24px; height: 24px; stroke-width: 2; }
    .help-pillar-name {
      font-family: 'Poppins', sans-serif; font-weight: 600;
      font-size: 15px; margin-bottom: 6px; color: var(--text);
    }
    .help-pillar-desc {
      font-size: 13.5px; line-height: 1.6; color: var(--text-muted);
    }
    .help-pillar-desc em {
      color: var(--text); font-style: italic; font-weight: 500;
      display: block; margin-top: 6px;
    }

    .help-list {
      margin: 0; padding-left: 0; list-style: none;
      display: flex; flex-direction: column; gap: 12px;
    }
    .help-list li {
      font-size: 14px; line-height: 1.6; color: var(--text-muted);
      padding-left: 24px; position: relative;
    }
    .help-list li::before {
      content: '↪'; position: absolute; left: 4px; top: 0;
      color: var(--primary); font-weight: 700; font-size: 14px;
    }
    .help-list li strong { color: var(--text); font-weight: 600; }

    .help-principles { margin: 0; padding: 0; list-style: none; display: grid; gap: 10px; }
    .help-principles li {
      font-size: 14px; line-height: 1.6; color: var(--text-muted);
      padding: 12px 14px; background: var(--bg);
      border-left: 3px solid var(--primary); border-radius: 6px;
    }
    .help-principles li strong { color: var(--text); font-weight: 600; }

    .help-steps {
      margin: 0; padding-left: 0; counter-reset: helpsteps;
      list-style: none; display: flex; flex-direction: column; gap: 12px;
    }
    .help-steps li {
      counter-increment: helpsteps;
      padding-left: 38px; position: relative;
      font-size: 14px; line-height: 1.6; color: var(--text-muted);
      min-height: 26px;
    }
    .help-steps li::before {
      content: counter(helpsteps);
      position: absolute; left: 0; top: 0;
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--primary); color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif; font-weight: 600;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .help-steps li strong { color: var(--text); font-weight: 600; }

    .help-credit {
      text-align: center; padding: 28px 14px 6px;
      font-size: 13.5px; color: var(--text-muted);
      font-style: italic;
    }
    .help-credit a {
      color: var(--text); font-weight: 600; font-style: normal;
      text-decoration: none;
      border-bottom: 1.5px solid var(--primary);
      padding-bottom: 1px; transition: all .15s;
    }
    .help-credit a:hover { color: var(--primary-dark); border-bottom-color: var(--primary-dark); }

    /* ── IDEAS PAGE ── */
    .ideas-hero {
      border-radius: var(--radius);
      background: linear-gradient(130deg, #FFF8E1 0%, #FFE6B0 100%);
      padding: 22px 26px; margin-bottom: 22px;
      position: relative; overflow: hidden;
    }
    .ideas-hero::after {
      content: '💡'; position: absolute;
      right: 24px; top: 50%; transform: translateY(-50%);
      font-size: 80px; opacity: .18; pointer-events: none;
    }
    .ideas-hero h2 { font-size: 22px; margin-bottom: 4px; color: var(--text); }
    .ideas-hero p { font-size: 15px; color: var(--text-muted); max-width: 560px; }

    .idea-capture {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      box-shadow: var(--shadow-sm); margin-bottom: 22px;
    }
    .idea-capture textarea {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: 15px;
      background: var(--bg); color: var(--text);
      resize: vertical; min-height: 52px; outline: none;
      transition: border-color .15s; line-height: 1.5;
    }
    .idea-capture textarea:focus { border-color: var(--primary); }
    .idea-capture textarea::placeholder { color: var(--neutral); }
    .idea-capture-foot {
      display: flex; gap: 10px; margin-top: 12px;
      align-items: center; flex-wrap: wrap; justify-content: space-between;
    }
    .idea-capture-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .idea-capture-select {
      padding: 7px 11px; border: 1.5px solid var(--border);
      border-radius: 8px; background: var(--bg);
      font-family: 'Inter', sans-serif; font-size: 13px;
      color: var(--text); cursor: pointer; outline: none;
      min-width: 170px; max-width: 220px;
      transition: border-color .15s;
    }
    .idea-capture-select:focus { border-color: var(--primary); }
    .idea-capture-select:disabled { opacity: .55; cursor: not-allowed; }
    .idea-capture-hint {
      font-size: 12px; color: var(--text-muted);
      margin-top: 6px; display: block;
    }

    .idea-filters {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
    }
    .idea-filter {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0 12px; min-height: 30px;
      border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; transition: all .15s;
      max-width: 240px; line-height: 1;
    }
    .idea-filter:hover { border-color: var(--neutral); color: var(--text); }
    .idea-filter.active {
      background: var(--primary-light); border-color: var(--primary);
      color: var(--text); font-weight: 600;
    }
    .idea-filter-label {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .idea-filter-count {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg); padding: 0 8px;
      min-height: 18px; border-radius: 10px;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      font-family: 'IBM Plex Sans', sans-serif;
      line-height: 1;
    }
    .idea-filter.active .idea-filter-count { background: var(--primary); color: var(--text); }

    .ideas-grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }
    .idea-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: 12px;
      transition: all .18s;
    }
    .idea-card:hover {
      border-color: var(--neutral); transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .idea-text {
      font-size: 14.5px; font-weight: 500; line-height: 1.5;
      color: var(--text);
    }
    .idea-meta {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; flex-wrap: wrap;
    }
    .idea-link-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg); border: 1px solid var(--border);
      padding: 0 10px; min-height: 24px;
      border-radius: 12px;
      font-size: 12px; color: var(--text-muted); font-weight: 500;
      max-width: 100%; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      line-height: 1;
    }
    .idea-loose-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-muted); font-style: italic;
      padding: 0 8px; min-height: 24px; line-height: 1;
    }
    .idea-date { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
    .idea-actions {
      display: flex; gap: 6px; align-items: center;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .idea-actions > .btn { flex: 1; justify-content: center; }

    .btn-icon-only {
      width: 30px; height: 30px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 1.5px solid var(--border);
      cursor: pointer; color: var(--text-muted); border-radius: 8px;
      transition: all .15s; font-size: 13px; flex-shrink: 0;
    }
    .btn-icon-only:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger-light); }

    /* ── IDEAS IN GOAL DETAIL ── */
    .goal-ideas-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      margin-top: 22px; box-shadow: var(--shadow-sm);
    }
    .goal-ideas-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; margin-bottom: 14px;
    }
    .goal-ideas-title {
      font-family: 'Poppins', sans-serif; font-weight: 600;
      font-size: 15px; display: flex; align-items: center; gap: 7px;
    }
    .goal-ideas-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .goal-ideas-quick {
      display: flex; gap: 8px; margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .goal-ideas-quick input {
      flex: 1; min-width: 220px; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: 14px;
      background: var(--bg); outline: none; transition: border-color .15s;
      color: var(--text);
    }
    .goal-ideas-quick input:focus { border-color: var(--primary); }
    .goal-ideas-list {
      display: flex; flex-direction: column; gap: 6px;
      container-type: inline-size;
      container-name: goalIdeasList;
    }
    .goal-idea-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      grid-template-areas: "text kr acts";
      column-gap: 10px; row-gap: 6px; align-items: center;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--bg); border: 1px solid transparent;
      transition: all .15s;
    }
    .goal-idea-row:hover { background: var(--primary-light); border-color: var(--primary); }
    .goal-idea-row .gi-text { grid-area: text; font-size: 13.5px; line-height: 1.45; min-width: 0; }
    .goal-idea-row .gi-kr {
      grid-area: kr;
      display: inline-flex; align-items: center;
      font-size: 11.5px; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 0 9px; min-height: 22px;
      border-radius: 10px;
      max-width: 220px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      line-height: 1;
    }
    .goal-idea-row .gi-acts { grid-area: acts; display: flex; gap: 3px; opacity: 0; transition: opacity .15s; }
    .goal-idea-row:hover .gi-acts { opacity: 1; }

    /* When the goal-ideas list is narrow, drop the measure chip to its own line */
    @container goalIdeasList (max-width: 520px) {
      .goal-idea-row {
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-areas:
          "text acts"
          "kr   kr";
      }
      .goal-idea-row .gi-kr { justify-self: flex-start; max-width: 100%; }
      .goal-idea-row .gi-acts { opacity: 1; } /* touch-friendly */
    }
    .gi-mini-btn {
      width: 26px; height: 26px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: var(--text-muted); border-radius: 6px; font-size: 13px;
    }
    .gi-mini-btn:hover { background: var(--surface); color: var(--text); }
    .gi-mini-btn.gi-danger:hover { background: var(--danger-light); color: var(--danger); }
    .goal-ideas-more {
      margin-top: 10px; font-size: 13px; color: var(--primary);
      font-weight: 600; cursor: pointer; background: none; border: none;
      padding: 4px 0;
    }
    .goal-ideas-more:hover { text-decoration: underline; }
    .goal-ideas-empty {
      padding: 14px 4px; font-size: 13.5px; color: var(--text-muted);
      text-align: center; font-style: italic;
    }

    /* ── SETTINGS PAGE ── */
    .settings-hero {
      border-radius: var(--radius);
      background: var(--surface); border: 1.5px solid var(--border);
      padding: 22px 26px; margin-bottom: 22px;
      box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    }
    .settings-hero::after {
      content: '⚙️'; position: absolute;
      right: 26px; top: 50%; transform: translateY(-50%);
      font-size: 70px; opacity: .10; pointer-events: none;
    }
    .settings-hero h2 { font-size: 22px; margin-bottom: 4px; color: var(--text); }
    .settings-hero p { font-size: 15px; color: var(--text-muted); max-width: 560px; }

    .settings-section {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 22px;
      margin-bottom: 18px; box-shadow: var(--shadow-sm);
    }
    .settings-section-header { margin-bottom: 16px; }
    .settings-section-title {
      font-family: 'Poppins', sans-serif; font-weight: 600;
      font-size: 16px; color: var(--text); margin-bottom: 4px;
    }
    .settings-section-sub {
      font-size: 13.5px; color: var(--text-muted); line-height: 1.55;
    }
    .member-add {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .member-add input {
      flex: 1; min-width: 200px; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: 14px;
      background: var(--bg); outline: none;
      color: var(--text); transition: border-color .15s;
    }
    .member-add input:focus { border-color: var(--primary); }
    .member-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 8px;
    }
    .member-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--bg); border: 1px solid transparent;
      transition: all .15s;
    }
    .member-row:hover { background: var(--primary-light); border-color: var(--primary); }
    .member-row .mr-remove {
      width: 28px; height: 28px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: var(--text-muted); border-radius: 6px;
      font-size: 13px; opacity: 0; transition: all .15s;
    }
    .member-row:hover .mr-remove { opacity: 1; }
    .member-row .mr-remove:hover { background: var(--danger-light); color: var(--danger); }
    .member-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--primary); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 13px;
      flex-shrink: 0;
    }
    .member-name {
      flex: 1; font-size: 14px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .member-empty {
      font-size: 13.5px; color: var(--text-muted);
      text-align: center; padding: 18px 14px;
      font-style: italic;
      background: var(--bg); border-radius: var(--radius-sm);
      border: 1px dashed var(--neutral);
    }
    @media (max-width: 480px) {
      .member-row .mr-remove { opacity: 1; }
    }

    /* ── DELIGHT: idea-capture micro-celebrations ── */
    .idea-spark {
      position: fixed; width: 8px; height: 8px;
      background: var(--primary); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      animation: sparkFly 820ms cubic-bezier(.2,.7,.3,1) forwards;
      box-shadow: 0 0 6px rgba(244,180,0,.55);
    }
    .idea-spark.s-sm  { width: 5px; height: 5px; }
    .idea-spark.s-green { background: var(--green); box-shadow: 0 0 6px rgba(76,106,61,.45); }
    @keyframes sparkFly {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
      18%  { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.55); }
    }

    .nav-ideas-count.bump { animation: countBump 520ms ease; }
    @keyframes countBump {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.35); background: var(--primary); color: var(--text); }
      100% { transform: scale(1); }
    }

    .idea-huzzah {
      position: fixed; left: 50%; bottom: 36px;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: #fff;
      padding: 10px 20px; border-radius: 100px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      box-shadow: 0 10px 32px rgba(0,0,0,0.18);
      opacity: 0; pointer-events: none; z-index: 9999;
      max-width: 92vw; text-align: center;
      transition: opacity .28s ease, transform .32s cubic-bezier(.2,.8,.3,1);
      letter-spacing: 0.1px;
    }
    .idea-huzzah.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
    .idea-huzzah.big {
      background: linear-gradient(135deg, var(--primary) 0%, #E5A800 100%);
      color: var(--text);
      padding: 13px 24px; font-size: 14.5px;
      box-shadow: 0 12px 36px rgba(244,180,0,.45);
    }

    .idea-card.fresh { animation: cardGlow 1.6s ease; }
    @keyframes cardGlow {
      0%   { background: var(--primary-light); border-color: var(--primary); transform: scale(.985); }
      18%  { background: var(--primary-light); border-color: var(--primary); transform: scale(1.015); }
      100% { background: var(--surface); border-color: var(--border); transform: scale(1); }
    }
    .goal-idea-row.fresh { animation: rowGlow 1.6s ease; }
    @keyframes rowGlow {
      0%   { background: var(--primary-light); border-color: var(--primary); }
      100% { background: var(--bg); border-color: transparent; }
    }

    @media (prefers-reduced-motion: reduce) {
      .idea-spark { display: none; }
      .nav-ideas-count.bump { animation: none; }
      .idea-card.fresh, .goal-idea-row.fresh { animation: none; }
      .idea-huzzah { transition: opacity .14s ease; transform: translateX(-50%); }
      .idea-huzzah.show { transform: translateX(-50%); }
    }

    /* ── CONTENT ── */
    .content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 28px 32px;
    }
    @media (max-width: 900px) { .content { padding: 20px 18px; } }

    /* ── MOBILE SIDEBAR ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: var(--header-h); bottom: 0;
        z-index: 200; transform: translateX(-100%);
        transition: transform .28s ease; box-shadow: var(--shadow-lg);
      }
      .sidebar.open { transform: translateX(0); }
      .content { padding: 16px 14px; }
    }
    .mob-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.28); z-index: 190;
    }
    .mob-overlay.show { display: block; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 18px; min-height: 38px;
      border-radius: 10px; border: none;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap;
      line-height: 1;
    }
    .btn-primary { background: var(--primary); color: var(--text); }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline {
      background: transparent; border: 1.5px solid var(--border); color: var(--text);
    }
    .btn-outline:hover { border-color: var(--neutral); background: var(--bg); }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-sm { padding: 0 13px; min-height: 30px; font-size: 13px; border-radius: 8px; }
    .btn-danger { background: var(--danger-light); color: var(--danger); border: none; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-icon {
      width: 30px; height: 30px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 16px;
    }

    /* ── WELCOME BANNER ── */
    .banner {
      border-radius: var(--radius);
      background: linear-gradient(130deg, #F4B400 0%, #E09000 100%);
      padding: 24px 28px; margin-bottom: 26px; color: #fff;
      position: relative; overflow: hidden;
    }
    .banner::after {
      content: '✦'; position: absolute;
      right: 28px; top: 50%; transform: translateY(-50%);
      font-size: 90px; opacity: .12; pointer-events: none;
    }
    .banner h2 { font-size: 22px; margin-bottom: 4px; }
    .banner p { font-size: 15px; opacity: .92; }

    /* ── SECTION HEADER ── */
    .sec-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; gap: 12px;
    }
    .sec-title { font-size: 19px; font-weight: 700; }
    .sec-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    /* ── GOAL CARDS (dashboard) ── */
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .goal-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1.5px solid var(--border); padding: 20px;
      cursor: pointer; transition: all .2s; box-shadow: var(--shadow-sm);
    }
    .goal-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary); }
    .goal-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .goal-card-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 15.5px; line-height: 1.4; flex: 1; }
    .q-chip {
      display: inline-flex; align-items: center;
      font-size: 12px; font-weight: 700;
      padding: 0 10px; min-height: 24px;
      border-radius: 20px;
      background: var(--primary-light); color: var(--warning);
      margin-left: 8px; white-space: nowrap;
      line-height: 1;
    }
    .goal-card-nums { display: flex; gap: 16px; margin-bottom: 12px; }
    .num-stat strong {
      display: block; font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500; font-size: 22px; line-height: 1.2;
    }
    .num-stat span { font-size: 12.5px; color: var(--text-muted); }
    .prog-bar { height: 7px; background: var(--neutral); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .prog-fill { height: 100%; border-radius: 3px; transition: width .5s; }
    .prog-fill.g { background: var(--green); }
    .prog-fill.y { background: var(--primary); }
    .prog-fill.r { background: var(--danger); }
    .prog-note { font-size: 12.5px; color: var(--text-muted); }

    /* ── GOAL DETAIL HEADER ── */
    .goal-detail-box {
      background: var(--surface); border-radius: var(--radius);
      border: 1.5px solid var(--border); padding: 22px 24px;
      margin-bottom: 22px; box-shadow: var(--shadow-sm);
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13.5px; color: var(--text-muted); margin-bottom: 18px;
    }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { color: var(--primary); }
    .breadcrumb-sep { color: var(--neutral); }
    .gd-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .gd-desc { font-size: 15px; color: var(--text-muted); line-height: 1.65; margin-bottom: 16px; }
    .gd-stats { display: flex; gap: 26px; flex-wrap: wrap; }
    .gd-stat-val {
      font-family: 'IBM Plex Sans', sans-serif; font-size: 28px;
      font-weight: 500; line-height: 1.1;
    }
    .gd-stat-lab { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }

    /* ── KR CARD ── */
    .kr-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1.5px solid var(--border); margin-bottom: 14px;
      overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .kr-header {
      padding: 16px 20px; display: flex; align-items: center;
      gap: 12px; cursor: pointer; transition: background .15s;
    }
    .kr-header:hover { background: var(--bg); }
    .kr-title-wrap { flex: 1; min-width: 0; }
    .kr-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 15px; line-height: 1.4; }
    .kr-meta { font-size: 13px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
    .kr-progress-block { display: flex; align-items: center; gap: 10px; flex-shrink: 0; min-width: 150px; }
    .kr-prog-val { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
    .kr-prog-bar { flex: 1; height: 6px; background: var(--neutral); border-radius: 3px; overflow: hidden; }
    .kr-chevron { font-size: 16px; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
    .kr-chevron.open { transform: rotate(180deg); }
    @media (max-width: 560px) { .kr-progress-block { display: none; } }

    /* ── INITIATIVES ──
       Wide view uses CSS subgrid so every row shares the same 7 columns:
       dot · name · status · owner · due · comments · delete.
       The status column is the same width on every row, so badges line up
       vertically — same for owner, due, comments. */
    .inits-wrap {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns:
        auto              /* 1: status dot */
        minmax(0, 1fr)    /* 2: initiative name (flexible) */
        auto              /* 3: status badge */
        auto              /* 4: owner */
        auto              /* 5: due date */
        auto              /* 6: comments */
        auto;             /* 7: delete */
      column-gap: 16px;
      container-type: inline-size;
      container-name: initsList;
    }
    .inits-toolbar {
      grid-column: 1 / -1;
      padding: 9px 20px; display: flex; align-items: center;
      justify-content: space-between; background: var(--bg);
    }
    .inits-toolbar-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .9px; color: var(--text-muted);
    }
    .init-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: subgrid;
      align-items: center;
      padding: 13px 20px;
      border-top: 1px solid var(--border);
      cursor: pointer; transition: background .13s;
    }
    .init-row:hover { background: #FAF8F3; }
    .init-row > .init-dot {
      grid-column: 1;
      width: 10px; height: 10px; border-radius: 50%;
      justify-self: start;
    }
    .init-row > .init-name {
      grid-column: 2;
      font-size: 14px; font-weight: 500;
      min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .init-row > .ir-status   { grid-column: 3; justify-self: start; }
    .init-row > .ir-owner    {
      grid-column: 4; justify-self: start;
      font-size: 13px; color: var(--text-muted); white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .init-row > .ir-due      {
      grid-column: 5; justify-self: start;
      font-size: 12.5px; color: var(--text-muted); white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .init-row > .ir-comments {
      grid-column: 6; justify-self: start;
      font-size: 12.5px; color: var(--text-muted); white-space: nowrap;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .init-row > .del-btn {
      grid-column: 7; justify-self: end;
      opacity: 0; background: none; border: none; cursor: pointer;
      font-size: 15px; color: var(--text-muted); padding: 2px 6px;
      border-radius: 5px; transition: all .15s;
    }
    .init-row:hover .del-btn { opacity: 1; }
    .del-btn:hover { background: var(--danger-light); color: var(--danger); }

    /* When the initiatives list gets narrow, drop the subgrid alignment and
       fall back to a 2-line layout: name + delete on top, attributes below. */
    @container initsList (max-width: 720px) {
      .inits-wrap { display: block; column-gap: 0; }
      .inits-toolbar { grid-column: auto; }
      .init-row {
        display: flex; flex-wrap: wrap; align-items: center;
        column-gap: 10px; row-gap: 6px;
        grid-column: auto; grid-template-columns: none;
      }
      .init-row::after {
        content: ""; flex-basis: 100%; width: 0; height: 0; order: 1;
      }
      .init-row > .init-dot { order: 0; grid-column: auto; justify-self: auto; }
      .init-row > .init-name {
        order: 0; grid-column: auto;
        flex: 1 1 auto; white-space: normal; line-height: 1.4;
      }
      .init-row > .del-btn { order: 0; grid-column: auto; justify-self: auto; opacity: 1; }
      .init-row > .ir-status,
      .init-row > .ir-owner,
      .init-row > .ir-due,
      .init-row > .ir-comments { order: 2; grid-column: auto; justify-self: auto; }
      .init-row > .ir-owner:empty,
      .init-row > .ir-due:empty { display: none; }
    }

    /* ── BADGES ──
       inline-flex + line-height: 1 explicitly centers text so a status
       pill sits visually flush with adjacent chips of similar shape. */
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      padding: 0 11px; min-height: 26px;
      border-radius: 20px; white-space: nowrap;
      line-height: 1;
    }
    .badge-not_started  { background: #F0EFED; color: #6B6A65; }
    .badge-in_progress  { background: var(--primary-light); color: var(--warning); }
    .badge-on_track     { background: var(--green-light); color: var(--green); }
    .badge-at_risk      { background: var(--warning-light); color: var(--warning); }
    .badge-blocked      { background: var(--danger-light); color: var(--danger); }
    .badge-completed    { background: var(--green-light); color: var(--green); }

    .dot-not_started  { background: #B0ADA6; }
    .dot-in_progress  { background: var(--primary); }
    .dot-on_track     { background: var(--green); }
    .dot-at_risk      { background: var(--warning); }
    .dot-blocked      { background: var(--danger); }
    .dot-completed    { background: var(--green); }

    /* ── OVERLAY + DRAWER ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.30);
      z-index: 300; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 500px; max-width: 96vw;
      background: var(--surface); z-index: 310;
      display: flex; flex-direction: column;
      transform: translateX(110%); transition: transform .3s ease;
      box-shadow: var(--shadow-lg);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-head {
      padding: 18px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .drawer-close-btn {
      float: right; background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--text-muted); line-height: 1;
      padding: 2px 4px; border-radius: 6px; transition: all .15s;
    }
    .drawer-close-btn:hover { background: var(--bg); color: var(--text); }
    .drawer-crumb { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .drawer-title { font-size: 18px; font-weight: 700; line-height: 1.4; margin-right: 34px; }
    .drawer-meta {
      display: flex; gap: 8px; flex-wrap: wrap;
      align-items: center; margin-top: 12px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 0 11px; min-height: 26px;
      border-radius: 20px;
      font-size: 13px; font-weight: 500;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-muted);
      line-height: 1;
    }
    button.chip {
      font-family: 'Inter', sans-serif; margin: 0; cursor: pointer;
      transition: all .15s;
    }
    button.chip:hover {
      border-color: var(--primary); background: var(--primary-light);
      color: var(--text);
    }
    button.chip:focus-visible {
      outline: 2px solid var(--primary); outline-offset: 2px;
    }
    button.chip.chip-empty { border-style: dashed; font-style: italic; }
    button.chip.chip-empty:hover { font-style: normal; }
    .chip-input {
      display: inline-flex; align-items: center;
      padding: 0 11px; min-height: 26px;
      border: 1.5px solid var(--primary);
      border-radius: 20px; outline: none;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      background: var(--surface); color: var(--text);
      box-shadow: 0 0 0 3px var(--primary-light);
      transition: box-shadow .15s;
      line-height: 1;
    }
    .chip-input[type="text"] { min-width: 180px; }
    .chip-input[type="date"] { min-width: 150px; }
    select.chip-input { min-width: 200px; cursor: pointer; padding-right: 26px; }

    .drawer-body { flex: 1; overflow-y: auto; padding: 20px 22px; }

    /* ── UPDATE BOX ── */
    .update-box {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px; margin-bottom: 22px;
    }
    .update-box-title {
      font-size: 12.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .9px; color: var(--text-muted); margin-bottom: 12px;
    }
    .status-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .status-pill {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 14px; min-height: 30px;
      border-radius: 20px; border: 1.5px solid transparent;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .18s;
      line-height: 1;
    }
    .status-pill:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .status-pill.active { box-shadow: 0 0 0 2.5px var(--primary); }
    .status-pending-hint {
      margin-top: 10px; padding: 8px 12px;
      background: var(--primary-light); border: 1px dashed var(--primary);
      border-radius: var(--radius-sm);
      font-size: 12.5px; color: var(--text);
      line-height: 1.45;
    }
    .status-pending-hint strong { font-weight: 600; }

    .comment-box {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden;
    }
    .comment-box textarea {
      width: 100%; padding: 12px 14px; border: none; outline: none;
      font-family: 'Inter', sans-serif; font-size: 15px;
      resize: none; background: transparent; color: var(--text);
      min-height: 78px; line-height: 1.5;
    }
    .comment-box textarea::placeholder { color: var(--neutral); }
    .comment-box-foot {
      padding: 8px 10px; display: flex; align-items: center;
      justify-content: space-between; border-top: 1px solid var(--border);
    }
    .comment-hint { font-size: 12.5px; color: var(--text-muted); }

    /* ── TIMELINE ── */
    .timeline-label {
      font-size: 14px; font-weight: 600; color: var(--text);
      margin-bottom: 14px;
    }
    .timeline { position: relative; }
    .timeline::before {
      content: ''; position: absolute;
      left: 16px; top: 34px; bottom: 6px;
      width: 2px; background: var(--border);
    }
    .tl-item { display: flex; gap: 12px; margin-bottom: 18px; }
    .tl-icon {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border: 2px solid var(--border);
      background: var(--surface); z-index: 1;
    }
    .tl-icon.comment-ic  { background: var(--primary-light); border-color: var(--primary); }
    .tl-icon.status-ic   { background: var(--green-light); border-color: var(--green); }
    .tl-icon.created-ic  { background: #F0EFED; border-color: var(--neutral); }
    .tl-body {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
    }
    .tl-date { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
    .tl-text { font-size: 14px; line-height: 1.6; }

    /* ── MODAL ── */
    .modal-wrap {
      position: fixed; inset: 0; z-index: 400;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,.32); }
    .modal-box {
      position: relative; background: var(--surface);
      border-radius: var(--radius); padding: 26px 28px;
      width: 100%; max-width: 460px; box-shadow: var(--shadow-lg);
      animation: popIn .22s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.95) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-title {
      font-size: 19px; font-weight: 700; margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .modal-title .icon { color: var(--primary-dark); }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: 15px;
      background: var(--bg); color: var(--text); outline: none;
      transition: border-color .18s;
    }
    .form-input:focus { border-color: var(--primary); }
    textarea.form-input { resize: vertical; min-height: 62px; }
    select.form-input { cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .form-actions { display: flex; gap: 9px; align-items: center; justify-content: flex-end; margin-top: 20px; }

    /* ── EMPTY STATES ── */
    .empty {
      text-align: center; padding: 40px 20px; color: var(--text-muted);
    }
    .empty-icon { font-size: 44px; margin-bottom: 10px; }
    .empty h3 { font-size: 17px; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; margin-bottom: 16px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .24s ease; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--neutral); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>

const id = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function fmtDate(s) {
  if(!s) return '';
  try { return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}); } catch(_){return s;}
}
function fmtDateLong(s) {
  if(!s) return '';
  try { return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); } catch(_){return s;}
}
function fmtNum(n) {
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(0)+'K';
  return n;
}
function goalProgress(g) {
  let tot=0,good=0;
  g.keyResults.forEach(kr=>kr.initiatives.forEach(i=>{tot++;if(i.status==='completed'||i.status==='on_track')good++;}));
  return tot?Math.round(good/tot*100):0;
}
function krProgress(kr) {
  if(!kr.target) return 0;
  return Math.min(100,Math.round(kr.current/kr.target*100));
}
function progColor(p) { return p>=70?'g':p>=40?'y':'r'; }

function findGoal(gid) { return S.goals.find(g=>g.id===gid); }
function findKR(g,krid) { return g?.keyResults.find(k=>k.id===krid); }
function findInit(kr,iid) { return kr?.initiatives.find(i=>i.id===iid); }

function sparkleBurstFromRect(rect) {
  if (!rect || !rect.width) return;
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const N = 14;
  for (let i = 0; i < N; i++) {
    const dot = document.createElement('span');
    dot.className = 'idea-spark';
    if (i % 3 === 0) dot.classList.add('s-sm');
    if (i % 5 === 0) dot.classList.add('s-green');
    document.body.appendChild(dot);
    const angle = (Math.PI * 2 * i) / N + (Math.random() * 0.4 - 0.2);
    const dist  = 38 + Math.random() * 80;
    const dx    = Math.cos(angle) * dist;
    const dy    = Math.sin(angle) * dist - 22; // slight upward bias
    dot.style.left = cx + 'px';
    dot.style.top  = cy + 'px';
    dot.style.setProperty('--dx', dx + 'px');
    dot.style.setProperty('--dy', dy + 'px');
    dot.style.animationDelay = (i * 6) + 'ms';
    setTimeout(() => dot.remove(), 1000);
  }
}

function bumpIdeaCounter() {
  const el = document.getElementById('navIdeasCount');
  if (!el) return;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
}

function showHuzzah(text, big=false) {
  let host = document.getElementById('ideaHuzzah');
  if (!host) {
    host = document.createElement('div');
    host.id = 'ideaHuzzah';
    document.body.appendChild(host);
  }
  host.className = 'idea-huzzah show' + (big?' big':'');
  host.textContent = text;
  clearTimeout(huzzahTimeout);
  huzzahTimeout = setTimeout(() => host.classList.remove('show'), big ? 2400 : 1700);
}

  if (!S.goals.length) return '';
  const counts = {
    all: S.ideas.length,
    unlinked: S.ideas.filter(i=>!i.goalId).length,
  };
  S.goals.forEach(g => { counts[g.id] = S.ideas.filter(i=>i.goalId===g.id).length; });

  const chips = [];
  chips.push(`<button class="idea-filter${ideaFilter==='all'?' active':''}" type="button" onclick="setIdeaFilter('all')"><span class="idea-filter-label">All ideas</span><span class="idea-filter-count">${counts.all}</span></button>`);
  if (counts.unlinked > 0) {
    chips.push(`<button class="idea-filter${ideaFilter==='unlinked'?' active':''}" type="button" onclick="setIdeaFilter('unlinked')"><span class="idea-filter-label">Loose ideas</span><span class="idea-filter-count">${counts.unlinked}</span></button>`);
  }
  S.goals.forEach(g => {
    if (counts[g.id] > 0) {
      chips.push(`<button class="idea-filter${ideaFilter===g.id?' active':''}" type="button" onclick="setIdeaFilter('${g.id}')"><span class="idea-filter-label">${esc(g.title)}</span><span class="idea-filter-count">${counts[g.id]}</span></button>`);
    }
  });
  return `<div class="idea-filters">${chips.join('')}</div>`;
}

function setIdeaFilter(f) { ideaFilter = f; renderMain(); }

function renderIdeasGrid() {
  let list = S.ideas;
  if (ideaFilter === 'unlinked') list = list.filter(i=>!i.goalId);
  else if (ideaFilter !== 'all') list = list.filter(i=>i.goalId===ideaFilter);

  list = [...list].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));

  if (!list.length) return `<div class="empty" style="padding:24px"><p>Nothing here yet — try a different filter or add an idea above.</p></div>`;

  return `<div class="ideas-grid">${list.map(renderIdeaCard).join('')}</div>`;
}

function renderIdeaCard(idea) {
  const g = idea.goalId ? findGoal(idea.goalId) : null;
  const kr = (g && idea.krId) ? findKR(g, idea.krId) : null;
  const fresh = idea.id === justAddedIdeaId ? ' fresh' : '';
  return `<div class="idea-card${fresh}">
    <div class="idea-text">${esc(idea.text)}</div>
    <div class="idea-meta">
      ${g
        ? `<span class="idea-link-chip" title="${esc(g.title)}${kr?' › '+esc(kr.title):''}">${icon('goal')} ${esc(g.title)}${kr?` › ${esc(kr.title)}`:''}</span>`
        : `<span class="idea-loose-chip">💭 Loose idea</span>`
      }
      <span class="idea-date">${fmtDate(idea.createdAt)}</span>
    </div>
    <div class="idea-actions">
      <button class="btn btn-outline btn-sm" type="button" onclick="openPromoteModal('${idea.id}')">↗ Turn into initiative</button>
      <button class="btn-icon-only" type="button" onclick="deleteIdea('${idea.id}')" title="Delete idea" aria-label="Delete idea">✕</button>
    </div>
  </div>`;
}

function addIdeaFromForm() {
  const ta = document.getElementById('newIdeaText');
  const text = (ta?.value||'').trim();
  if (!text) { flashError('newIdeaText','What\'s the idea? Type it in to capture it.'); return; }
  const rect = ta?.getBoundingClientRect();
  const gid = document.getElementById('newIdeaGoal')?.value || null;
  const krid = document.getElementById('newIdeaKR')?.value || null;
  const newIdea = { id:id(), text, goalId:gid||null, krId:krid||null, createdAt:today() };
  S.ideas.push(newIdea);
  justAddedIdeaId = newIdea.id;
  if (ta) ta.value = '';
  save(); render();
  setTimeout(()=>document.getElementById('newIdeaText')?.focus(),50);
  celebrateIdea(rect);
  setTimeout(()=>{ justAddedIdeaId = null; }, 2000);
}

function addQuickIdea(gid) {
  const input = document.getElementById('goalIdeaInput');
  const text = (input?.value||'').trim();
  if (!text || !input) return;
  const rect = input.getBoundingClientRect();
  const newIdea = { id:id(), text, goalId:gid, krId:null, createdAt:today() };
  S.ideas.push(newIdea);
  justAddedIdeaId = newIdea.id;
  input.value = '';
  save(); render();
  setTimeout(()=>document.getElementById('goalIdeaInput')?.focus(),50);
  celebrateIdea(rect);
  setTimeout(()=>{ justAddedIdeaId = null; }, 2000);
}

function deleteIdea(iid) {
  if (!confirm('Delete this idea?')) return;
  S.ideas = S.ideas.filter(i=>i.id!==iid);
  save(); render();
}

function openPromoteModal(iid) {
  const idea = S.ideas.find(i=>i.id===iid);
  if (!idea) return;
  if (!S.goals.length) { alert('Add a goal first — initiatives need a measure to live under.'); return; }

  showModal(`
    <div class="modal-title">${icon('arrowUpRight','icon-lg')} Turn into Initiative</div>
    <div class="form-group">
      <label class="form-label">The idea</label>
      <div style="background:var(--bg);padding:11px 13px;border-radius:var(--radius-sm);font-size:14px;line-height:1.5;border:1.5px solid var(--border)">${esc(idea.text)}</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Goal</label>
        <select class="form-input" id="pGoal"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Measure</label>
        <select class="form-input" id="pKR"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Who's leading it</label>
        <select class="form-input" id="pOwner">${ownerOptions('')}</select>
      </div>
      <div class="form-group">
        <label class="form-label">By when</label>
        <input class="form-input" id="pDue" type="date" />
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" id="pCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="pSave">Add as Initiative</button>
    </div>
  `);

  const goalSel = document.getElementById('pGoal');
  const krSel = document.getElementById('pKR');

  goalSel.innerHTML = S.goals.map(g=>`<option value="${g.id}"${g.id===idea.goalId?' selected':''}>${esc(g.title)}</option>`).join('');

  const fillKR = () => {
    const g = findGoal(goalSel.value);
    if (!g?.keyResults?.length) {
      krSel.innerHTML = '<option value="">No measures yet — add one to this goal first</option>';
      krSel.disabled = true; return;
    }
    krSel.disabled = false;
    krSel.innerHTML = g.keyResults.map(kr=>`<option value="${kr.id}"${kr.id===idea.krId?' selected':''}>${esc(kr.title)}</option>`).join('');
  };
  fillKR();
  goalSel.addEventListener('change', fillKR);

  document.getElementById('pCancel').addEventListener('click', closeModal);
  document.getElementById('pSave').addEventListener('click', ()=>promoteIdea(iid));
}

function promoteIdea(iid) {
  const idea = S.ideas.find(i=>i.id===iid);
  if (!idea) return;
  const gid = document.getElementById('pGoal')?.value;
  const krid = document.getElementById('pKR')?.value;
  if (!krid) { alert('Pick a measure for this initiative to live under.'); return; }
  const g = findGoal(gid), kr = findKR(g, krid);
  if (!kr) return;

  const owner = (document.getElementById('pOwner')?.value||'').trim();
  const dueDate = document.getElementById('pDue')?.value || '';

  kr.initiatives.push({
    id: id(),
    title: idea.text,
    status: 'not_started',
    owner, dueDate,
    history: [{ id:id(), date:today(), type:'created', note:'Promoted from an idea 💡' }]
  });
  S.ideas = S.ideas.filter(i=>i.id!==iid);
  save();
  closeModal();
  S.view = 'goals';
  S.activeGoalId = gid;
  S.openKRs.add(krid);
  render();
}

function renderGoalIdeasSection(g) {
  const list = S.ideas.filter(i=>i.goalId===g.id);
  const sorted = [...list].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const visible = sorted.slice(0,5);
  return `<div class="goal-ideas-card">
    <div class="goal-ideas-header">
      <div>
        <div class="goal-ideas-title">${icon('idea')} Ideas for this goal</div>
        <div class="goal-ideas-sub">${list.length
          ? `${list.length} captured — ready when planning rolls around.`
          : `Nothing captured yet — drop loose thoughts here as they come.`}</div>
      </div>
    </div>
    <div class="goal-ideas-quick">
      <input type="text" id="goalIdeaInput" placeholder="${esc(pickPrompt(GOAL_CAPTURE_PROMPTS))}" onkeydown="if(event.key==='Enter'){event.preventDefault();addQuickIdea('${g.id}')}" />
      <button class="btn btn-primary btn-sm" type="button" onclick="addQuickIdea('${g.id}')">Add</button>
    </div>
    ${list.length
      ? `<div class="goal-ideas-list">
          ${visible.map(i=>{
            const kr = i.krId ? findKR(g, i.krId) : null;
            const fresh = i.id === justAddedIdeaId ? ' fresh' : '';
            return `<div class="goal-idea-row${fresh}">
              <span class="gi-text">${esc(i.text)}</span>
              ${kr?`<span class="gi-kr" title="${esc(kr.title)}">${esc(kr.title)}</span>`:''}
              <span class="gi-acts">
                <button class="gi-mini-btn" type="button" title="Turn into initiative" onclick="openPromoteModal('${i.id}')">↗</button>
                <button class="gi-mini-btn gi-danger" type="button" title="Delete" onclick="deleteIdea('${i.id}')">✕</button>

            </div>`;
          }).join('')}
        </div>
        ${list.length>5 ? `<button class="goal-ideas-more" type="button" onclick="setIdeaFilter('${g.id}');goToIdeas()">View all ${list.length} ideas →</button>` : ''}`
      : `<div class="goal-ideas-empty">No ideas yet — capture the first one above.</div>`
    }
  </div>`;
}

let DX = null; // { goalId, krId, initId }
let pendingStatus = null; // staged status selection in the drawer

function openDrawer(gid, krid, iid) {
  const g=findGoal(gid), kr=findKR(g,krid), init=findInit(kr,iid);
  if(!init) return;
  DX = {gid,krid,iid};
  pendingStatus = init.status;
  document.getElementById('dCrumb').textContent = `${g.title}  ›  ${kr.title}`;
  document.getElementById('dTitle').textContent = init.title;
  refreshDrawerMeta(init);
  renderDrawerBody(init);
  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('open');
}

function refreshDrawerMeta(init) {
  const dMeta = document.getElementById('dMeta');
  dMeta.innerHTML =
    `<span class="badge badge-${init.status}">${slabel(init.status)}</span>`+
    `<button type="button" class="chip${init.owner?'':' chip-empty'}" data-edit="owner" title="Click to edit who's leading">${icon('user')} ${init.owner?`Led by ${esc(init.owner)}`:`+ Add lead`}</button>`+
    `<button type="button" class="chip${init.dueDate?'':' chip-empty'}" data-edit="due" title="Click to edit the date">${icon('calendar')} ${init.dueDate?`By ${fmtDate(init.dueDate)}`:`+ Add date`}</button>`;
  dMeta.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => startEditMeta(btn.dataset.edit));
  });
}

function startEditMeta(field) {
  if (!DX) return;
  const g = findGoal(DX.gid), kr = findKR(g, DX.krid), init = findInit(kr, DX.iid);
  if (!init) return;
  const btn = document.querySelector(`#dMeta [data-edit="${field}"]`);
  if (!btn) return;

  let input;
  if (field === 'owner') {
    input = document.createElement('select');
    input.className = 'chip-input';
    input.innerHTML = ownerOptions(init.owner || '');
    input.addEventListener('change', () => input.blur());
  } else if (field === 'due') {
    input = document.createElement('input');
    input.type = 'date';
    input.className = 'chip-input';
    input.value = init.dueDate || '';
  }

  let done = false;
  const commit = () => {
    if (done) return;
    done = true;
    const v = (input.value || '').trim();
    if (field === 'owner') init.owner = v;
    else if (field === 'due') init.dueDate = v;
    save();
    refreshDrawerMeta(init);
    renderMain();
  };
  const cancel = () => {
    if (done) return;
    done = true;
    refreshDrawerMeta(init);
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  input.addEventListener('blur', commit);

  btn.replaceWith(input);
  input.focus();
  if (field === 'owner' && input.tagName !== 'SELECT') input.select();
}

function renderDrawerBody(init) {
  if (pendingStatus == null) pendingStatus = init.status;
  document.getElementById('dBody').innerHTML = `
    <div class="update-box">
      <div class="update-box-title">Share an Update</div>
      <div style="margin-bottom:10px">
        <div class="form-label" style="margin-bottom:8px">Status</div>
        <div class="status-pills" id="statusPills">
          ${STATUSES.map(s=>`<button type="button" class="status-pill badge-${s.v}${pendingStatus===s.v?' active':''}"
            data-status="${s.v}" onclick="stageStatus('${s.v}')">${s.emoji} ${s.label}</button>`).join('')}
        </div>
        <div class="status-pending-hint" id="statusPendingHint" style="${pendingStatus!==init.status?'':'display:none'}">
          ↗ Status change staged — hit <strong>Share Update</strong> to save it to the trail.
        </div>
      </div>
      <div class="form-label" style="margin-bottom:6px">Comment <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted)">(optional)</span></div>
      <div class="comment-box">
        <textarea id="commentInput" placeholder="How's it going? Share progress, roadblocks, or a little win to celebrate…" rows="3"
          onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter')shareUpdate()"></textarea>
        <div class="comment-box-foot">
          <span class="comment-hint">Ctrl+Enter to share</span>
          <button class="btn btn-primary btn-sm" type="button" onclick="shareUpdate()">Share Update</button>
        </div>
      </div>
    </div>
    <div class="timeline-label">Activity Trail</div>
    <div class="timeline" id="timeline">${renderTimeline(init)}</div>
  `;
}

function stageStatus(newStatus) {
  if (!DX) return;
  pendingStatus = newStatus;
  document.querySelectorAll('#statusPills .status-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.status === newStatus);
  });
  const init = findInit(findKR(findGoal(DX.gid), DX.krid), DX.iid);
  const hint = document.getElementById('statusPendingHint');
  if (hint && init) {
    hint.style.display = (newStatus !== init.status) ? '' : 'none';
  }
}

function shareUpdate() {
  if(!DX) return;
  const g=findGoal(DX.gid), kr=findKR(g,DX.krid), init=findInit(kr,DX.iid);
  if(!init) return;
  const text=(document.getElementById('commentInput')?.value||'').trim();
  const statusChanged = pendingStatus && pendingStatus !== init.status;
  if (!statusChanged && !text) return; // nothing to share

  if (statusChanged) {
    const old = init.status;
    init.status = pendingStatus;
    init.history.push({ id:id(), date:today(), type:'status_change', from:old, to:pendingStatus, note:text });
  } else if (text) {
    init.history.push({ id:id(), date:today(), type:'comment', text });
  }
  if (document.getElementById('commentInput')) document.getElementById('commentInput').value = '';
  pendingStatus = init.status;
  save();
  refreshDrawerMeta(init);
  renderDrawerBody(init);
  renderMain();
  renderSidebar();
}

function renderTimeline(init) {
  if(!init.history.length) return '<p style="font-size:14px;color:var(--text-muted)">Quiet on the trail so far. Drop a comment or update the status!</p>';
  return [...init.history].reverse().map(item=>{
    let cls='created-ic', icon='✦', body='';
    if(item.type==='comment') {
      cls='comment-ic'; icon='💬';
      body=`<div class="tl-text">${esc(item.text)}</div>`;
    } else if(item.type==='status_change') {
      cls='status-ic'; icon='⟳';
      body=`<div class="tl-text" style="margin-bottom:5px">
        <span class="badge badge-${item.from}">${slabel(item.from)}</span>
        <span style="margin:0 7px;color:var(--text-muted)">→</span>
        <span class="badge badge-${item.to}">${slabel(item.to)}</span>
      </div>${item.note?`<div class="tl-text" style="color:var(--text-muted)">${esc(item.note)}</div>`:''}`;
    } else {
      body=`<div class="tl-text" style="color:var(--text-muted)">${esc(item.note||'Step added to the journey!')}</div>`;
    }
    return `<div class="tl-item">
      <div class="tl-icon ${cls}">${icon}</div>
      <div class="tl-body"><div class="tl-date">${fmtDateLong(item.date)}</div>${body}</div>
    </div>`;
  }).join('');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('open');
  DX = null;
  pendingStatus = null;
}

function showModal(html) {

       <div class="modal-box">${html}</div>
     </div>`;

function closeModal() { document.getElementById('modalRoot').innerHTML=''; }

// GOAL MODAL
function openGoalModal(gid) {
  const g = gid?findGoal(gid):null;
  showModal(`
    <div class="modal-title">${icon('goal','icon-lg')} ${g?'Edit Goal':'New Goal'}</div>
    <div class="form-group">
      <label class="form-label">Goal</label>
      <input class="form-input" id="mGoalTitle" value="${esc(g?.title||'')}" placeholder="e.g. Become India's most loved community for backpackers" />
    </div>
    <div class="form-group">
      <label class="form-label">The vision (optional)</label>
      <textarea class="form-input" id="mGoalDesc" rows="2" placeholder="Paint a picture of what we're building together…">${esc(g?.desc||'')}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Quarter</label>
        <select class="form-input" id="mGoalQ">
          ${['Q1 2026','Q2 2026','Q3 2026','Q4 2026'].map(q=>`<option${q===(g?.quarter||'Q2 2026')?' selected':''}>${q}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-actions">
      ${g?`<button type="button" class="btn btn-danger btn-sm" id="mGoalDelete" style="margin-right:auto">Delete Goal</button>`:''}
      <button type="button" class="btn btn-outline" id="mGoalCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="mGoalSave">${g?'Save Changes':'Add Goal'}</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('mGoalTitle')?.focus(),50);
  document.getElementById('mGoalSave')?.addEventListener('click', ()=>saveGoal(g?.id||''));
  document.getElementById('mGoalCancel')?.addEventListener('click', closeModal);
  document.getElementById('mGoalDelete')?.addEventListener('click', ()=>{ deleteGoal(g.id); closeModal(); });
}

function saveGoal(gid) {
  const title=(document.getElementById('mGoalTitle')?.value||'').trim();
  if(!title){ flashError('mGoalTitle','Give your adventure a name to set off!'); return; }
  const desc=(document.getElementById('mGoalDesc')?.value||'').trim();
  const quarter=document.getElementById('mGoalQ')?.value||'Q2 2026';
  if(gid) {
    const g=findGoal(gid); if(!g) return;
    g.title=title; g.desc=desc; g.quarter=quarter;
  } else {
    const g={id:id(),title,desc,quarter,createdAt:today(),keyResults:[]};
    S.goals.push(g);
    S.activeGoalId=g.id;
  }
  save(); closeModal(); render();
}

function deleteGoal(gid) {
  if(!confirm('Delete this goal and all its measures and initiatives?')) return;
  S.goals=S.goals.filter(g=>g.id!==gid);
  if(S.activeGoalId===gid) S.activeGoalId=null;
  save(); render();
}

// KR MODAL
function openKRModal(gid, krid) {
  const g=findGoal(gid); if(!g) return;
  const kr=krid?findKR(g,krid):null;
  showModal(`
    <div class="modal-title">${icon('measure','icon-lg')} ${kr?'Edit Measure':'New Measure'}</div>
    <div class="form-group">
      <label class="form-label">Measure</label>
      <input class="form-input" id="mKRTitle" value="${esc(kr?.title||'')}" placeholder="e.g. 4.8+ average community rating across all stays" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Where we are now</label>
        <input class="form-input" id="mKRCur" type="number" value="${kr?.current??''}" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">Where we're headed</label>
        <input class="form-input" id="mKRTarget" type="number" value="${kr?.target??''}" placeholder="100" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Unit (e.g. %, travellers, rating, followers)</label>
      <input class="form-input" id="mKRUnit" value="${esc(kr?.unit||'')}" placeholder="%" />
    </div>
    <div class="form-actions">
      ${kr?`<button type="button" class="btn btn-danger btn-sm" id="mKRDelete" style="margin-right:auto">Delete Measure</button>`:''}
      <button type="button" class="btn btn-outline" id="mKRCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="mKRSave">${kr?'Save Changes':'Add Measure'}</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('mKRTitle')?.focus(),50);
  document.getElementById('mKRSave')?.addEventListener('click', ()=>saveKR(gid, kr?.id||''));
  document.getElementById('mKRCancel')?.addEventListener('click', closeModal);
  document.getElementById('mKRDelete')?.addEventListener('click', ()=>{ deleteKR(gid, krid); closeModal(); });
}

function saveKR(gid, krid) {
  const g=findGoal(gid); if(!g) return;
  const title=(document.getElementById('mKRTitle')?.value||'').trim();
  if(!title){ flashError('mKRTitle','Tell us what this signpost marks!'); return; }
  const cur=parseFloat(document.getElementById('mKRCur')?.value)||0;
  const target=parseFloat(document.getElementById('mKRTarget')?.value)||100;
  const unit=(document.getElementById('mKRUnit')?.value||'').trim()||'%';
  if(krid) {
    const kr=findKR(g,krid); if(!kr) return;
    kr.title=title; kr.current=cur; kr.target=target; kr.unit=unit;
  } else {
    const kr={id:id(),title,current:cur,target,unit,initiatives:[]};
    g.keyResults.push(kr);
    S.openKRs.add(kr.id);
  }
  save(); closeModal(); render();
}

function deleteKR(gid, krid) {
  const g=findGoal(gid); if(!g) return;
  g.keyResults=g.keyResults.filter(k=>k.id!==krid);
  S.openKRs.delete(krid);
  save(); render();
}

// INITIATIVE MODAL
function openInitModal(gid, krid) {
  showModal(`
    <div class="modal-title">${icon('initiative','icon-lg')} New Initiative</div>
    <div class="form-group">
      <label class="form-label">Initiative</label>
      <input class="form-input" id="mInitTitle" placeholder="e.g. Host community-building workshops for property managers" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Who's leading it</label>
        <select class="form-input" id="mInitOwner">${ownerOptions('')}</select>
        ${S.members.length === 0 ? `<div style="font-size:12px;color:var(--text-muted);margin-top:5px">No teammates yet — <a onclick="closeModal();goToSettings()" style="color:var(--primary);cursor:pointer;font-weight:600">add them in Settings</a> to assign a lead.</div>` : ''}
      </div>
      <div class="form-group">
        <label class="form-label">By when</label>
        <input class="form-input" id="mInitDue" type="date" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Starting status</label>
      <select class="form-input" id="mInitStatus">
        ${STATUSES.map(s=>`<option value="${s.v}">${s.label}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">A kickoff note (optional)</label>
      <input class="form-input" id="mInitNote" placeholder="Anything to rally the crew before we set off?" />
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" id="mInitCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="mInitSave">Add Initiative</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('mInitTitle')?.focus(),50);
  document.getElementById('mInitSave')?.addEventListener('click', ()=>saveInit(gid, krid));
  document.getElementById('mInitCancel')?.addEventListener('click', closeModal);
}

function saveInit(gid, krid) {
  const g=findGoal(gid), kr=findKR(g,krid); if(!kr) return;
  const title=(document.getElementById('mInitTitle')?.value||'').trim();
  if(!title){ flashError('mInitTitle','Give this step a name so the crew knows what to chase!'); return; }
  const status=document.getElementById('mInitStatus')?.value||'not_started';
  const owner=(document.getElementById('mInitOwner')?.value||'').trim();
  const dueDate=document.getElementById('mInitDue')?.value||'';
  const note=(document.getElementById('mInitNote')?.value||'').trim();
  const hist=[{id:id(),date:today(),type:'created',note:note||'Step added to the journey!'}];
  if(status!=='not_started') hist.push({id:id(),date:today(),type:'status_change',from:'not_started',to:status,note});
  kr.initiatives.push({id:id(),title,status,owner,dueDate,history:hist});
  save(); closeModal(); render();
}

function deleteInit(gid, krid, iid) {
  if(!confirm('Delete this initiative?')) return;
  const g=findGoal(gid), kr=findKR(g,krid); if(!kr) return;
  kr.initiatives=kr.initiatives.filter(i=>i.id!==iid);
  save(); render();
}

function selectGoal(gid) {
  S.view = 'goals';
  S.activeGoalId=gid;
  if(gid) {
    const g=findGoal(gid);
    if(g?.keyResults.length) S.openKRs.add(g.keyResults[0].id);
  }
  render();
  closeSidebar();
}

function goToIdeas() {
  S.view = 'ideas';
  S.activeGoalId = null;
  render();
  closeSidebar();
}

function goToSettings() {
  S.view = 'settings';
  S.activeGoalId = null;
  render();
  closeSidebar();
}

function goToHelp() {
  S.view = 'help';
  S.activeGoalId = null;
  render();
  closeSidebar();
  document.getElementById('mainContent')?.scrollTo({ top: 0, behavior: 'instant' });
}
