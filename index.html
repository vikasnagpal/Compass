<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compass</title>
  <!-- Inline SVG favicon — a compass needle on a dark disc. Lives in the
       HTML so there's no extra file to host alongside index.html on GitHub
       Pages, and ships in the same network request as the page itself. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%231F2937'/%3E%3Cpolygon points='16,4 19,16 13,16' fill='%23F4B400'/%3E%3Cpolygon points='16,28 19,16 13,16' fill='%239CA3AF'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%23F4B400'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    // Apply theme synchronously BEFORE CSS parses, so the browser
    // never paints a frame in the wrong palette. Reads a saved
    // preference; falls back to the OS-level prefers-color-scheme.
    (function () {
      var saved = null;
      try { saved = localStorage.getItem('compassTheme'); } catch (e) {}
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved === 'light' || saved === 'dark' ? saved : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="light"] {
      --primary:        #F4B400;
      --primary-light:  #FFF8E1;
      --primary-dark:   #D9A000;
      --text:           #1F1F1F;
      --text-on-primary:#1F1F1F;
      --text-muted:     #5C5B56;
      --bg:             #FAF8F3;
      --bg-soft:        #F4F0E8;
      --neutral:        #D9D2C3;
      --green:          #4C6A3D;
      --green-light:    #EBF2E6;
      --surface:        #FFFFFF;
      --card:           #FFFFFF;
      --border:         #E8E3D8;
      --danger:         #A82A1F;
      --danger-light:   #FDECEA;
      --warning:        #9C5400;
      --warning-light:  #FFF3E0;
      --radius:         18px;
      --radius-sm:      10px;
      --shadow-sm:      0 1px 4px rgba(0,0,0,0.07);
      --shadow-md:      0 4px 14px rgba(0,0,0,0.10);
      --shadow-lg:      0 10px 40px rgba(0,0,0,0.14);
      --sidebar-w:      272px;
      --header-h:       58px;
    }

    /* ─── DARK THEME ───────────────────────────────────────────
       Warm dark palette, not steel-blue tech-y. The mustard primary
       stays put so the brand identity carries across both modes. */
    [data-theme="dark"] {
      --primary:        #F4B400;
      --primary-light:  #3A2E0A;   /* deep mustard tint for hover/active */
      --primary-dark:   #FFC828;
      --text:           #EAE4D5;   /* warm cream, echoes the light-mode bg */
      --text-on-primary:#1F1F1F;   /* always dark — for legibility on the mustard accent */
      --text-muted:     #908C7E;
      --bg:             #15151B;   /* warm near-black */
      --bg-soft:        #1A1A21;   /* between bg and surface */
      --neutral:        #3A3A45;
      --green:          #8FC470;   /* brighter, more saturated for contrast */
      --green-light:    #1A2A14;
      --surface:        #1E1E27;   /* card surface, one step lighter than bg */
      --card:           #1E1E27;
      --border:         #2C2C36;
      --danger:         #FF7A6E;   /* brighter coral so it pops on dark */
      --danger-light:   #3A1814;
      --warning:        #FFB85C;
      --warning-light:  #3A2810;
      --shadow-sm:      0 1px 4px rgba(0,0,0,0.35);
      --shadow-md:      0 4px 14px rgba(0,0,0,0.45);
      --shadow-lg:      0 10px 40px rgba(0,0,0,0.55);
    }

    /* Smooth (but quick) cross-fade when the user toggles theme.
       Don't transition layout properties — only colors. */
    body, .header, .sidebar, .goal-card, .kr-card, .init-row, .drawer,
    .goal-detail-box, .gd-menu, .d-menu, .user-menu-dropdown, .banner,
    .empty, .modal, .update-box, .init-desc, .arch-row, .mw-row,
    .idea-card, .form-input, .form-select, .gd-progress-track,
    .help-section, .help-pillar, .stats-card {
      transition: background-color .22s ease, color .22s ease,
                  border-color .22s ease;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    h1,h2,h3,h4,h5 { font-family: 'Poppins', sans-serif; }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      box-shadow: var(--shadow-sm);
    }
    .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .header-logo { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .logo-mark {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--primary); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 14px; color: #fff;
    }
    .logo-name {
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 17px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .logo-name em { color: var(--primary); font-style: normal; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    /* ── USER MENU ── */
    .user-menu { position: relative; }
    .user-menu-trigger {
      width: 36px; height: 36px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer;
      border-radius: 50%; transition: box-shadow .15s;
    }
    .user-menu-trigger:hover { box-shadow: 0 0 0 3px var(--primary-light); }
    .user-menu-trigger:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--primary); color: var(--text-on-primary);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 13px;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-menu-dropdown {
      position: absolute; right: 0; top: calc(100% + 8px);
      min-width: 220px; padding: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); box-shadow: var(--shadow-md);
      z-index: 250;
    }
    .user-menu-dropdown[hidden] { display: none; }
    .user-menu-identity {
      padding: 10px 12px 12px;
      border-bottom: 1px solid var(--border); margin-bottom: 6px;
    }
    .user-menu-name {
      font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px;
      color: var(--text);
    }
    .user-menu-email { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
    .user-menu-item {
      display: block; width: 100%; text-align: left;
      padding: 9px 12px; border-radius: 6px;
      background: transparent; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 500;
      color: var(--text); transition: background .15s;
    }
    .user-menu-item:hover { background: var(--bg); }
    .user-menu-item { display: flex; align-items: center; }
    .user-menu-sep { height: 1px; background: var(--border); margin: 4px 8px; }

    .menu-btn {
      display: none;
      width: 40px; height: 40px; padding: 0;
      align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: var(--text); border-radius: 10px;
      transition: background .18s, color .18s;
    }
    .menu-btn:hover { background: var(--bg); }
    .menu-btn:active { background: var(--neutral); }
    .menu-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .menu-btn svg line {
      transition: transform .25s ease, opacity .2s ease;
      transform-origin: center;
    }
    .menu-btn.is-open .mi-l1 { transform: translateY(6px) rotate(45deg); }
    .menu-btn.is-open .mi-l2 { opacity: 0; }
    .menu-btn.is-open .mi-l3 { transform: translateY(-6px) rotate(-45deg); }

    /* ── ICONS ──
       Lucide-style inline SVGs. .icon sizes to 1em so they scale with text.
       Stroke uses currentColor so any text colour cascades through. */
    .icon {
      width: 1em; height: 1em;
      display: inline-block;
      vertical-align: -0.18em;
      stroke: currentColor; stroke-width: 1.85;
      fill: none;
      stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }
    .icon-lg { width: 1.3em; height: 1.3em; vertical-align: -0.25em; }
    .icon-tile {
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    }
    .icon-tile .icon { width: 20px; height: 20px; }

    @media (max-width: 768px) {
      .menu-btn { display: inline-flex; }
      .header { padding: 0 12px 0 6px; }
      .logo-name { font-size: 16px; }
    }

    /* ── LAYOUT ── */
    .app-shell { display: flex; height: calc(100vh - var(--header-h)); overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto; overflow-x: hidden;
      padding: 18px 14px 24px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-muted);
      padding: 2px 8px 8px; margin-top: 4px;
    }
    .goal-nav-item {
      padding: 11px 12px; border-radius: var(--radius-sm);
      cursor: pointer; border: 1.5px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .goal-nav-item:hover { background: var(--bg); }
    .goal-nav-item.active { background: var(--primary-light); border-color: var(--primary); }
    .goal-nav-title {
      font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px;
      line-height: 1.4; margin-bottom: 5px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .goal-nav-title > span:first-child { flex: 1; }
    /* T3.4 — at-risk chip in the sidebar so trouble surfaces without drilling in. */
    .goal-nav-risk {
      flex-shrink: 0; font: 600 11px/1 'IBM Plex Sans', sans-serif;
      color: var(--danger);
      background: var(--danger-light, rgba(220,38,38,.12));
      border-radius: 999px; padding: 2px 7px; margin-top: 1px;
    }
    .goal-nav-chips { display: flex; gap: 8px; font-size: 12px; color: var(--text-muted); }
    .mini-bar { height: 3px; background: var(--neutral); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .mini-bar-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width .4s; }
    .sidebar-add-btn {
      margin-top: 10px; padding: 10px; border-radius: var(--radius-sm);
      border: 1.5px dashed var(--neutral); background: transparent;
      color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: all .2s;
      width: 100%; text-align: center;
    }
    .sidebar-add-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    /* ── IDEAS NAV ── */
    .sidebar-divider {
      border-top: 1px solid var(--border);
      margin: 14px 4px 10px;
    }
    .nav-ideas-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      border: 1.5px solid transparent; background: transparent;
      cursor: pointer; transition: background .15s, border-color .15s;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      color: var(--text); width: 100%; text-align: left;
    }
    .nav-ideas-btn:hover { background: var(--bg); }
    .nav-ideas-btn.active { background: var(--primary-light); border-color: var(--primary); }
    .nav-ideas-icon { font-size: 17px; line-height: 1; }
    .nav-ideas-count {
      margin-left: auto;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--neutral); color: var(--text);
      padding: 0 9px; min-height: 22px;
      border-radius: 12px;
      font-size: 12px; font-weight: 700;
      font-family: 'IBM Plex Sans', sans-serif;
      line-height: 1;
    }
    .nav-ideas-btn.active .nav-ideas-count { background: var(--primary); color: var(--text-on-primary); }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 4px;
    }

    /* ── HELP PAGE ── */
    .help-section {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 22px 24px;
      margin-bottom: 16px; box-shadow: var(--shadow-sm);
    }
    .help-section-title {
      font-family: 'Poppins', sans-serif; font-weight: 600;
      font-size: 17px; color: var(--text); margin-bottom: 6px;
    }
    .help-section-sub {
      font-size: 13.5px; color: var(--text-muted); margin-bottom: 16px;
      line-height: 1.55;
    }

    .help-pillars {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .help-pillar {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px;
    }
    .help-pillar-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 11px;
      background: var(--primary-light); color: var(--primary-dark);
      margin-bottom: 12px;
    }
    .help-pillar-icon .icon { width: 24px; height: 24px; stroke-width: 2; }
    .help-pillar-name {
      font-family: 'Poppins', sans-serif; font-weight: 600;
      font-size: 15px; margin-bottom: 6px; color: var(--text);
    }
    .help-pillar-desc {
      font-size: 13.5px; line-height: 1.6; color: var(--text-muted);
    }
    .help-pillar-desc em {
      color: var(--text); font-style: italic; font-weight: 500;
      display: block; margin-top: 6px;
    }

    .help-list {
      margin: 0; padding-left: 0; list-style: none;
      display: flex; flex-direction: column; gap: 12px;
    }
    .help-list li {
      font-size: 14px; line-height: 1.6; color: var(--text-muted);
      padding-left: 24px; position: relative;
    }
    .help-list li::before {
      content: '↪'; position: absolute; left: 4px; top: 0;
      color: var(--primary); font-weight: 700; font-size: 14px;
    }
    .help-list li strong { color: var(--text); font-weight: 600; }

    .help-principles { margin: 0; padding: 0; list-style: none; display: grid; gap: 10px; }
    .help-principles li {
      font-size: 14px; line-height: 1.6; color: var(--text-muted);
      padding: 12px 14px; background: var(--bg);
      border-left: 3px solid var(--primary); border-radius: 6px;
    }
    .help-principles li strong { color: var(--text); font-weight: 600; }

    .help-steps {
      margin: 0; padding-left: 0; counter-reset: helpsteps;
      list-style: none; display: flex; flex-direction: column; gap: 12px;
    }
    .help-steps li {
      counter-increment: helpsteps;
      padding-left: 38px; position: relative;
      font-size: 14px; line-height: 1.6; color: var(--text-muted);
      min-height: 26px;
    }
    .help-steps li::before {
      content: counter(helpsteps);
      position: absolute; left: 0; top: 0;
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--primary); color: var(--text-on-primary);
      font-family: 'IBM Plex Sans', sans-serif; font-weight: 600;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .help-steps li strong { color: var(--text); font-weight: 600; }

    .help-credit {
      text-align: center; padding: 28px 14px 6px;
      font-size: 13.5px; color: var(--text-muted);
      font-style: italic;
    }
    .help-credit a {
      color: var(--text); font-weight: 600; font-style: normal;
      text-decoration: none;
      border-bottom: 1.5px solid var(--primary);
      padding-bottom: 1px; transition: all .15s;
    }
    .help-credit a:hover { color: var(--primary-dark); border-bottom-color: var(--primary-dark); }

    /* ── ABOUT / PRODUCT STUDY PAGE ── */
    .about-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-muted); cursor: pointer;
      margin-bottom: 14px; background: none; border: none; padding: 4px 0;
    }
    .about-back:hover { color: var(--text); }
    .about-lede {
      font-size: 15.5px; line-height: 1.7; color: var(--text);
      max-width: 720px; margin-bottom: 4px;
    }
    .about-lede strong { font-weight: 600; }
    /* Use-case cards */
    .usecase-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px; margin-top: 4px;
    }
    .usecase-card {
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
    }
    .usecase-card-icon { font-size: 22px; line-height: 1; margin-bottom: 8px; }
    .usecase-card-title { font-weight: 600; font-size: 14.5px; margin-bottom: 4px; color: var(--text); }
    .usecase-card-desc { font-size: 13px; line-height: 1.55; color: var(--text-muted); }
    /* Problem → feature mapping table */
    .study-map { display: flex; flex-direction: column; gap: 0; margin-top: 4px; }
    .study-map-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
      align-items: start;
    }
    .study-map-row:last-child { border-bottom: none; }
    .study-map-head {
      display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
      padding-bottom: 8px; border-bottom: 2px solid var(--border);
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted);
    }
    .study-problem { font-size: 14px; line-height: 1.5; color: var(--text); }
    .study-problem::before { content: '“'; color: var(--text-muted); }
    .study-problem::after  { content: '”'; color: var(--text-muted); }
    .study-feature { font-size: 13.5px; line-height: 1.5; color: var(--text-muted); }
    .study-feature strong { color: var(--text); font-weight: 600; }
    @media (max-width: 620px) {
      .study-map-row, .study-map-head { grid-template-columns: 1fr; gap: 6px; }
      .study-map-head span:last-child { display: none; }
    }

    /* ── CATCH-UP DIGEST ── */
    .dg-summary {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      padding: 14px 18px; margin-bottom: 18px;
      background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 12px;
    }
    .dg-stat { font-size: 13.5px; color: var(--text-muted); }
    .dg-stat b { color: var(--text); font-weight: 700; font-size: 15px; }
    .dg-section { margin-bottom: 22px; }
    .dg-section-head {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .dg-section-muted { color: var(--text-muted); }
    .dg-count {
      font-size: 11px; font-weight: 700; background: var(--neutral);
      color: var(--text-muted); border-radius: 9px; padding: 1px 8px;
    }
    .dg-count-new { background: var(--primary); color: var(--text-on-primary); }
    .dg-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 14px; border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 8px; background: var(--surface);
      transition: background .12s, border-color .12s;
    }
    .dg-item.is-clickable { cursor: pointer; }
    .dg-item.is-clickable:hover { background: var(--bg-soft); border-color: var(--primary); }
    .dg-item.is-new {
      border-left: 3px solid var(--primary);
      background: var(--primary-light);
    }
    .dg-item.is-new .dg-title { font-weight: 600; }
    /* Earlier (seen) group reads quieter. :has scopes the dim to the section
       whose header is muted; a fallback class keeps it sane without :has. */
    .dg-section:has(.dg-section-muted) .dg-item { opacity: .72; }
    .dg-ico { font-size: 18px; line-height: 1.4; flex-shrink: 0; width: 22px; text-align: center; }
    .dg-body { flex: 1; min-width: 0; }
    .dg-title { font-size: 14px; color: var(--text); line-height: 1.4; }
    .dg-detail {
      font-size: 13px; color: var(--text-muted); line-height: 1.45;
      margin-top: 2px; overflow-wrap: anywhere;
    }
    .dg-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .dg-side { flex-shrink: 0; }
    .dg-more {
      font-size: 13px; color: var(--text-muted); text-align: center;
      padding: 10px; font-style: italic;
    }
    .dg-horizon { margin-top: 28px; }
    .dg-horizon-head {
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 17px;
      margin-bottom: 14px; padding-top: 18px; border-top: 1px solid var(--border);
    }
    .dg-horizon-group { margin-bottom: 18px; }
    .dg-horizon-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    @media (prefers-reduced-motion: reduce) {
      .dg-item { transition: none; }
    }

    /* ── IDEAS PAGE ── */
    .idea-capture {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      box-shadow: var(--shadow-sm); margin-bottom: 22px;
    }
    .idea-capture textarea {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: 15px;
      background: var(--bg); color: var(--text);
      resize: vertical; min-height: 52px; outline: none;
      transition: border-color .15s; line-height: 1.5;
    }
    .idea-capture textarea:focus { border-color: var(--primary); }
    .idea-capture textarea::placeholder { color: var(--neutral); }
    .idea-capture-foot {
      display: flex; gap: 10px; margin-top: 12px;
      align-items: center; flex-wrap: wrap; justify-content: space-between;
    }
    .idea-capture-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .idea-capture-select {
      padding: 7px 11px; border: 1.5px solid var(--border);
      border-radius: 8px; background: var(--bg);
      font-family: 'Inter', sans-serif; font-size: 13px;
      color: var(--text); cursor: pointer; outline: none;
      min-width: 170px; max-width: 220px;
      transition: border-color .15s;
    }
    .idea-capture-select:focus { border-color: var(--primary); }
    .idea-capture-select:disabled { opacity: .55; cursor: not-allowed; }
    .idea-capture-hint {
      font-size: 12px; color: var(--text-muted);
      margin-top: 6px; display: block;
    }

    .idea-filters {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
    }
    .idea-filter {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0 12px; min-height: 30px;
      border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; transition: all .15s;
      max-width: 240px; line-height: 1;
    }
    .idea-filter:hover { border-color: var(--neutral); color: var(--text); }
    .idea-filter.active {
      background: var(--primary-light); border-color: var(--primary);
      color: var(--text); font-weight: 600;
    }
    .idea-filter-label {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .idea-filter-count {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg); padding: 0 8px;
      min-height: 18px; border-radius: 10px;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      font-family: 'IBM Plex Sans', sans-serif;
      line-height: 1;
    }
    .idea-filter.active .idea-filter-count { background: var(--primary); color: var(--text-on-primary); }

    .ideas-grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }
    .idea-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: 12px;
      transition: all .18s;
    }
    .idea-card:hover {
      border-color: var(--neutral); transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .idea-text {
      font-size: 14.5px; font-weight: 500; line-height: 1.5;
      color: var(--text);
    }
    .idea-meta {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; flex-wrap: wrap;
    }
    .idea-link-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg); border: 1px solid var(--border);
      padding: 0 10px; min-height: 24px;
      border-radius: 12px;
      font-size: 12px; color: var(--text-muted); font-weight: 500;
      max-width: 100%; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      line-height: 1;
    }
    .idea-loose-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-muted); font-style: italic;
      padding: 0 8px; min-height: 24px; line-height: 1;
    }
    .idea-date { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
    .idea-actions {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .idea-actions > .btn { flex: 1; justify-content: center; min-width: 100px; }
    .btn-link {
      background: transparent; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 12.5px;
      padding: 6px 8px; border-radius: 6px;
      transition: background .15s, color .15s;
    }
    .btn-link:hover { background: var(--bg-soft); color: var(--text); }
    .idea-status-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11.5px; font-weight: 600;
      padding: 3px 9px; border-radius: 12px;
      background: var(--bg-soft); color: var(--text-muted);
    }
    .idea-status-chip.status-parked   { background: #FFF3D6; color: #A86A00; }
    .idea-status-chip.status-promoted { background: var(--green-light); color: var(--green); }
    .idea-status-chip.status-rejected { background: var(--danger-light); color: var(--danger); }
    .idea-card.status-promoted, .idea-card.status-rejected { opacity: .75; }
    .idea-card.status-rejected .idea-text { text-decoration: line-through; }

    .btn-icon-only {
      width: 30px; height: 30px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 1.5px solid var(--border);
      cursor: pointer; color: var(--text-muted); border-radius: 8px;
      transition: all .15s; font-size: 13px; flex-shrink: 0;
    }
    .btn-icon-only:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger-light); }

    /* ── IDEAS IN GOAL DETAIL ── */
    .goal-ideas-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      margin-top: 22px; box-shadow: var(--shadow-sm);
    }
    .goal-ideas-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; margin-bottom: 14px;
    }
    .goal-ideas-title {
      font-family: 'Poppins', sans-serif; font-weight: 600;
      font-size: 15px; display: flex; align-items: center; gap: 7px;
    }
    .goal-ideas-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .goal-ideas-quick {
      display: flex; gap: 8px; margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .goal-ideas-quick input {
      flex: 1; min-width: 220px; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: 14px;
      background: var(--bg); outline: none; transition: border-color .15s;
      color: var(--text);
    }
    .goal-ideas-quick input:focus { border-color: var(--primary); }
    .goal-ideas-list {
      display: flex; flex-direction: column; gap: 6px;
      container-type: inline-size;
      container-name: goalIdeasList;
    }
    .goal-idea-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      grid-template-areas: "text kr acts";
      column-gap: 10px; row-gap: 6px; align-items: center;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--bg); border: 1px solid transparent;
      transition: all .15s;
    }
    .goal-idea-row:hover { background: var(--primary-light); border-color: var(--primary); }
    .goal-idea-row .gi-text { grid-area: text; font-size: 13.5px; line-height: 1.45; min-width: 0; }
    .goal-idea-row .gi-kr {
      grid-area: kr;
      display: inline-flex; align-items: center;
      font-size: 11.5px; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 0 9px; min-height: 22px;
      border-radius: 10px;
      max-width: 220px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      line-height: 1;
    }
    .goal-idea-row .gi-acts { grid-area: acts; display: flex; gap: 3px; opacity: 0; transition: opacity .15s; }
    .goal-idea-row:hover .gi-acts { opacity: 1; }

    /* When the goal-ideas list is narrow, drop the measure chip to its own line */
    @container goalIdeasList (max-width: 520px) {
      .goal-idea-row {
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-areas:
          "text acts"
          "kr   kr";
      }
      .goal-idea-row .gi-kr { justify-self: flex-start; max-width: 100%; }
      .goal-idea-row .gi-acts { opacity: 1; } /* touch-friendly */
    }
    .gi-mini-btn {
      width: 26px; height: 26px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer;
      color: var(--text-muted); border-radius: 6px; font-size: 13px;
    }
    .gi-mini-btn:hover { background: var(--surface); color: var(--text); }
    .gi-mini-btn.gi-danger:hover { background: var(--danger-light); color: var(--danger); }
    .goal-ideas-more {
      margin-top: 10px; font-size: 13px; color: var(--primary);
      font-weight: 600; cursor: pointer; background: none; border: none;
      padding: 4px 0;
    }
    .goal-ideas-more:hover { text-decoration: underline; }
    .goal-ideas-empty {
      padding: 14px 4px; font-size: 13.5px; color: var(--text-muted);
      text-align: center; font-style: italic;
    }

    /* ── SETTINGS PAGE ── */
    .settings-hero {
      border-radius: var(--radius);
      background: var(--surface); border: 1.5px solid var(--border);
      padding: 22px 26px; margin-bottom: 22px;
      box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    }
    .settings-hero::after {
      content: '⚙️'; position: absolute;
      right: 26px; top: 50%; transform: translateY(-50%);
      font-size: 70px; opacity: .10; pointer-events: none;
    }
    .settings-hero h2 { font-size: 22px; margin-bottom: 4px; color: var(--text); }
    .settings-hero p { font-size: 15px; color: var(--text-muted); max-width: 560px; }

    .settings-section {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 22px;
      margin-bottom: 18px; box-shadow: var(--shadow-sm);
    }
    .settings-section-header { margin-bottom: 16px; }
    .settings-section-title {
      font-family: 'Poppins', sans-serif; font-weight: 600;
      font-size: 16px; color: var(--text); margin-bottom: 4px;
    }
    .settings-section-sub {
      font-size: 13.5px; color: var(--text-muted); line-height: 1.55;
    }
    .member-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 8px;
    }
    .member-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: var(--radius-sm);
      background: var(--bg); border: 1px solid transparent;
      transition: all .15s;
    }
    .member-row:hover { background: var(--primary-light); border-color: var(--primary); }
    .member-row.is-me { background: var(--primary-light); border-color: var(--primary); }
    .member-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary); color: var(--text-on-primary);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 14px;
      flex-shrink: 0; overflow: hidden;
    }
    .member-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .member-meta {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .member-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 8px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .member-email {
      font-size: 12.5px; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .member-you {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 700; line-height: 1;
      padding: 0 8px; min-height: 18px; border-radius: 10px;
      background: var(--primary); color: var(--text-on-primary);
      font-family: 'IBM Plex Sans', sans-serif;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .member-empty {
      font-size: 13.5px; color: var(--text-muted);
      text-align: center; padding: 18px 14px;
      font-style: italic;
      background: var(--bg); border-radius: var(--radius-sm);
      border: 1px dashed var(--neutral);
    }

    /* ── DELIGHT: idea-capture micro-celebrations ── */
    .idea-spark {
      position: fixed; width: 8px; height: 8px;
      background: var(--primary); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      animation: sparkFly 820ms cubic-bezier(.2,.7,.3,1) forwards;
      box-shadow: 0 0 6px rgba(244,180,0,.55);
    }
    .idea-spark.s-sm  { width: 5px; height: 5px; }
    .idea-spark.s-green { background: var(--green); box-shadow: 0 0 6px rgba(76,106,61,.45); }
    @keyframes sparkFly {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
      18%  { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.55); }
    }

    .nav-ideas-count.bump { animation: countBump 520ms ease; }
    @keyframes countBump {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.35); background: var(--primary); color: var(--text-on-primary); }
      100% { transform: scale(1); }
    }

    .idea-huzzah {
      position: fixed; left: 50%; bottom: 36px;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: #fff;
      padding: 10px 20px; border-radius: 100px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      box-shadow: 0 10px 32px rgba(0,0,0,0.18);
      opacity: 0; pointer-events: none; z-index: 9999;
      max-width: 92vw; text-align: center;
      transition: opacity .28s ease, transform .32s cubic-bezier(.2,.8,.3,1);
      letter-spacing: 0.1px;
    }
    .idea-huzzah.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
    .idea-huzzah.big {
      background: linear-gradient(135deg, var(--primary) 0%, #E5A800 100%);
      color: var(--text);
      padding: 13px 24px; font-size: 14.5px;
      box-shadow: 0 12px 36px rgba(244,180,0,.45);
    }

    .idea-card.fresh { animation: cardGlow 1.6s ease; }
    @keyframes cardGlow {
      0%   { background: var(--primary-light); border-color: var(--primary); transform: scale(.985); }
      18%  { background: var(--primary-light); border-color: var(--primary); transform: scale(1.015); }
      100% { background: var(--surface); border-color: var(--border); transform: scale(1); }
    }
    .goal-idea-row.fresh { animation: rowGlow 1.6s ease; }
    @keyframes rowGlow {
      0%   { background: var(--primary-light); border-color: var(--primary); }
      100% { background: var(--bg); border-color: transparent; }
    }

    @media (prefers-reduced-motion: reduce) {
      .idea-spark { display: none; }
      .nav-ideas-count.bump { animation: none; }
      .idea-card.fresh, .goal-idea-row.fresh { animation: none; }
      .idea-huzzah { transition: opacity .14s ease; transform: translateX(-50%); }
      .idea-huzzah.show { transform: translateX(-50%); }
      .kr-collapsible { transition: none; }
      .kr-chevron { transition: none; }
    }

    /* ── CONTENT ── */
    .content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 28px 32px;
    }
    @media (max-width: 900px) { .content { padding: 20px 18px; } }

    /* ── MOBILE SIDEBAR ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: var(--header-h); bottom: 0;
        z-index: 200; transform: translateX(-100%);
        transition: transform .28s ease; box-shadow: var(--shadow-lg);
      }
      .sidebar.open { transform: translateX(0); }
      .content { padding: 16px 14px; }
    }
    .mob-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.28); z-index: 190;
    }
    .mob-overlay.show { display: block; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 18px; min-height: 38px;
      border-radius: 10px; border: none;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap;
      line-height: 1;
    }
    .btn-primary { background: var(--primary); color: var(--text-on-primary); }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline {
      background: transparent; border: 1.5px solid var(--border); color: var(--text);
    }
    .btn-outline:hover { border-color: var(--neutral); background: var(--bg); }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-sm { padding: 0 13px; min-height: 30px; font-size: 13px; border-radius: 8px; }
    .btn-danger { background: var(--danger-light); color: var(--danger); border: none; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-icon {
      width: 30px; height: 30px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 16px;
    }

    /* ── WELCOME BANNER ── */
    /* Unified page hero banner. Each banner instance sets its own corner
       glyph via `style="--banner-icon: '🏕️'"`. Light mode: cream gradient;
       dark mode: deep mustard tints. Same look across Dashboard, My work,
       Archive, Ideas, and Help. */
    .banner {
      border-radius: var(--radius);
      background: linear-gradient(130deg, #FFF8E1 0%, #FFE6B0 100%);
      padding: 26px 30px; margin-bottom: 22px;
      position: relative; overflow: hidden;
    }
    .banner::after {
      content: var(--banner-icon, '✦'); position: absolute;
      right: 26px; top: 50%; transform: translateY(-50%);
      font-size: 86px; opacity: .22; pointer-events: none;
    }
    .banner h2 {
      font-size: 24px; margin-bottom: 6px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
    }
    .banner p {
      font-size: 15px; color: var(--text); opacity: .82;
      line-height: 1.65; max-width: 620px;
    }
    [data-theme="dark"] .banner {
      background: linear-gradient(130deg, #3A2E0A 0%, #2A1F08 100%);
    }
    [data-theme="dark"] .banner::after { opacity: .32; }
    .banner-cta { margin-top: 14px; position: relative; z-index: 1; }

    /* ── WEEKLY CHECK-IN MODAL (T2.1) ── */
    .checkin-scrim {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 420; display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; transition: opacity .18s ease;
    }
    /* Same critical fix as .search-scrim: without this, `display: flex`
       defeats the `hidden` attribute and leaves a transparent full-screen
       scrim intercepting all clicks. */
    .checkin-scrim[hidden] { display: none; }
    .checkin-scrim:not([hidden]) { opacity: 1; }
    .checkin-shell {
      width: 100%; max-width: 560px;
      background: var(--surface); border-radius: 18px;
      border: 1px solid var(--border); box-shadow: var(--shadow-lg);
      display: flex; flex-direction: column; overflow: hidden;
      max-height: calc(100vh - 48px);
    }
    .checkin-head {
      padding: 16px 20px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .checkin-progress {
      flex: 1; display: flex; gap: 5px;
    }
    .checkin-progress span {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--neutral); transition: background .2s;
    }
    .checkin-progress span.is-done    { background: var(--green); }
    .checkin-progress span.is-current { background: var(--primary); }
    .checkin-close {
      border: 0; background: var(--bg); color: var(--text-muted);
      width: 28px; height: 28px; border-radius: 7px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font: 500 14px/1 'Inter', sans-serif;
    }
    .checkin-body { padding: 22px 24px; overflow-y: auto; }
    .checkin-crumb { font: 400 12px/1.3 'Inter', sans-serif; color: var(--text-muted); margin-bottom: 6px; }
    .checkin-title { font: 600 19px/1.35 'Poppins', sans-serif; color: var(--text); margin-bottom: 18px; }
    .checkin-section-label {
      font: 600 11px/1 'Inter', sans-serif; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted); margin: 16px 0 8px;
    }
    .checkin-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .checkin-pills .status-pill { font-size: 12px; }
    .checkin-comment {
      width: 100%; border: 1px solid var(--border); background: var(--bg);
      border-radius: 10px; padding: 10px 12px;
      font: 400 14px/1.4 'Inter', sans-serif; color: var(--text);
      resize: vertical; min-height: 64px; outline: none;
      transition: border-color .15s;
    }
    .checkin-comment:focus { border-color: var(--primary); }
    .checkin-meta {
      font: 400 12px/1.4 'Inter', sans-serif; color: var(--text-muted);
      margin-top: 12px;
    }
    .checkin-foot {
      padding: 14px 20px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .checkin-foot .checkin-skip { color: var(--text-muted); }
    .checkin-foot .checkin-next { margin-left: auto; }
    .checkin-done {
      padding: 36px 24px; text-align: center;
    }
    .checkin-done-emoji { font-size: 44px; margin-bottom: 10px; }
    .checkin-done h3 { font: 600 20px/1.3 'Poppins', sans-serif; margin-bottom: 6px; }
    .checkin-done p { font: 400 14px/1.5 'Inter', sans-serif; color: var(--text-muted); }
    @media (prefers-reduced-motion: reduce) {
      .checkin-scrim { transition: none; }
    }

    /* ── SECTION HEADER ── */
    .sec-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; gap: 12px;
    }
    .sec-title { font-size: 19px; font-weight: 700; }
    .sec-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    /* ── GOAL CARDS (dashboard) ── */
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .goal-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1.5px solid var(--border); padding: 20px;
      cursor: pointer; transition: all .2s; box-shadow: var(--shadow-sm);
    }
    .goal-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary); }
    .goal-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .goal-card-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 15.5px; line-height: 1.4; flex: 1; }
    .q-chip {
      display: inline-flex; align-items: center;
      font-size: 12px; font-weight: 700;
      padding: 0 10px; min-height: 24px;
      border-radius: 20px;
      background: var(--primary-light); color: var(--warning);
      margin-left: 8px; white-space: nowrap;
      line-height: 1;
    }
    .goal-card-nums { display: flex; gap: 16px; margin-bottom: 12px; }
    .num-stat strong {
      display: block; font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500; font-size: 22px; line-height: 1.2;
    }
    .num-stat span { font-size: 12.5px; color: var(--text-muted); }
    .prog-bar { height: 7px; background: var(--neutral); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .prog-fill { height: 100%; border-radius: 3px; transition: width .5s; }
    .prog-fill.g { background: var(--green); }
    .prog-fill.y { background: var(--primary); }
    .prog-fill.r { background: var(--danger); }
    .prog-note { font-size: 12.5px; color: var(--text-muted); }

    /* ── GOAL DETAIL HEADER ── */
    .goal-detail-box {
      background: var(--surface); border-radius: var(--radius);
      border: 1.5px solid var(--border); padding: 22px 24px;
      margin-bottom: 22px; box-shadow: var(--shadow-sm);
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13.5px; color: var(--text-muted); margin-bottom: 18px;
    }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { color: var(--primary); }
    .breadcrumb-sep { color: var(--neutral); }
    .gd-chips {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; margin-bottom: 10px;
    }
    .goal-owner-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: var(--text);
      background: var(--bg); border: 1px solid var(--border);
      padding: 0 10px; min-height: 24px;
      border-radius: 20px; line-height: 1;
    }
    .goal-owner-chip .icon { color: var(--text-muted); }
    .goal-closed-chip {
      display: inline-flex; align-items: center;
      font-size: 12px; font-weight: 700; color: var(--green);
      background: var(--green-light); border: 1px solid var(--green);
      padding: 0 11px; min-height: 24px;
      border-radius: 20px; line-height: 1;
    }
    /* Back link — slim, unobtrusive, replaces the redundant breadcrumb */
    .gd-back {
      margin-bottom: 14px; font-size: 13px;
    }
    .gd-back a {
      color: var(--text-muted); cursor: pointer;
      text-decoration: none; padding: 4px 0;
      transition: color .15s;
    }
    .gd-back a:hover, .gd-back a:focus { color: var(--text); }

    .gd-header {
      display: flex; align-items: flex-start; gap: 8px;
      justify-content: space-between;
    }
    .gd-main { flex: 1 1 auto; min-width: 0; }
    .gd-title {
      font-size: 22px; font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.3; overflow-wrap: anywhere;
    }
    .gd-desc {
      font-size: 14.5px; color: var(--text-muted);
      line-height: 1.6; margin-bottom: 0;
    }

    /* Kebab overflow menu (replaces the row of buttons) */
    .gd-menu-wrap { position: relative; flex-shrink: 0; }
    .gd-menu-btn {
      width: 36px; height: 36px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid transparent;
      border-radius: 8px; cursor: pointer;
      color: var(--text-muted); transition: background .15s, color .15s, border-color .15s;
    }
    .gd-menu-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border); }
    .gd-menu-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .gd-menu-btn .icon { width: 18px; height: 18px; }
    .gd-menu {
      position: absolute; right: 0; top: calc(100% + 6px);
      min-width: 220px; padding: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); box-shadow: var(--shadow-md);
      z-index: 250;
    }
    .gd-menu[hidden] { display: none; }
    .gd-menu-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; text-align: left;
      padding: 9px 12px; border-radius: 6px;
      background: transparent; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 500;
      color: var(--text); transition: background .15s;
    }
    .gd-menu-item:hover { background: var(--bg); }
    .gd-menu-item .icon { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
    .gd-menu-item.gd-menu-danger { color: var(--danger); }
    .gd-menu-item.gd-menu-danger .icon { color: var(--danger); }
    .gd-menu-item.gd-menu-danger:hover { background: var(--danger-light); }
    .gd-menu-sep {
      height: 1px; background: var(--border);
      margin: 4px 8px;
    }

    /* Progress row — the centerpiece of the goal page */
    .gd-progress-row {
      margin-top: 22px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .gd-progress-meta {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 8px;
    }
    .gd-progress-label {
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .8px;
    }
    .gd-progress-pct {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 22px; font-weight: 600; line-height: 1;
    }
    .gd-progress-track {
      width: 100%; height: 8px; border-radius: 4px;
      background: var(--bg); overflow: hidden;
    }
    .gd-progress-fill {
      height: 100%; border-radius: 4px;
      transition: width .4s ease;
    }
    .gd-progress-fill.g { background: var(--green); }
    .gd-progress-fill.y { background: var(--primary); }
    .gd-progress-fill.r { background: var(--danger); }
    .gd-progress-hint {
      margin-top: 8px; font-size: 12.5px;
      color: var(--text-muted);
    }

    /* Polished stats card — equal columns with subtle dividers */
    .gd-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      margin-top: 18px; padding: 14px 0 4px;
      border-top: 1px solid var(--border);
    }
    .gd-stat {
      text-align: left; padding: 4px 14px;
      position: relative;
    }
    .gd-stat:not(:last-child)::after {
      content: ''; position: absolute;
      right: 0; top: 8px; bottom: 8px;
      width: 1px; background: var(--border);
    }
    .gd-stat:first-child { padding-left: 0; }
    .gd-stat:last-child { padding-right: 0; }
    .gd-stat-val {
      font-family: 'IBM Plex Sans', sans-serif; font-size: 26px;
      font-weight: 500; line-height: 1.1;
    }
    .gd-stat-lab {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: .8px; margin-top: 4px;
    }

    /* Reflection callout (when a goal is closed) */
    .gd-reflection {
      margin-top: 14px; padding: 14px 16px;
      background: var(--green-light);
      border-radius: 10px;
      font-size: 14.5px; line-height: 1.6;
      color: var(--text); font-style: italic;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .gd-reflection .icon {
      flex-shrink: 0; width: 16px; height: 16px;
      color: var(--green); margin-top: 3px;
    }
    .goal-detail-box.is-closed { opacity: .92; }
    .goal-detail-box.is-closed .gd-title { color: var(--text-muted); }
    .goal-card-owner {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 12px; margin-top: -8px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .goal-card.is-closed { opacity: .72; }
    .goal-card.is-closed .goal-card-title { color: var(--text-muted); }

    @media (max-width: 560px) {
      .gd-title { font-size: 19px; }
      .gd-stats { grid-template-columns: repeat(2, 1fr); row-gap: 14px; }
      .gd-stat:nth-child(2)::after { display: none; } /* break the divider between rows */
      .gd-stat:nth-child(3), .gd-stat:nth-child(4) {
        padding-top: 12px; border-top: 1px solid var(--border);
      }
      .gd-stat:nth-child(3) { padding-left: 0; }
      .gd-progress-pct { font-size: 20px; }
    }

    /* ── MY WORK ── */
    .mw-stats {
      display: flex; gap: 26px; flex-wrap: wrap;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 22px; margin-bottom: 20px;
    }
    .mw-stat-val {
      font-family: 'IBM Plex Sans', sans-serif; font-size: 26px;
      font-weight: 500; line-height: 1.1;
    }
    .mw-stat-lab { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .mw-section { margin-bottom: 26px; }
    .mw-section-head {
      display: flex; align-items: center; gap: 10px;
      margin: 0 4px 10px 4px;
    }
    .mw-section-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      text-transform: uppercase; letter-spacing: .6px;
    }
    .mw-count {
      display: inline-block; font-size: 12px; font-weight: 600;
      background: var(--bg-soft); color: var(--text-muted);
      padding: 2px 9px; border-radius: 10px; margin-left: 4px;
    }
    .mw-list {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .mw-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center; gap: 14px;
      padding: 13px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .mw-row:last-child { border-bottom: none; }
    .mw-row:hover { background: var(--bg-soft); }
    .mw-main { min-width: 0; }
    .mw-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .mw-path { font-size: 12px; color: var(--text-muted); }
    .mw-sep { opacity: .5; margin: 0 4px; }
    .mw-status { flex-shrink: 0; }
    .mw-due {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12.5px; color: var(--text-muted);
      white-space: nowrap;
    }
    .mw-due.overdue { color: var(--danger); font-weight: 600; }
    .mw-empty {
      padding: 18px; text-align: center;
      font-size: 14px; color: var(--text-muted);
      background: var(--card); border: 1px dashed var(--border); border-radius: 12px;
    }

    /* ── ARCHIVE ── */
    .arch-quarter { margin-bottom: 26px; }
    .arch-quarter-head {
      font-size: 14px; font-weight: 700; color: var(--text);
      text-transform: uppercase; letter-spacing: .6px;
      margin: 0 4px 10px 4px;
      display: flex; align-items: center; gap: 10px;
    }
    .arch-quarter-count {
      font-size: 12px; font-weight: 600;
      background: var(--bg-soft); color: var(--text-muted);
      padding: 2px 9px; border-radius: 10px;
    }
    .arch-list { display: flex; flex-direction: column; gap: 10px; }
    .arch-row {
      display: flex; align-items: flex-start; gap: 18px;
      padding: 16px 20px; cursor: pointer;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px;
      transition: border-color .15s, transform .15s;
    }
    .arch-row:hover { border-color: var(--primary); transform: translateY(-1px); }
    .arch-main { flex: 1; min-width: 0; }
    .arch-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .arch-meta {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      font-size: 12.5px; color: var(--text-muted);
    }
    .arch-owner { display: inline-flex; align-items: center; gap: 4px; }
    .arch-reflection {
      margin-top: 10px; font-size: 13.5px; font-style: italic;
      color: var(--text-muted); line-height: 1.55;
      padding-left: 10px; border-left: 2px solid var(--green);
    }
    .arch-stats { display: flex; gap: 20px; flex-shrink: 0; }
    .arch-stat-val {
      font-family: 'IBM Plex Sans', sans-serif; font-size: 20px;
      font-weight: 500; line-height: 1.1; text-align: center;
    }
    .arch-stat-lab { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; text-align: center; }
    @media (max-width: 720px) {
      .arch-row { flex-direction: column; gap: 12px; }
      .arch-stats { width: 100%; justify-content: space-between; }
      .mw-row { grid-template-columns: auto 1fr; }
      .mw-status, .mw-due { grid-column: 2; padding-left: 0; }
    }

    /* ── KR CARD ── */
    .kr-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1.5px solid var(--border); margin-bottom: 14px;
      overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .kr-header {
      padding: 16px 20px; display: flex; align-items: center;
      gap: 12px; cursor: pointer; transition: background .15s;
    }
    .kr-header:hover { background: var(--bg); }
    .kr-title-wrap { flex: 1; min-width: 0; }
    .kr-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 15px; line-height: 1.4; }
    .kr-meta { font-size: 13px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
    .kr-progress-block { display: flex; align-items: center; gap: 10px; flex-shrink: 0; min-width: 150px; }
    .kr-prog-val { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
    .kr-prog-bar { flex: 1; height: 6px; background: var(--neutral); border-radius: 3px; overflow: hidden; }
    .kr-sparkline { flex-shrink: 0; opacity: .85; }
    .kr-sparkline:hover { opacity: 1; }
    .kr-chevron { font-size: 16px; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
    .kr-chevron.open { transform: rotate(180deg); }
    @media (max-width: 560px) { .kr-progress-block { display: none; } }

    /* ── COLLAPSIBLE INITIATIVES PANEL ──
       The inits-frame is always in the DOM. This wrapper toggles between
       grid-template-rows: 0fr (closed) and 1fr (open), which animates the
       height smoothly without us having to measure pixels. The child gets
       overflow: hidden + min-height: 0 so the grid actually clips when
       closed. No re-render means scroll position stays put. */
    .kr-collapsible {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .22s ease;
    }
    .kr-collapsible.open { grid-template-rows: 1fr; }
    .kr-collapsible > .inits-frame {
      overflow: hidden;
      min-height: 0;
    }

    /* ── INITIATIVES ──
       Wide view uses CSS subgrid so every row shares the same 7 columns:
       dot · name · status · owner · due · comments · delete.
       The status column is the same width on every row, so badges line up
       vertically — same for owner, due, comments.
       NOTE: container-type sits on the outer .inits-frame, NOT on .inits-wrap
       itself — container queries silently drop modifications that would
       affect the queried feature (e.g. changing display on the container).
       Wrapping cleanly separates the container from the grid. */
    .inits-frame {
      container-type: inline-size;
      container-name: initsList;
    }
    .inits-wrap {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns:
        auto              /* 1: status dot */
        minmax(0, 1fr)    /* 2: initiative name (flexible) */
        auto              /* 3: status badge */
        auto              /* 4: owner */
        auto              /* 5: due date */
        auto              /* 6: comments */
        auto;             /* 7: delete */
      column-gap: 16px;
    }
    .inits-toolbar {
      grid-column: 1 / -1;
      padding: 9px 20px; display: flex; align-items: center;
      justify-content: space-between; background: var(--bg);
    }
    .inits-toolbar-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .9px; color: var(--text-muted);
    }
    .init-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: subgrid;
      align-items: center;
      padding: 13px 20px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      transition: background .13s, border-left-color .13s;
      border-left: 3px solid transparent;
      position: relative;
    }
    /* T3.8 — clear hover affordance so the row reads as clickable on first
       sight: subtle bg shift + left accent stripe + a small "→" trailing
       the title that fades in. */
    .init-row:hover {
      background: var(--bg-soft);
      border-left-color: var(--primary);
    }
    .init-row > .init-name::after {
      content: ' →';
      color: var(--text-muted);
      opacity: 0; margin-left: 4px;
      transition: opacity .15s, transform .15s;
      transform: translateX(-3px); display: inline-block;
    }
    .init-row:hover > .init-name::after { opacity: 1; transform: translateX(0); }
    @media (prefers-reduced-motion: reduce) {
      .init-row > .init-name::after { transition: none; }
    }
    .init-row > .init-dot {
      grid-column: 1;
      width: 10px; height: 10px; border-radius: 50%;
      justify-self: start;
    }
    .init-row > .init-name {
      grid-column: 2;
      font-size: 14px; font-weight: 500;
      min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .init-row > .ir-status   { grid-column: 3; justify-self: start; }
    .init-row > .ir-owner    {
      grid-column: 4; justify-self: start;
      font-size: 13px; color: var(--text-muted); white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .init-row > .ir-due      {
      grid-column: 5; justify-self: start;
      font-size: 12.5px; color: var(--text-muted); white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .init-row > .ir-comments {
      grid-column: 6; justify-self: start;
      font-size: 12.5px; color: var(--text-muted); white-space: nowrap;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .init-row > .del-btn {
      grid-column: 7; justify-self: end;
      opacity: 0; background: none; border: none; cursor: pointer;
      font-size: 15px; color: var(--text-muted); padding: 2px 6px;
      border-radius: 5px; transition: all .15s;
    }
    .init-row:hover .del-btn { opacity: 1; }
    .del-btn:hover { background: var(--danger-light); color: var(--danger); }
    .init-row > .ir-due.overdue { color: var(--danger); font-weight: 600; }
    .flag-chip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 11px; font-weight: 800; line-height: 1;
      margin-right: 6px; flex-shrink: 0;
      vertical-align: middle;
    }
    .flag-chip.flag-overdue { background: var(--danger-light); color: var(--danger); }
    .flag-chip.flag-stale   { background: #FFF3D6; color: #A86A00; }

    /* When the initiatives list gets narrow, drop the subgrid alignment and
       fall back to a 2-line layout: name + delete on top, attributes below. */
    @container initsList (max-width: 720px) {
      .inits-wrap { display: block; column-gap: 0; }
      .inits-toolbar { grid-column: auto; }
      /* Narrow layout:
         Row 1 (always): dot · name (can wrap to multiple lines) · X
         Row 2 (wraps below): status · owner · due · comments
         The dot sits on the first line of the name. The X is absolutely
         pinned so flex-wrap can't push it down. */
      .init-row {
        display: flex; flex-wrap: wrap; align-items: flex-start;
        column-gap: 10px; row-gap: 8px;
        grid-column: auto; grid-template-columns: none;
        position: relative;
        padding-right: 44px; /* room for absolute X */
      }
      .init-row::after {
        content: ""; flex-basis: 100%; width: 0; height: 0; order: 1;
      }
      .init-row > .init-dot {
        order: 0; grid-column: auto; justify-self: auto;
        margin-top: 7px; /* aligns dot with first line of (possibly-multi-line) name */
      }
      .init-row > .init-name {
        order: 0; grid-column: auto;
        flex: 1 1 0; min-width: 0;
        white-space: normal; line-height: 1.4;
      }
      .init-row > .del-btn {
        order: 0; grid-column: auto; justify-self: auto;
        position: absolute; top: 9px; right: 14px;
        opacity: 1;
      }
      .init-row > .ir-status,
      .init-row > .ir-owner,
      .init-row > .ir-due,
      .init-row > .ir-comments {
        order: 2; grid-column: auto; justify-self: auto;
        align-self: center;
      }
      .init-row > .ir-owner:empty,
      .init-row > .ir-due:empty { display: none; }
    }

    /* ── BADGES ──
       inline-flex + line-height: 1 explicitly centers text so a status
       pill sits visually flush with adjacent chips of similar shape. */
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      padding: 0 11px; min-height: 26px;
      border-radius: 20px; white-space: nowrap;
      line-height: 1;
    }
    .badge-not_started  { background: #F0EFED; color: #6B6A65; }
    [data-theme="dark"] .badge-not_started { background: #2A2A33; color: #B0AC9D; }
    [data-theme="dark"] .badge-on_hold     { background: #2A2A33; color: #B0AC9D; }
    [data-theme="dark"] .dot-not_started   { background: #6A675F; }
    [data-theme="dark"] .dot-on_hold       { background: #555259; }
    [data-theme="dark"] .flag-chip.flag-stale   { background: #3A2810; color: #FFB85C; }
    [data-theme="dark"] .idea-status-chip.status-parked { background: #3A2810; color: #FFB85C; }
    /* The status pill active state uses var(--text) for its border —
       in dark mode that's a light cream which clashes with the dark
       pill background. Use a high-contrast accent instead. */
    [data-theme="dark"] .status-pill.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .badge-in_progress  { background: var(--primary-light); color: var(--warning); }
    .badge-on_track     { background: var(--green-light); color: var(--green); }
    .badge-at_risk      { background: var(--warning-light); color: var(--warning); }
    .badge-blocked      { background: var(--danger-light); color: var(--danger); }
    .badge-on_hold      { background: #E6E4DE; color: #5A5852; }
    .badge-completed    { background: var(--green-light); color: var(--green); }

    .dot-not_started  { background: #B0ADA6; }
    .dot-in_progress  { background: var(--primary); }
    .dot-on_track     { background: var(--green); }
    .dot-at_risk      { background: var(--warning); }
    .dot-blocked      { background: var(--danger); }
    .dot-on_hold      { background: #8C8A83; }
    .dot-completed    { background: var(--green); }

    /* ── HEADER SEARCH TRIGGER (T2.2) ── */
    .header-search-trigger {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 10px;
      padding: 6px 10px; font: 500 13px/1 'Inter', sans-serif;
      cursor: pointer; min-width: 200px; transition: border-color .15s, background .15s;
    }
    .header-search-trigger:hover { border-color: var(--primary); background: var(--surface); color: var(--text); }
    .header-search-label { flex: 1; text-align: left; }
    .header-search-kbd {
      font: 500 11px/1 'IBM Plex Sans', monospace;
      padding: 2px 5px; border-radius: 4px;
      border: 1px solid var(--border); color: var(--text-muted);
      background: var(--surface);
    }
    @media (max-width: 640px) {
      .header-search-trigger { min-width: 0; padding: 6px 8px; }
      .header-search-label, .header-search-kbd { display: none; }
    }

    /* ── GLOBAL SEARCH MODAL ── */
    .search-scrim {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 400; display: flex; align-items: flex-start; justify-content: center;
      padding: 80px 16px 16px;
      opacity: 0; transition: opacity .15s ease;
    }
    /* CRITICAL: the `hidden` attribute is overridden by the `display: flex`
       above (the UA [hidden]{display:none} rule has lower specificity), which
       would leave a transparent full-screen scrim swallowing every click.
       This explicit rule restores hidden behaviour — same pattern as the
       .d-menu / .gd-menu dropdowns. */
    .search-scrim[hidden] { display: none; }
    .search-scrim:not([hidden]) { opacity: 1; }
    .search-shell {
      width: 100%; max-width: 640px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow-lg);
      display: flex; flex-direction: column; overflow: hidden;
      max-height: calc(100vh - 160px);
    }
    .search-input-row {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }
    .search-input {
      flex: 1; border: 0; outline: 0; background: transparent;
      font: 500 16px/1.3 'Inter', sans-serif; color: var(--text);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-close {
      font: 500 11px/1 'IBM Plex Sans', monospace;
      padding: 4px 8px; border-radius: 5px;
      border: 1px solid var(--border); color: var(--text-muted);
      background: var(--bg); cursor: pointer;
    }
    .search-hint {
      padding: 14px 18px; font: 400 13px/1.4 'Inter', sans-serif;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
    }
    .search-results {
      flex: 1; overflow-y: auto; padding: 6px 0;
    }
    .search-group-label {
      padding: 10px 18px 4px; font: 600 11px/1 'Inter', sans-serif;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-muted);
    }
    .search-result {
      display: grid; grid-template-columns: 22px 1fr auto;
      align-items: center; gap: 12px;
      padding: 9px 18px; cursor: pointer;
      border-left: 3px solid transparent;
    }
    .search-result:hover,
    .search-result.is-active { background: var(--bg); border-left-color: var(--primary); }
    .search-result-icon { font-size: 16px; line-height: 1; opacity: .8; }
    .search-result-title { font: 500 14px/1.35 'Inter', sans-serif; color: var(--text); }
    .search-result-crumb { font: 400 12px/1.3 'Inter', sans-serif; color: var(--text-muted); margin-top: 2px; }
    .search-result-kbd { font: 500 11px/1 'IBM Plex Sans', monospace; color: var(--text-muted); }
    .search-empty {
      padding: 28px 18px; text-align: center;
      color: var(--text-muted); font: 400 13px/1.4 'Inter', sans-serif;
    }

    /* ── OVERLAY + DRAWER ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.30);
      z-index: 300; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 500px; max-width: 96vw;
      background: var(--surface); z-index: 310;
      display: flex; flex-direction: column;
      transform: translateX(110%); transition: transform .3s ease;
      box-shadow: var(--shadow-lg);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-head {
      padding: 14px 22px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    /* Top row: kebab + close, right-aligned, above the breadcrumb */
    .d-head-actions {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 4px; margin-bottom: 6px;
    }
    .drawer-close-btn {
      background: none; border: 1px solid transparent;
      font-size: 20px; line-height: 1;
      cursor: pointer; color: var(--text-muted);
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px; transition: all .15s;
    }
    .drawer-close-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border); }
    .drawer-close-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* Drawer kebab menu (parallel to goal-detail kebab) */
    .d-menu-wrap { position: relative; }
    .d-menu-btn {
      width: 32px; height: 32px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid transparent;
      border-radius: 8px; cursor: pointer;
      color: var(--text-muted); transition: all .15s;
    }
    .d-menu-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border); }
    .d-menu-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .d-menu-btn .icon { width: 18px; height: 18px; }
    .d-menu {
      position: absolute; right: 0; top: calc(100% + 6px);
      min-width: 220px; padding: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); box-shadow: var(--shadow-md);
      z-index: 260;
    }
    .d-menu[hidden] { display: none; }
    .d-menu-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; text-align: left;
      padding: 9px 12px; border-radius: 6px;
      background: transparent; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 500;
      color: var(--text); transition: background .15s;
    }
    .d-menu-item:hover { background: var(--bg); }
    .d-menu-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; color: var(--text-muted); flex-shrink: 0;
    }
    .d-menu-danger { color: var(--danger); }
    .d-menu-danger .d-menu-icon { color: var(--danger); }
    .d-menu-danger:hover { background: var(--danger-light); }
    .d-menu-sep { height: 1px; background: var(--border); margin: 4px 8px; }

    /* Single-line breadcrumb — truncates with ellipsis on narrow viewports */
    .drawer-crumb {
      font-size: 12.5px; color: var(--text-muted);
      margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .drawer-title {
      font-size: 20px; font-weight: 700; line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .drawer-meta {
      display: flex; gap: 6px; flex-wrap: wrap;
      align-items: center; margin-top: 14px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 0 11px; min-height: 26px;
      border-radius: 20px;
      font-size: 13px; font-weight: 500;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-muted);
      line-height: 1;
    }
    button.chip {
      font-family: 'Inter', sans-serif; margin: 0; cursor: pointer;
      transition: all .15s;
    }
    button.chip:hover {
      border-color: var(--primary); background: var(--primary-light);
      color: var(--text);
    }
    button.chip:focus-visible {
      outline: 2px solid var(--primary); outline-offset: 2px;
    }
    button.chip.chip-empty { border-style: dashed; font-style: italic; }
    button.chip.chip-empty:hover { font-style: normal; }
    .chip-input {
      display: inline-flex; align-items: center;
      padding: 0 11px; min-height: 26px;
      border: 1.5px solid var(--primary);
      border-radius: 20px; outline: none;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      background: var(--surface); color: var(--text);
      box-shadow: 0 0 0 3px var(--primary-light);
      transition: box-shadow .15s;
      line-height: 1;
    }
    .chip-input[type="text"] { min-width: 180px; }
    .chip-input[type="date"] { min-width: 150px; }
    select.chip-input { min-width: 200px; cursor: pointer; padding-right: 26px; }

    .drawer-body { flex: 1; overflow-y: auto; padding: 20px 22px; }

    /* ── UPDATE BOX ── */
    /* ── INITIATIVE DESCRIPTION (drawer) ──
       Read-block reveals a textarea on click. Empty state nudges the
       user to add context with a dashed border. */
    .init-desc {
      font-size: 14px; line-height: 1.65;
      color: var(--text);
      padding: 0 0 16px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: color .15s;
      white-space: pre-wrap; word-wrap: break-word;
    }
    .init-desc:hover { color: var(--primary); }
    .init-desc.is-empty {
      padding: 12px 14px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted); font-style: italic;
    }
    .init-desc.is-empty:hover {
      color: var(--text); font-style: normal;
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .init-desc-editor { margin-bottom: 18px; }
    .init-desc-editor textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--primary);
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 14px; line-height: 1.6;
      background: var(--surface); color: var(--text);
      outline: none;
      box-shadow: 0 0 0 3px var(--primary-light);
      resize: vertical;
      min-height: 80px;
    }
    .init-desc-actions {
      display: flex; gap: 8px;
      justify-content: flex-end; align-items: center;
      margin-top: 8px;
    }
    .init-desc-hint { font-size: 12px; color: var(--text-muted); margin-right: auto; }

    .update-box {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px; margin-bottom: 22px;
    }
    .update-box-title {
      font-size: 12.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .9px; color: var(--text-muted); margin-bottom: 12px;
    }
    .status-pills {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .status-pill {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 5px;
      padding: 0 12px; min-height: 30px;
      border-radius: 20px; border: 1.5px solid transparent;
      font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      line-height: 1;
    }
    .status-pill:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
